<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="KTTA Platform">
  <style>
    .wm { font-family: 'Space Grotesk','Manrope',system-ui,sans-serif;
          font-weight: 700; fill: #09090b; }
    .tg { font-family: 'Space Grotesk',system-ui,sans-serif;
          font-weight: 500; fill: #71717a; }
  </style>

  <!-- ロゴマーク (左) -->
  <g transform="translate(8,8)">
    <circle cx="32" cy="32" r="30" fill="#09090b"/>
    <!-- ボール軌跡 -->
    <path d="M 50 14 Q 36 26, 22 44"
          stroke="#dc2626" stroke-width="1.6" fill="none"
          stroke-dasharray="2 2.5" opacity="0.85" stroke-linecap="round"/>
    <!-- ボール -->
    <circle cx="50" cy="14" r="5.2" fill="#fff"/>
    <circle cx="48.5" cy="12.6" r="1.6" fill="#dc2626"/>
    <!-- 体 -->
    <path d="M 16 38 C 16 32, 22 28, 30 28 L 40 28 C 46 28, 50 31, 50 36 L 47 41 L 18 41 Z"
          fill="#fafafa" stroke="#27272a" stroke-width="0.8" stroke-linejoin="round"/>
    <path d="M 20 36 L 32 33 L 44 36" stroke="#a1a1aa" stroke-width="0.6" fill="none" opacity="0.6"/>
    <!-- 尾 -->
    <path d="M 16 38 L 9 36 L 11 42 L 18 41 Z" fill="#09090b"/>
    <!-- 脚 -->
    <line x1="26" y1="41" x2="26" y2="52" stroke="#27272a" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="34" y1="41" x2="34" y2="52" stroke="#27272a" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M 23 52 L 26 52 L 29 52" stroke="#27272a" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M 31 52 L 34 52 L 37 52" stroke="#27272a" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- 首 -->
    <path d="M 40 28 Q 38 19, 34 14 Q 31 9, 33 6"
          stroke="#fafafa" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    <!-- 頭 -->
    <circle cx="33" cy="6" r="3.8" fill="#fafafa" stroke="#27272a" stroke-width="0.8"/>
    <!-- 頭頂赤 -->
    <path d="M 30 4 Q 33 1, 36 4 L 36 6.5 L 30 6.5 Z" fill="#dc2626"/>
    <!-- くちばし -->
    <path d="M 36.5 6.5 L 42 7 L 36.5 7.8 Z" fill="#1c1917"/>
    <!-- 目 -->
    <circle cx="33" cy="6.2" r="0.7" fill="#09090b"/>
  </g>

  <!-- ワードマーク -->
  <text class="wm" x="92" y="42" font-size="24">KTTA</text>
  <text class="wm" x="150" y="42" font-size="24" fill="#71717a" font-weight="500">Platform</text>
  <text class="tg" x="92" y="58" font-size="9" letter-spacing="2.4">KUSHIRO · TABLE TENNIS · ASSOCIATION</text>
</svg>
