<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KTTA Platform - 試合結果・選手検索</title>
<link rel="stylesheet" href="/shared/common.css">
<style>
 /* viewer 専用の追加スタイル */
 .hero {
 background: var(--ink-950);
 color: var(--ink-0);
 padding: 14px 0;
 border-bottom: 1px solid var(--ink-800);
 position: sticky; top: 0; z-index: 50;
 backdrop-filter: blur(8px);
 }
 .hero-inner {
 max-width: 1200px; margin: 0 auto; padding: 0 20px;
 display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
 }
 .hero-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
 .hero-sub { font-size: 11px; opacity: .8; }
 .live-indicator {
 display: inline-flex; align-items: center; gap: 6px;
 background: rgba(255,255,255,.06);
 border: 1px solid rgba(255,255,255,.12);
 padding: 5px 12px; border-radius: 14px;
 font-size: 10px; font-weight: 600;
 letter-spacing: 0.1em; text-transform: uppercase;
 }
 .live-dot {
 width: 7px; height: 7px; border-radius: 50%; background: #10b981;
 animation: pulse 1.5s infinite;
 box-shadow: 0 0 0 2px rgba(16,185,129,.25);
 }
 @media (max-width: 480px) {
 .hero-inner { padding: 0 12px; }
 .ktta-logo-tag { display: none; }
 }
 @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

 .search-bar {
 background: #fff; padding: 12px 16px;
 border-bottom: 1px solid var(--border);
 position: sticky; top: 0; z-index: 50;
 }
 .search-bar-in {
 max-width: 1100px; margin: 0 auto;
 display: flex; gap: 8px; align-items: center;
 }
 .search-input {
 flex: 1; padding: 10px 14px 10px 38px;
 border: 1px solid var(--border-strong); border-radius: 24px;
 background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%2364748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') no-repeat 12px center;
 font-size: 14px;
 }

 /* 選手カード */
 .player-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
 .player-card {
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 12px 14px;
 display: flex; align-items: center; gap: 10px;
 cursor: pointer; transition: all .15s;
 }
 .player-card:hover { border-color: var(--pri-l); box-shadow: 0 2px 8px rgba(30,58,138,.08); transform: translateY(-1px); }
 .player-avatar {
 width: 40px; height: 40px; border-radius: 50%;
 background: var(--pri-bg); color: var(--pri);
 display: inline-flex; align-items: center; justify-content: center;
 font-size: 16px; font-weight: 700; flex: 0 0 40px;
 }
 .player-avatar.female { background: #fce7f3; color: #be185d; }
 .player-info { flex: 1; min-width: 0; }
 .player-name { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
 .player-meta { font-size: 11px; color: var(--sub); display: flex; gap: 6px; }

 /* 大会一覧 */
 .tournament-card {
 display: grid; grid-template-columns: auto 1fr auto;
 gap: 14px; align-items: center;
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 14px 18px;
 margin-bottom: 8px; cursor: pointer; transition: all .15s;
 }
 .tournament-card:hover { border-color: var(--pri-l); box-shadow: 0 2px 10px rgba(30,58,138,.08); }
 .tournament-date {
 background: var(--pri-bg); color: var(--pri);
 padding: 6px 10px; border-radius: 6px;
 font-size: 12px; font-weight: 700; text-align: center; min-width: 60px;
 }
 .tournament-date .month { font-size: 10px; font-weight: 400; }
 .tournament-title { font-weight: 700; font-size: 15px; }
 .tournament-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }
 .tournament-arrow { color: var(--sub-l); font-size: 20px; }

 /* ステータスバッジ */
 .status-scheduled { background: var(--pri-bg); color: var(--pri); }
 .status-preparation { background: #ede9fe; color: #6d28d9; }
 .status-ongoing { background: #fef3c7; color: #ca8a04; }
 .status-completed { background: var(--ok-bg); color: var(--ok); }

 /* 選手詳細戦績テーブル */
 .profile-head {
 display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center;
 padding: 20px; background: linear-gradient(135deg, var(--pri) 0%, var(--pri-l) 100%);
 color: #fff; border-radius: var(--radius) var(--radius) 0 0;
 }
 .profile-avatar {
 width: 72px; height: 72px; border-radius: 50%;
 background: rgba(255,255,255,.2); color: #fff;
 display: inline-flex; align-items: center; justify-content: center;
 font-size: 28px; font-weight: 700;
 }
 .profile-name { font-size: 22px; font-weight: 700; }
 .profile-sub { font-size: 13px; opacity: .85; margin-top: 4px; }
 .profile-stats { display: flex; gap: 16px; font-size: 11px; }
 .profile-stat-num { font-size: 20px; font-weight: 700; display: block; }
 .profile-body { padding: 16px; }

 /* セクション見出し */
 .section-title {
 font-size: 13px; font-weight: 700; color: var(--sub);
 padding: 8px 0; margin-bottom: 10px;
 border-bottom: 2px solid var(--border);
 display: flex; align-items: center; gap: 6px;
 }

 /* ★ 選手視点の試合行 (初心者向け・○勝ち/×負け) */
 .pm-row {
   display: grid; grid-template-columns: 54px 1fr auto;
   gap: 10px; align-items: center;
   padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
   border: 1px solid var(--border); background: #fff;
 }
 .pm-row.win  { border-left: 5px solid #16a34a; background: #f0fdf4; }
 .pm-row.loss { border-left: 5px solid #dc2626; background: #fef2f2; }
 .pm-result {
   font-size: 13px; font-weight: 800; text-align: center;
   border-radius: 8px; padding: 6px 0; line-height: 1.2;
   white-space: pre-line;
 }
 .pm-row.win  .pm-result { background: #16a34a; color: #fff; }
 .pm-row.loss .pm-result { background: #dc2626; color: #fff; }
 .pm-opp { min-width: 0; }
 .pm-opp-label { font-size: 10px; color: var(--sub); }
 .pm-opp-name { font-size: 15px; font-weight: 700; color: var(--ink-900);
   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .pm-opp-name a { color: var(--ink-900); text-decoration: none; }
 .pm-opp-name a:hover { text-decoration: underline; }
 .pm-opp-team { font-size: 11px; color: var(--sub); font-weight: 400; }
 .pm-opp-ev { font-size: 10px; color: var(--sub); margin-top: 1px; }
 .pm-score {
   text-align: right; font-family: var(--font-mono);
   font-size: 20px; font-weight: 800; white-space: nowrap;
 }
 .pm-row.win  .pm-score { color: #15803d; }
 .pm-row.loss .pm-score { color: #b91c1c; }
 .pm-score .pm-score-sets { font-size: 10px; color: var(--sub); font-weight: 400; display: block; }

 /* H2H 平易版 */
 .h2h-clean { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
 .h2h-c-row {
   display: grid; grid-template-columns: 1fr auto;
   gap: 10px; align-items: center; padding: 8px 12px;
   border: 1px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer;
 }
 .h2h-c-row:hover { border-color: var(--pri-l); }
 .h2h-c-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .h2h-c-team { font-size: 11px; color: var(--sub); font-weight: 400; margin-left: 4px; }
 .h2h-c-record { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
 .h2h-c-record .w { color: #15803d; font-weight: 800; font-size: 15px; }
 .h2h-c-record .l { color: #b91c1c; font-weight: 800; font-size: 15px; }
 .h2h-c-record .sep { color: var(--sub-l); }
 .h2h-c-verdict { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
 .h2h-c-verdict.lead { background: #dcfce7; color: #15803d; }
 .h2h-c-verdict.even { background: var(--ink-100); color: var(--ink-600); }
 .h2h-c-verdict.behind { background: #fee2e2; color: #b91c1c; }

 /* イベントグループ */
 .event-group { margin-bottom: 16px; }
 .event-title {
 background: var(--pri);
 color: #fff;
 padding: 8px 14px;
 font-size: 13px; font-weight: 700;
 border-radius: var(--radius) var(--radius) 0 0;
 display: flex; justify-content: space-between; align-items: center;
 }
 .event-count { font-size: 11px; opacity: .8; font-weight: 400; }

 .breadcrumb {
 display: flex; align-items: center; gap: 6px;
 padding: 10px 0; font-size: 12px; color: var(--sub);
 }
 .breadcrumb a { color: var(--pri-l); }

 /* ランキング */
 .rank-card {
 display: grid; grid-template-columns: 36px 1fr auto auto;
 gap: 10px; align-items: center;
 padding: 10px 14px; background: #fff;
 border: 1px solid var(--border);
 border-radius: var(--radius); margin-bottom: 6px;
 }
 .rank-num {
 font-size: 18px; font-weight: 700; text-align: center;
 color: var(--sub);
 }
 .rank-num.gold { color: var(--gold); font-size: 22px; }
 .rank-num.silver { color: var(--silver); font-size: 20px; }
 .rank-num.bronze { color: var(--bronze); font-size: 20px; }
 .rank-name { font-weight: 700; font-size: 14px; }
 .rank-meta { font-size: 11px; color: var(--sub); }
 .rank-rating { font-family: monospace; font-weight: 700; font-size: 15px; color: var(--pri); }
 .rank-wl { font-size: 11px; color: var(--sub); font-family: monospace; }

 @media (max-width: 640px) {
 .hero-title { font-size: 18px; }
 .profile-head { grid-template-columns: auto 1fr; gap: 12px; padding: 14px; }
 .profile-stats { grid-column: 1/-1; justify-content: space-around; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.2); }
 .profile-avatar { width: 56px; height: 56px; font-size: 22px; }
 }

 /* ── 進行中 (Live) ── */
 .live-stats {
 display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
 gap: 8px; margin-bottom: 14px;
 }
 .live-stat {
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 10px; text-align: center;
 }
 .live-stat-num { font-size: 22px; font-weight: 700; line-height: 1; }

 /* viewer用コートグリッド */
 .live-court-wrap {
 background: #f1f5f9; border: 2px solid var(--border-strong);
 border-radius: var(--radius); padding: 16px;
 margin-bottom: 14px; overflow-x: auto;
 }
 .live-court-grid {
 display: grid; gap: 6px;
 margin: 0 auto;
 }
 .live-court-cell {
 background: #fff; border: 2px solid var(--border-strong);
 border-radius: 6px; padding: 6px 4px;
 min-height: 64px; min-width: 70px;
 display: flex; flex-direction: column; align-items: center; justify-content: center;
 font-size: 10px; position: relative;
 }
 .live-court-cell.empty { background: #f8fafc; color: var(--sub-l); }
 .live-court-cell.active {
 background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
 border-color: var(--accent);
 animation: pulse-cell 2s infinite;
 }
 @keyframes pulse-cell {
 0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, .3); }
 50% { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); }
 }
 .live-court-no {
 position: absolute; top: 2px; left: 4px;
 font-size: 9px; color: var(--sub); font-weight: 700;
 }
 .live-court-match {
 text-align: center; font-weight: 700; font-size: 10px;
 color: var(--accent); line-height: 1.2; margin-top: 8px;
 }
 .live-court-hq {
 margin-top: 10px; padding: 10px; background: var(--pri); color: #fff;
 border-radius: 6px; text-align: center; font-weight: 700; font-size: 13px;
 }

 /* 進行中試合カード */
 .live-match-card {
 background: linear-gradient(90deg, #fffbeb 0%, #fff 100%);
 border: 1px solid var(--warn); border-left: 4px solid var(--accent);
 border-radius: var(--radius); padding: 10px 14px;
 margin-bottom: 6px;
 display: grid; grid-template-columns: auto 1fr;
 gap: 12px; align-items: center;
 }
 .live-tno {
 background: var(--accent); color: #fff;
 padding: 8px 14px; border-radius: 6px;
 font-weight: 700; font-size: 16px; min-width: 60px; text-align: center;
 }
 .next-callable {
 background: #fff; border: 1px dashed var(--pri-l);
 border-radius: var(--radius); padding: 8px 12px;
 margin-bottom: 6px;
 display: grid; grid-template-columns: auto 1fr; gap: 10px;
 font-size: 13px;
 }

 /* ── 試合検索フォーム ── */
 .match-search-form {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
 gap: 8px;
 padding-bottom: 12px;
 border-bottom: 1px solid var(--border);
 }
 .match-search-form .input { padding: 6px 8px; font-size: 13px; }
 .match-search-actions {
 grid-column: 1 / -1;
 display: flex; gap: 8px; justify-content: flex-end;
 padding-top: 8px;
 }

 /* 試合検索結果テーブル */
 .ms-table {
 width: 100%;
 border-collapse: collapse;
 font-size: 13px;
 background: #fff;
 }
 .ms-table thead {
 background: var(--pri);
 color: #fff;
 position: sticky; top: 0;
 }
 .ms-table th {
 padding: 8px 10px; text-align: left;
 font-size: 11px; font-weight: 700;
 letter-spacing: .02em;
 }
 .ms-table td {
 padding: 8px 10px;
 border-bottom: 1px solid var(--border);
 vertical-align: middle;
 }
 .ms-table tbody tr:hover { background: #f8fafc; cursor: pointer; }
 .ms-table .ms-winner { color: var(--accent); font-weight: 700; }
 .ms-table .ms-loser { color: var(--sub); }
 .ms-table .ms-event-cell { white-space: nowrap; font-size: 11px; color: var(--sub); }
 .ms-table .ms-sets { font-family: monospace; font-size: 11px; color: var(--sub); letter-spacing: .05em; }
 .ms-table .ms-score { font-family: monospace; font-weight: 700; font-size: 14px; white-space: nowrap; }

 .ms-pagination {
 display: flex; justify-content: center; gap: 8px;
 padding: 12px 0;
 }
 .ms-pagination button {
 padding: 6px 14px; background: #fff;
 border: 1px solid var(--border-strong);
 border-radius: 6px; font-weight: 600;
 }
 .ms-pagination button:disabled { opacity: .4; }

 /* 申込フォーム */
 .entry-card {
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 16px;
 margin-bottom: 10px;
 }
 .entry-card-head {
 display: grid; grid-template-columns: 1fr auto;
 gap: 10px; align-items: start;
 padding-bottom: 10px;
 border-bottom: 1px solid var(--border);
 margin-bottom: 12px;
 }
 .entry-form-grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
 gap: 10px;
 }
 .entry-events-list {
 display: flex; gap: 6px; flex-wrap: wrap;
 }
 .entry-event-chip {
 padding: 6px 14px; background: #f8fafc;
 border: 1.5px solid var(--border-strong);
 border-radius: 20px; cursor: pointer; font-size: 13px;
 user-select: none;
 }
 .entry-event-chip.selected {
 background: var(--pri); color: #fff; border-color: var(--pri);
 }

 /* 対戦相手別戦績 (H2H) */
 .h2h-table { width: 100%; font-size: 13px; }
 .h2h-table th, .h2h-table td { padding: 6px 8px; text-align: center; }
 .h2h-table th { background: #f1f5f9; color: var(--sub); font-size: 11px; }
 .h2h-table tbody tr:hover { background: #f8fafc; cursor: pointer; }
 .h2h-table .h2h-name { text-align: left; font-weight: 600; }
 .h2h-table .h2h-wl { font-family: monospace; }
 .h2h-rate-bar {
 height: 4px; background: var(--border); border-radius: 2px;
 overflow: hidden; min-width: 50px;
 }
 .h2h-rate-bar-fill {
 height: 100%; background: var(--accent);
 }

 /* 種目別統計 */
 .event-stats-grid {
 display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
 gap: 8px;
 }
 .event-stat-card {
 background: #f8fafc; border-radius: var(--radius); padding: 10px;
 }
 .event-stat-title { font-size: 12px; font-weight: 700; color: var(--pri); margin-bottom: 4px; }
 .event-stat-row { font-size: 11px; color: var(--sub); display: flex; justify-content: space-between; }
</style>
</head>
<body>

<!-- KTTA Platform ヒーロー -->
<div class="hero">
 <div class="hero-inner">
 <a class="ktta-logo ktta-logo--inverse" href="/viewer">
   <span class="ktta-logo-mark" aria-hidden="true"></span>
   <span class="ktta-logo-text">
     <span class="ktta-logo-name">KTTA Platform</span>
     <span class="ktta-logo-tag">KUSHIRO · TABLE TENNIS</span>
   </span>
 </a>
 <div class="live-indicator">
   <span class="live-dot"></span> LIVE
 </div>
 </div>
</div>

<!-- タブ -->
<div class="tabs">
 <div class="tabs-in">
 <button class="tab active" data-tab="live">大会進行</button>
 <button class="tab" data-tab="myportal">マイ番号</button>
 <button class="tab" data-tab="search">選手データベース</button>
 <button class="tab" data-tab="tournaments">大会一覧</button>
 <a class="tab" href="/viewer/live/" style="text-decoration:none;color:inherit;border-left:1px solid var(--border);margin-left:8px;padding-left:14px">観戦ビュー (大画面)</a>
 </div>
</div>

<!-- 検索バー（選手検索タブでのみ表示） -->
<div class="search-bar hidden" id="searchBar">
 <div class="search-bar-in">
 <input type="text" class="search-input" id="searchInput" placeholder="選手名・ふりがな・所属で検索…">
 <select id="searchGender" class="input" style="width:100px">
 <option value="all">全性別</option>
 <option value="male">男子</option>
 <option value="female">女子</option>
 </select>
 <select id="searchCat" class="input" style="width:110px">
 <option value="all">全カテゴリ</option>
 <option value="general">一般</option>
 <option value="high">高校</option>
 <option value="middle">中学</option>
 <option value="elementary">小学</option>
 <option value="senior">シニア</option>
 </select>
 </div>
</div>

<!-- メインコンテンツ -->
<div class="container" style="padding-top:16px; padding-bottom:40px">

 <!-- 大会一覧 -->
 <div class="tab-panel hidden" id="tab-tournaments">
 <div id="tournamentList"></div>
 </div>

 <!-- 選手データベース (検索のみ) -->
 <div class="tab-panel hidden" id="tab-search">
 <div id="searchStatus" class="text-sub text-sm mb-2" style="padding:0 4px"></div>
 <div id="playerList" class="player-list"></div>
 </div>

 <!-- 大会進行 (Live - デフォルト) -->
 <div class="tab-panel" id="tab-live">
 <div class="card">
 <div class="card-head">
 <div class="card-title">大会進行</div>
 <select class="input input-sm" id="liveTournamentSel" style="width:240px"></select>
 </div>
 <div id="liveMain"></div>
 </div>
 </div>

 <!-- マイ番号 (選手個人ポータル) -->
 <div class="tab-panel hidden" id="tab-myportal">
 <div id="myportalMain"></div>
 </div>

 <!-- 大会詳細 (トーナメント表) -->
 <div class="tab-panel hidden" id="tab-detail">
 <div class="breadcrumb">
 <a href="#" onclick="V.showTab('tournaments');return false">大会一覧に戻る</a>
 </div>
 <div id="tournamentDetail"></div>
 </div>

 <!-- 選手プロフィール -->
 <div class="tab-panel hidden" id="tab-player">
 <div class="breadcrumb">
 <a href="#" onclick="history.back();return false">戻る</a>
 </div>
 <div id="playerDetail"></div>
 </div>

</div>

<script src="/shared/common.js"></script>
<script>
const { h, esc, api, toast, ratingBadge, fmtDate, fmtDateShort, createPoller, clear } = TT;

// ─── ビューアーアプリ ────────────────────────────────
const V = {
 activeTab: "tournaments",
 state: { tournaments: [], players: [], stats: null, currentTournament: null, currentPlayer: null },

 async init() {
 // タブクリック
 document.querySelectorAll(".tab").forEach(t => {
 t.addEventListener("click", () => V.showTab(t.dataset.tab));
 });

 // 検索入力
 const si = document.getElementById("searchInput");
 let timer;
 si.addEventListener("input", () => {
 clearTimeout(timer);
 timer = setTimeout(() => V.doSearch(), 250);
 });
 document.getElementById("searchGender").addEventListener("change", () => V.doSearch());
 document.getElementById("searchCat").addEventListener("change", () => V.doSearch());

 // 初回ロード
 await V.reload();

 // URLハッシュ処理（#tournament/abc, #player/xyz）
 V.handleHash();
 window.addEventListener("hashchange", () => V.handleHash());

 // 自動更新ポーラー
 createPoller(() => V.reload()).start(() => {
 V.reload();
 // 詳細ページも再取得
 if (V.state.currentTournament) V.openTournament(V.state.currentTournament.id, false);
 if (V.state.currentPlayer) V.openPlayer(V.state.currentPlayer.id, false);
 });
 },

 handleHash() {
 const h = location.hash.slice(1);
 if (!h) return V.showTab("tournaments");
 const [type, id] = h.split("/");
 if (type === "tournament" && id) V.openTournament(id);
 else if (type === "player" && id) V.openPlayer(id);
 else V.showTab(type || "live");
 },

 showTab(name) {
 V.activeTab = name;
 document.querySelectorAll(".tab").forEach(t =>
 t.classList.toggle("active", t.dataset.tab === name)
 );
 document.querySelectorAll(".tab-panel").forEach(p => p.classList.add("hidden"));
 const panel = document.getElementById("tab-" + name);
 if (panel) panel.classList.remove("hidden");
 document.getElementById("searchBar").classList.toggle("hidden", name !== "search");

 m.winner_name)
 : h("span", {}, m.winner_name || "?"),
 m.winner_team ? h("span", { className: "match-team" }, `(${m.winner_team})`) : null,
 ),
 h("div", { className: "match-sets" }, V.formatSets(m.sets, true)),
 h("div", { className: "match-score" }, String(m.winner_sets || 0)),
 ));
 // 敗者行
 card.appendChild(h("div", { className: "match-row loser" },

 h("span", { style: { fontSize: "12px", color: "var(--sub-l)" } }, ""),

 ? h("a", { href: "#player/" + m.loser_id,

 formatSets(sets, isWinner) {
 if (!Array.isArray(sets) || !sets.length) return "";
 return sets.map(s => {
 if (!Array.isArray(s) || s.length !== 2) return "-";
 return isWinner ? `${s[0]}` : `${s[1]}`;
 }).join(" ");
 },

 // 選手視点の試合行 (○勝ち / ×負け を色とラベルで明快に)
 renderPlayerMatchRow(m, playerId) {
 const won = m.winner_id === playerId;
 const oppId = won ? m.loser_id : m.winner_id;
 const oppName = won ? (m.loser_name || "?") : (m.winner_name || "?");
 const oppTeam = won ? m.loser_team : m.winner_team;
 const myScore = won ? (m.winner_sets || 0) : (m.loser_sets || 0);
 const oppScore = won ? (m.loser_sets || 0) : (m.winner_sets || 0);
 // 各セットの点数 (自分視点)
 const setsStr = Array.isArray(m.sets) && m.sets.length
   ? m.sets.map(s => Array.isArray(s) && s.length === 2
       ? (won ? s[0] + "-" + s[1] : s[1] + "-" + s[0]) : "").filter(Boolean).join("  ")
   : "";
 const oppNameEl = oppId
   ? h("a", { href: "#player/" + oppId,
       onClick: (e) => { e.preventDefault(); V.openPlayer(oppId); } }, oppName)
   : h("span", {}, oppName);
 return h("div", { className: "pm-row " + (won ? "win" : "loss") },
 h("div", { className: "pm-result" }, won ? "○\n勝ち" : "×\n負け"),
 h("div", { className: "pm-opp" },
   h("div", { className: "pm-opp-label" }, "対戦相手"),
   h("div", { className: "pm-opp-name" }, oppNameEl,
     oppTeam ? h("span", { className: "pm-opp-team" }, " (" + oppTeam + ")") : null),
   (m.event || m.round) ? h("div", { className: "pm-opp-ev" },
     [m.event, m.round].filter(Boolean).join(" ")) : null,
 ),
 h("div", { className: "pm-score" }, myScore + " - " + oppScore,
   setsStr ? h("span", { className: "pm-score-sets" }, setsStr) : null),
 );
 },

// 進行中 (Live) モジュール - 閲覧用
// ═══════════════════════════════════════════════════════
const L = {
 tournamentId: null,
 state: null,
 poller: null,

 async init() {
 const sel = document.getElementById("liveTournamentSel");
 if (!sel.options.length) {
 // 大会セレクタを初期化
 clear(sel);
 sel.appendChild(h("option", { value: "" }, "— 大会を選択 —"));
 (V.state.tournaments || []).forEach(t =>
 sel.appendChild(h("option", { value: t.id }, t.name)));
 sel.addEventListener("change", () => L.select(sel.value));
 // デフォルト: ongoing大会
 const def = (V.state.tournaments || []).find(t => t.status === "ongoing")
 || (V.state.tournaments || [])[0];
 if (def) { sel.value = def.id; L.select(def.id); return; }
 } else {
 // 再開
 if (L.tournamentId) L.fetch();
 }
 if (!sel.value) {
 document.getElementById("liveMain").innerHTML = '<div class="empty-state">大会を選択してください。</div>';
 }
 },

 select(id) {
 L.tournamentId = id;
 if (L.poller) clearInterval(L.poller);
 if (!id) { document.getElementById("liveMain").innerHTML = ""; return; }
 L.fetch();
 L.poller = setInterval(() => L.fetch(), 4000);
 },

 async fetch() {
 if (!L.tournamentId) return;
 try {
 const r = await api.get("/api/public/tournaments/" + L.tournamentId + "/live");
 if (r.error) return;
 L.state = r;
 L.render();
 } catch (e) { console.error(e); }
 },

 render() {
 const main = document.getElementById("liveMain");
 if (!L.state) return;
 clear(main);
 const s = L.state;

 // 統計
 main.appendChild(h("div", { className: "live-stats" },
 h("div", { className: "live-stat" },
 h("div", { className: "live-stat-num", style: { color: "var(--accent)" } },
 String(s.on_table.length)),
 h("div", { className: "stat-label" }, "進行中")),
 h("div", { className: "live-stat" },
 h("div", { className: "live-stat-num", style: { color: "var(--warn)" } },
 String(s.callable.length)),
 h("div", { className: "stat-label" }, "次に呼ぶ")),
 h("div", { className: "live-stat" },
 h("div", { className: "live-stat-num", style: { color: "var(--pri)" } },
 String(s.waiting)),
 h("div", { className: "stat-label" }, "待機中")),
 h("div", { className: "live-stat" },
 h("div", { className: "live-stat-num", style: { color: "var(--ok)" } },
 String(s.recent_finished.length)),
 h("div", { className: "stat-label" }, "終了")),
 h("div", { className: "live-stat" },
 h("div", { className: "live-stat-num" }, String(s.total_matches)),
 h("div", { className: "stat-label" }, "総試合")),
 ));

 // 台レイアウト
 main.appendChild(L.renderCourtGrid(s));

 // 進行中
 if (s.on_table.length) {
 main.appendChild(h("div", { className: "section-title mt-3" }, "進行中"));
 s.on_table.forEach(m => {
 main.appendChild(h("div", { className: "live-match-card" },
 h("div", { className: "live-tno" }, "台" + m.table_no),
 h("div", {},
 h("div", { className: "text-xs text-sub mb-1" }, `${m.event} ${m.round}`),
 h("div", { style: { fontSize: "14px", fontWeight: 700 } },
 `${m.player1_name}${m.player1_team ? " (" + m.player1_team + ")" : ""}`,
 h("span", { style: { color: "var(--sub)", margin: "0 8px" } }, "VS"),
 `${m.player2_name}${m.player2_team ? " (" + m.player2_team + ")" : ""}`),
 m.referee_name ? h("div", { className: "text-xs text-sub mt-1" },
 "審判: " + m.referee_name) : null,
 ),
 ));
 });
 }

 // 次に呼ぶ
 if (s.callable.length) {
 main.appendChild(h("div", { className: "section-title mt-3" },
 "次に呼べる対戦 (" + s.callable.length + ")"));
 s.callable.slice(0, 10).forEach(m => {
 main.appendChild(h("div", { className: "next-callable" },
 h("span", { className: "badge" }, `${m.event} ${m.round}`),
 h("div", {},
 `${m.player1_name} vs ${m.player2_name}`,
 m.referee_name ? h("span", { className: "text-xs text-sub", style: { marginLeft: "8px" } },
 "(審判: " + m.referee_name + ")") : null,
 ),
 ));
 });
 }

 // 直近結果
 if (s.recent_finished.length) {
 main.appendChild(h("div", { className: "section-title mt-3" }, "直近の結果"));
 s.recent_finished.slice(0, 6).forEach(m => {
 const card = h("div", { className: "match-card", style: { marginBottom: "4px" } });
 // 勝者
 card.appendChild(h("div", { className: "match-row winner" },
 h("div", { className: "match-player-name" },
 h("span", { style: { color: "var(--warn)" } }, ""),
 h("span", {}, m.winner_name),
 m.winner_team ? h("span", { className: "match-team" }, "(" + m.winner_team + ")") : null,
 ),
 h("div", { className: "match-sets" }, V.formatSets(m.sets, true)),
 h("div", { className: "match-score" }, String(m.winner_sets || 0)),
 ));
 card.appendChild(h("div", { className: "match-row loser" },

 ),
 h("div", { className: "match-sets" }, V.formatSets(m.sets, false)),
 h("div", { className: "match-score" }, String(m.loser_sets || 0)),
 ));
 main.appendChild(card);
 });
 }
 },

 renderCourtGrid(s) {
 const { court_rows, court_cols, hq_position } = s.tournament;
 const wrap = h("div", { className: "live-court-wrap" });
 const grid = h("div", { className: "live-court-grid" });
 grid.style.gridTemplateColumns = `repeat(${court_cols}, 1fr)`;
 grid.style.maxWidth = `${court_cols * 80}px`;

 s.tables.forEach(t => {
 const cell = h("div", { className: "live-court-cell " + (t.match ? "active" : "empty") });
 cell.appendChild(h("div", { className: "live-court-no" }, "台" + t.table_no));
 if (t.match) {
 cell.appendChild(h("div", { className: "live-court-match" },
 h("div", {}, t.match.player1_name),
 h("div", { style: { fontSize: "9px", color: "var(--sub)" } }, "vs"),
 h("div", {}, t.match.player2_name),
 ));
 } else {
 cell.appendChild(h("div", { className: "text-xs text-sub" }, "空"));
 }
 grid.appendChild(cell);
 });

 wrap.appendChild(grid);
 if (hq_position === "bottom") {
 wrap.appendChild(h("div", { className: "live-court-hq",
 style: { maxWidth: `${court_cols * 80}px`, marginLeft: "auto", marginRight: "auto" } },
 "本部"));
 }
 return wrap;
 },
};

 notifEnabled: false,

 async init() {
 MP.playerId = localStorage.getItem("tt_player_id") || null;
 if (MP.poller) clearInterval(MP.poller);

 if (!MP.playerId) {
 MP.renderRegister();
 } else {
 await MP.fetch();
 MP.poller = setInterval(() => MP.fetch(), 5000);
 }
 },

 // ── 選手番号登録画面 ──
 async renderRegister(prefilled) {
 const main = document.getElementById("myportalMain");
 clear(main);

 const card = h("div", { className: "card fi" },
 h("div", { className: "card-head" },
 h("div", { className: "card-title" }, "マイ番号を登録"),
 ),
 h("div", { className: "text-sm text-sub mb-3" },
 "あなたが大会にエントリーしているなら、自分の名前を検索して選んでください。"),
 h("div", { className: "field" },
 h("label", { className: "field-label" }, "選手名・所属で検索"),
 h("input", { className: "input", id: "mpSearchInput",
 placeholder: "例: 山田 太郎、高校", autocomplete: "off",
 value: prefilled || "" }),
 ),
 h("div", { id: "mpSearchResults" }),
 h("div", { className: "text-xs text-sub mt-3" },
 "ヒント: 一度登録すると、このスマホで自動的にあなたの試合状況が表示されます。"),
 );
 main.appendChild(card);

 const input = document.getElementById("mpSearchInput");
 const results = document.getElementById("mpSearchResults");
 let timer;
 input.addEventListener("input", () => {
 clearTimeout(timer);
 timer = setTimeout(async () => {
 const q = input.value.trim();
 clear(results);
 if (!q) return;
 const players = await api.get("/api/public/players?search=" + encodeURIComponent(q));
 if (!players.length) {
 results.appendChild(h("div", { className: "empty-state" },
 "該当する選手が見つかりません"));
 return;
 }
 players.slice(0, 10).forEach(p => {
 results.appendChild(h("div", {
 className: "player-card",
 onClick: () => MP.selectPlayer(p.id, p.name),
 style: { marginBottom: "6px" }
 },
 h("div", { className: "player-avatar " +
 (p.gender === "female" ? "female" : "") },
 (p.name || "?")[0]),
 h("div", { className: "player-info" },
 h("div", { className: "player-name" }, p.name),
 h("div", { className: "player-meta" },
 p.team || "—",
 p.furigana ? " / " + p.furigana : "")),
 ));
 });
 }, 250);
 });
 input.focus();
 },

 async selectPlayer(id, name) {
 if (!confirm(`「${name}」として登録します。よろしいですか？`)) return;
 MP.playerId = id;
 localStorage.setItem("tt_player_id", id);
 // ブラウザ通知の許可を要求
 if ("Notification" in window && Notification.permission === "default") {
 try { await Notification.requestPermission(); } catch {}
 }
 MP.notifEnabled = ("Notification" in window) && Notification.permission === "granted";
 await MP.init();
 },

 logout() {
 if (!confirm("登録を解除しますか？")) return;
 localStorage.removeItem("tt_player_id");
 MP.playerId = null;
 if (MP.poller) clearInterval(MP.poller);
 MP.init();
 },

 async fetch() {
 if (!MP.playerId) return;
 try {
 const r = await api.get("/api/public/players/" + MP.playerId + "/live-status");
 if (r.error) {
 // 選手削除等
 localStorage.removeItem("tt_player_id");
 MP.playerId = null;
 return MP.init();
 }
 const prevState = MP.state?.my_state;
 MP.state = r;
 MP.render();
 // 状態が「callable」(呼出可能) になった瞬間 or 「playing」になった瞬間に通知
 const newKey = r.my_state + "|" + (r.current?.id || r.next?.id || "");
 if (newKey !== MP.lastNotified) {
 if ((prevState && prevState !== "callable" && r.my_state === "callable")
 || (prevState && prevState !== "playing" && r.my_state === "playing")) {
 MP.notify(r);
 }
 MP.lastNotified = newKey;
 }
 } catch (e) { console.error(e); }
 },

 // ── 通知発火 (ブラウザ通知 + 音 + バイブ) ──
 notify(r) {
 const isCallable = r.my_state === "callable";
 const isPlaying = r.my_state === "playing";
 const m = r.current || r.next;
 if (!m) return;
 const oppName = m.player1_id === MP.playerId ? m.player2_name : m.player1_name;
 const title = isCallable ? "あなたの試合です!" : isPlaying ? "試合開始" : "ステータス変化";
 const body = `${m.event} ${m.round}\nvs ${oppName}` +
 (m.table_no ? `\n台${m.table_no}` : "");

 // ブラウザ通知
 if ("Notification" in window && Notification.permission === "granted") {
 try {
 const n = new Notification(title, {
 body, icon: "/favicon.ico", tag: "tt-call",
 requireInteraction: true,
 });
 n.onclick = () => { window.focus(); n.close(); };
 } catch {}
 }
 // 音 (Web Audio で beep)
 MP.beep();
 // バイブ (Android)
 if (navigator.vibrate) {
 navigator.vibrate([300, 150, 300, 150, 300]);
 }
 },

 beep() {
 try {
 const ctx = new (window.AudioContext || window.webkitAudioContext)();
 const osc = ctx.createOscillator();
 const gain = ctx.createGain();
 osc.connect(gain); gain.connect(ctx.destination);
 osc.type = "sine"; osc.frequency.value = 880;
 gain.gain.setValueAtTime(0.3, ctx.currentTime);
 gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
 osc.start(); osc.stop(ctx.currentTime + 1.0);
 // 2発目
 setTimeout(() => {
 const o2 = ctx.createOscillator();
 const g2 = ctx.createGain();
 o2.connect(g2); g2.connect(ctx.destination);
 o2.type = "sine"; o2.frequency.value = 1100;
 g2.gain.setValueAtTime(0.3, ctx.currentTime);
 g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
 o2.start(); o2.stop(ctx.currentTime + 0.8);
 }, 400);
 } catch (e) { console.warn("beep failed", e); }
 },

 render() {
 const main = document.getElementById("myportalMain");
 clear(main);
 const s = MP.state;
 if (!s) return;

 // ── ヘッダー (誰として登録中か) ──
 main.appendChild(h("div", {
 className: "card",
 style: { background: "linear-gradient(135deg,var(--pri) 0%,var(--pri-l) 100%)",
 color: "#fff", display: "flex", alignItems: "center", gap: "12px",
 padding: "14px 18px" }
 },
 h("div", { className: "player-avatar",
 style: { width: "44px", height: "44px", background: "rgba(255,255,255,.2)", color: "#fff",
 fontSize: "18px" } }, (s.player.name || "?")[0]),
 h("div", { className: "flex-1" },
 h("div", { className: "font-bold", style: { fontSize: "16px" } }, s.player.name),
 h("div", { className: "text-xs", style: { opacity: .85 } },
 s.player.team || "—"),
 ),
 h("button", { className: "btn btn-sm btn-ghost",
 style: { background: "rgba(255,255,255,.2)", color: "#fff", border: "none" },
 onClick: () => MP.logout() }, "登録解除"),
 ));

 // ── 通知許可未取得時の促し ──
 if ("Notification" in window && Notification.permission === "default") {
 main.appendChild(h("div", { className: "card",
 style: { background: "#fef3c7", borderColor: "#d97706", padding: "10px 14px" } },
 h("div", { className: "flex gap-2", style: { alignItems: "center" } },
 h("span", { style: { fontSize: "20px" } }, ""),
 h("div", { className: "flex-1 text-sm" },
 "呼び出しの通知を受け取るには許可が必要です"),
 h("button", { className: "btn btn-sm",
 onClick: async () => {
 const p = await Notification.requestPermission();
 MP.notifEnabled = p === "granted";
 MP.render();
 } }, "通知を許可"),
 )));
 }

 // ── 大会情報 ──
 if (!s.tournament) {
 main.appendChild(h("div", { className: "empty-state" },
 "出場中の大会がありません。大会が始まると自動で表示されます。"));
 return;
 }
 main.appendChild(h("div", { className: "card",
 style: { padding: "10px 14px", marginBottom: "10px" } },
 h("div", { className: "text-xs text-sub" }, "出場大会"),
 h("div", { className: "font-bold" }, s.tournament.name),
 h("div", { className: "text-xs text-sub" },
 `${s.tournament.venue || ""} ${s.tournament.date || ""}`)));

 // ── メインステータス表示 (これが一番大きい) ──
 main.appendChild(MP.renderStatus(s));

 // ── 次の試合(対戦相手等) ──
 if (s.my_state === "waiting" && s.next) {
 main.appendChild(MP.renderNextMatch(s));
 }

 // ── 審判担当中の試合 ──
 if (s.refereeing) {
 main.appendChild(h("div", { className: "card fi",
 style: { background: "#fef3c7", borderColor: "#d97706" } },
 h("div", { className: "font-bold", style: { color: "#92400e" } },
 "あなたは審判担当中です"),
 h("div", { className: "text-sm mt-1" },
 `台${s.refereeing.table_no} の試合が終了するまで他の試合に出られません`),
 h("div", { className: "text-sm mt-1" },
 `${s.refereeing.player1_name} vs ${s.refereeing.player2_name}`),
 ));
 }

 // ── 直近結果 ──
 if (s.recent && s.recent.length) {
 const recentCard = h("div", { className: "card fi" },
 h("div", { className: "card-head" },
 h("div", { className: "card-title" }, "直近の結果")),
 );
 s.recent.forEach(r => {
 const won = r.winner_id === MP.playerId;
 const opp = won ? r.loser_name : r.winner_name;
 recentCard.appendChild(h("div", {
 style: { padding: "8px 0", borderBottom: "1px solid var(--border)",
 display: "flex", justifyContent: "space-between", alignItems: "center" }
 },
 h("div", {},
 h("div", { className: "text-xs text-sub" }, `${r.event} ${r.round}`),
 h("div", { className: won ? "font-bold" : "" },
 `${won ? "勝" : "負"}: vs ${opp}`)),
 h("div", { style: { fontFamily: "monospace" } },
 `${r.winner_sets}-${r.loser_sets}`)
 ));
 });
 main.appendChild(recentCard);
 }

 // ── 通知テスト ──
 main.appendChild(h("div", { className: "text-center mt-3" },
 h("button", { className: "btn btn-sm btn-ghost",
 onClick: () => { MP.beep(); if (navigator.vibrate) navigator.vibrate([200,100,200]); } },
 "通知テスト")));
 },

 renderStatus(s) {
 const states = {
 callable: { icon: "", title: "あなたの試合です!", color: "#dc2626", bg: "#fef2f2",
 sub: "係員の呼び出しに従って準備してください" },
 playing: { icon: "", title: "進行中", color: "#d97706", bg: "#fffbeb",
 sub: "現在試合中です。頑張ってください!" },
 waiting: { icon: "", title: "次の試合を待機中", color: "#1e3a8a", bg: "#eff6ff",
 sub: "対戦相手が決まり次第呼び出されます" },
 refereeing: { icon: "", title: "審判担当中", color: "#d97706", bg: "#fffbeb",
 sub: "担当試合終了まで他の試合に出られません" },
 finished: { icon: "", title: "全試合終了", color: "#059669", bg: "#ecfdf5",
 sub: "お疲れさまでした" },
 idle: { icon: "", title: "待機", color: "#64748b", bg: "#f1f5f9",
 sub: "現在予定の試合はありません" },
 };
 const ss = states[s.my_state] || states.idle;
 const m = s.current || s.next;
 const opp = m
 ? (m.player1_id === MP.playerId ? m.player2_name : m.player1_name)
 : null;
 const oppTeam = m
 ? (m.player1_id === MP.playerId ? m.player2_team : m.player1_team)
 : null;

 return h("div", { className: "card fi",
 style: { background: ss.bg, borderColor: ss.color, borderWidth: "3px",
 padding: "20px", textAlign: "center", marginBottom: "12px" } },
 h("div", { style: { fontSize: "56px", lineHeight: 1, marginBottom: "8px" } }, ss.icon),
 h("div", { style: { fontSize: "22px", fontWeight: 700, color: ss.color,
 marginBottom: "6px" } }, ss.title),
 h("div", { className: "text-sm text-sub", style: { marginBottom: "12px" } }, ss.sub),
 m && opp ? h("div", { style: { marginTop: "12px",
 padding: "12px", background: "#fff", borderRadius: "8px" } },
 h("div", { className: "text-xs text-sub" }, `${m.event} ${m.round}`),
 h("div", { style: { fontSize: "18px", fontWeight: 700, marginTop: "4px" } },
 `vs ${opp}`),
 oppTeam ? h("div", { className: "text-sm text-sub" }, oppTeam) : null,
 (s.my_state === "callable" || s.my_state === "playing") && m.table_no
 ? h("div", { style: { fontSize: "32px", fontWeight: 700, color: ss.color,
 marginTop: "8px" } }, "台 " + m.table_no)
 : null,
 ) : null,
 );
 },

 renderNextMatch(s) {
 const m = s.next;
 if (!m) return null;
 const opp = m.player1_id === MP.playerId ? m.player2_name : m.player1_name;
 return h("div", { className: "card fi" },
 h("div", { className: "card-head" },
 h("div", { className: "card-title" }, "次の試合"),
 ),
 h("div", { className: "text-sm" },
 h("div", {}, `${m.event} ${m.round}`),
 h("div", { className: "font-bold mt-1" },
 `vs ${opp || "(相手未確定)"}`),
 h("div", { className: "text-xs text-sub mt-2" },
 m.player1_name && m.player2_name && m.player1_name !== "BYE" && m.player2_name !== "BYE"
 ? "両者揃いました。呼び出しをお待ちください。"
 : "対戦相手が確定するまでお待ちください。"),
 ),
 );
 },
};
</script>

</body>
</html>
