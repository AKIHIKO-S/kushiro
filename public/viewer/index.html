<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KTTA Platform - 試合結果・選手検索</title>
<!-- PWA / iOS ホーム画面追加 (マイ番号のプッシュ通知に必要) #268-push -->
<meta name="theme-color" content="#15803d">
<link rel="manifest" href="/viewer/manifest.webmanifest">
<link rel="apple-touch-icon" href="/shared/assets/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="マイ番号">
<link rel="stylesheet" href="/shared/common.css">
<style>
 /* viewer 専用の追加スタイル */
 .hero {
 /* トンマナ(タンチョウ/卓球=ティール〜グリーン)の濃色グラデ + 薄い斜めライン模様。軽量(CSSのみ) */
 background:
   repeating-linear-gradient(135deg, rgba(255,255,255,.045) 0 2px, rgba(255,255,255,0) 2px 24px),
   radial-gradient(120% 180% at 90% -40%, rgba(94,234,212,.18), rgba(94,234,212,0) 60%),
   linear-gradient(100deg, #0f172a 0%, #134e4a 55%, #0f766e 118%);
 color: var(--ink-0);
 padding: 14px 0;
 border-bottom: 3px solid #5eead4;
 position: sticky; top: 0; z-index: 50;
 box-shadow: 0 2px 14px rgba(0,0,0,.20);
 }
 .hero-inner {
 max-width: 1200px; margin: 0 auto; padding: 0 20px;
 display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
 }
 .hero-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
 .hero-sub { font-size: 11px; opacity: .8; }
 .live-indicator {
 display: inline-flex; align-items: center; gap: 6px;
 background: rgba(255,255,255,.06);
 border: 1px solid rgba(255,255,255,.12);
 padding: 5px 12px; border-radius: 14px;
 font-size: 10px; font-weight: 600;
 letter-spacing: 0.1em; text-transform: uppercase;
 }
 .live-dot {
 width: 7px; height: 7px; border-radius: 50%; background: #10b981;
 animation: pulse 1.5s infinite;
 box-shadow: 0 0 0 2px rgba(16,185,129,.25);
 }
 @media (max-width: 480px) {
 .hero-inner { padding: 0 12px; }
 .ktta-logo-tag { display: none; }
 }
 @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

 .search-bar {
 background: #fff; padding: 12px 16px;
 border-bottom: 1px solid var(--border);
 position: sticky; top: 0; z-index: 50;
 }
 .search-bar-in {
 max-width: 1100px; margin: 0 auto;
 display: flex; gap: 8px; align-items: center;
 }
 .search-input {
 flex: 1; padding: 10px 14px 10px 38px;
 border: 1px solid var(--border-strong); border-radius: 24px;
 background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%2364748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') no-repeat 12px center;
 font-size: 14px;
 }

 /* 選手カード */
 .player-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
 .player-card {
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 12px 14px;
 display: flex; align-items: center; gap: 10px;
 cursor: pointer; transition: all .15s;
 }
 .player-card:hover { border-color: var(--pri-l); box-shadow: 0 2px 8px rgba(30,58,138,.08); transform: translateY(-1px); }
 .player-avatar {
 width: 40px; height: 40px; border-radius: 50%;
 background: var(--pri-bg); color: var(--pri);
 display: inline-flex; align-items: center; justify-content: center;
 font-size: 16px; font-weight: 700; flex: 0 0 40px;
 }
 .player-avatar.female { background: #fce7f3; color: #be185d; }
 .player-info { flex: 1; min-width: 0; }
 .player-name { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
 .player-meta { font-size: 11px; color: var(--sub); display: flex; gap: 6px; }

 /* 大会一覧 */
 .tournament-card {
 display: grid; grid-template-columns: auto 1fr auto;
 gap: 14px; align-items: center;
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 14px 18px;
 margin-bottom: 8px; cursor: pointer; transition: all .15s;
 }
 .tournament-card:hover { border-color: var(--pri-l); box-shadow: 0 2px 10px rgba(30,58,138,.08); }
 .tournament-date {
 background: var(--pri-bg); color: var(--pri);
 padding: 6px 10px; border-radius: 6px;
 font-size: 12px; font-weight: 700; text-align: center; min-width: 60px;
 }
 .tournament-date .month { font-size: 10px; font-weight: 400; }
 .tournament-title { font-weight: 700; font-size: 15px; }
 .tournament-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }
 .tournament-arrow { color: var(--sub-l); font-size: 20px; }

 /* ステータスバッジ */
 .status-scheduled { background: var(--pri-bg); color: var(--pri); }
 .status-preparation { background: #ede9fe; color: #6d28d9; }
 .status-ongoing { background: #fef3c7; color: #ca8a04; }
 .status-completed { background: var(--ok-bg); color: var(--ok); }

 /* 選手詳細戦績テーブル */
 .profile-head {
 display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center;
 padding: 20px; background: linear-gradient(135deg, var(--pri) 0%, var(--pri-l) 100%);
 color: #fff; border-radius: var(--radius) var(--radius) 0 0;
 }
 .profile-avatar {
 width: 72px; height: 72px; border-radius: 50%;
 background: rgba(255,255,255,.2); color: #fff;
 display: inline-flex; align-items: center; justify-content: center;
 font-size: 28px; font-weight: 700;
 }
 .profile-name { font-size: 22px; font-weight: 700; }
 .profile-sub { font-size: 13px; opacity: .85; margin-top: 4px; }
 .profile-stats { display: flex; gap: 16px; font-size: 11px; }
 .profile-stat-num { font-size: 20px; font-weight: 700; display: block; }
 .profile-body { padding: 16px; }

 /* セクション見出し */
 .section-title {
 font-size: 13px; font-weight: 700; color: var(--sub);
 padding: 8px 0; margin-bottom: 10px;
 border-bottom: 2px solid var(--border);
 display: flex; align-items: center; gap: 6px;
 }

 /* ★ 大会結果: 横並び 勝者-スコア-敗者 (どっちが勝ったか明快) */
 .mr-acc { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; background: #fff; }
 .mr-acc-head {
   display: flex; align-items: center; gap: 10px;
   padding: 11px 14px; cursor: pointer;
   background: linear-gradient(135deg, #fafafa, #f4f4f5);
   border-bottom: 1px solid var(--border);
 }
 .mr-acc-head:hover { background: #f4f4f5; }
 .mr-acc-title { font-weight: 700; font-size: 14px; flex: 1; }
 .mr-acc-count { font-size: 11px; color: var(--sub); background: var(--ink-100);
   padding: 3px 9px; border-radius: 10px; font-family: var(--font-mono); }
 .mr-acc-head::after { content: "›"; font-size: 20px; color: var(--sub);
   transform: rotate(90deg); transition: transform .15s; }
 .mr-acc.open .mr-acc-head::after { transform: rotate(-90deg); }
 .mr-acc-body { display: none; padding: 6px 10px 10px; }
 .mr-acc.open .mr-acc-body { display: block; }
 .mr-round-label { font-size: 11px; font-weight: 700; color: var(--sub);
   margin: 8px 0 4px; padding-left: 2px; }
 .mr-row {
   display: grid; grid-template-columns: 1fr auto 1fr;
   align-items: center; gap: 8px;
   padding: 8px 6px; border-bottom: 1px solid #f1f5f9;
 }
 .mr-row:last-child { border-bottom: none; }
 .mr-win { text-align: right; min-width: 0; }
 .mr-lose { text-align: left; min-width: 0; }
 .mr-pname { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .mr-win .mr-pname { font-weight: 700; color: #15803d; }
 .mr-win .mr-pname::before { content: "○ "; font-size: 12px; }
 .mr-lose .mr-pname { color: var(--sub); }
 .mr-lose .mr-pname::after { content: " ×"; font-size: 11px; color: #b91c1c; }
 .mr-pname a { color: inherit; text-decoration: none; }
 .mr-pname a:hover { text-decoration: underline; }
 .mr-pteam { font-size: 10px; color: var(--sub-l); }
 .mr-vs {
   font-family: var(--font-mono); font-weight: 800; font-size: 16px;
   color: var(--ink-800); white-space: nowrap; padding: 2px 8px;
   background: var(--ink-50); border-radius: 6px; text-align: center;
 }
 @media (max-width: 480px) {
   .mr-pname { font-size: 13px; } .mr-vs { font-size: 14px; padding: 2px 5px; }
 }

 /* ★ 選手視点の試合行 (初心者向け・○勝ち/×負け) */
 .pm-row {
   display: grid; grid-template-columns: 54px 1fr auto;
   gap: 10px; align-items: center;
   padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
   border: 1px solid var(--border); background: #fff;
 }
 .pm-row.win  { border-left: 5px solid #16a34a; background: #f0fdf4; }
 .pm-row.loss { border-left: 5px solid #dc2626; background: #fef2f2; }
 .pm-result {
   font-size: 13px; font-weight: 800; text-align: center;
   border-radius: 8px; padding: 6px 0; line-height: 1.2;
   white-space: pre-line;
 }
 .pm-row.win  .pm-result { background: #16a34a; color: #fff; }
 .pm-row.loss .pm-result { background: #dc2626; color: #fff; }
 .pm-opp { min-width: 0; }
 .pm-opp-label { font-size: 10px; color: var(--sub); }
 .pm-opp-name { font-size: 15px; font-weight: 700; color: var(--ink-900);
   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .pm-opp-name a { color: var(--ink-900); text-decoration: none; }
 .pm-opp-name a:hover { text-decoration: underline; }
 .pm-opp-team { font-size: 11px; color: var(--sub); font-weight: 400; }
 .pm-opp-ev { font-size: 10px; color: var(--sub); margin-top: 1px; }
 .pm-score {
   text-align: right; font-family: var(--font-mono);
   font-size: 20px; font-weight: 800; white-space: nowrap;
 }
 .pm-row.win  .pm-score { color: #15803d; }
 .pm-row.loss .pm-score { color: #b91c1c; }
 .pm-score .pm-score-sets { font-size: 10px; color: var(--sub); font-weight: 400; display: block; }

 /* H2H 平易版 */
 .h2h-clean { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
 .h2h-c-row {
   display: grid; grid-template-columns: 1fr auto;
   gap: 10px; align-items: center; padding: 8px 12px;
   border: 1px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer;
 }
 .h2h-c-row:hover { border-color: var(--pri-l); }
 .h2h-c-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .h2h-c-team { font-size: 11px; color: var(--sub); font-weight: 400; margin-left: 4px; }
 .h2h-c-record { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
 .h2h-c-record .w { color: #15803d; font-weight: 800; font-size: 15px; }
 .h2h-c-record .l { color: #b91c1c; font-weight: 800; font-size: 15px; }
 .h2h-c-record .sep { color: var(--sub-l); }
 .h2h-c-verdict { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
 .h2h-c-verdict.lead { background: #dcfce7; color: #15803d; }
 .h2h-c-verdict.even { background: var(--ink-100); color: var(--ink-600); }
 .h2h-c-verdict.behind { background: #fee2e2; color: #b91c1c; }

 /* イベントグループ */
 .event-group { margin-bottom: 16px; }
 .event-title {
 background: var(--pri);
 color: #fff;
 padding: 8px 14px;
 font-size: 13px; font-weight: 700;
 border-radius: var(--radius) var(--radius) 0 0;
 display: flex; justify-content: space-between; align-items: center;
 }
 .event-count { font-size: 11px; opacity: .8; font-weight: 400; }

 .breadcrumb {
 display: flex; align-items: center; gap: 6px;
 padding: 10px 0; font-size: 12px; color: var(--sub);
 }
 .breadcrumb a { color: var(--pri-l); }

 /* ランキング */
 .rank-card {
 display: grid; grid-template-columns: 36px 1fr auto auto;
 gap: 10px; align-items: center;
 padding: 10px 14px; background: #fff;
 border: 1px solid var(--border);
 border-radius: var(--radius); margin-bottom: 6px;
 }
 .rank-num {
 font-size: 18px; font-weight: 700; text-align: center;
 color: var(--sub);
 }
 .rank-num.gold { color: var(--gold); font-size: 22px; }
 .rank-num.silver { color: var(--silver); font-size: 20px; }
 .rank-num.bronze { color: var(--bronze); font-size: 20px; }
 .rank-name { font-weight: 700; font-size: 14px; }
 .rank-meta { font-size: 11px; color: var(--sub); }
 .rank-rating { font-family: monospace; font-weight: 700; font-size: 15px; color: var(--pri); }
 .rank-wl { font-size: 11px; color: var(--sub); font-family: monospace; }

 @media (max-width: 640px) {
 .hero-title { font-size: 18px; }
 .profile-head { grid-template-columns: auto 1fr; gap: 12px; padding: 14px; }
 .profile-stats { grid-column: 1/-1; justify-content: space-around; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.2); }
 .profile-avatar { width: 56px; height: 56px; font-size: 22px; }
 }

 /* ── 進行中 (Live) ── */
 .live-stats {
 display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
 gap: 8px; margin-bottom: 14px;
 }
 .live-stat {
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 10px; text-align: center;
 }
 .live-stat-num { font-size: 22px; font-weight: 700; line-height: 1; }

 /* viewer用コートグリッド */
 .live-court-wrap {
 background: #f1f5f9; border: 2px solid var(--border-strong);
 border-radius: var(--radius); padding: 16px;
 margin-bottom: 14px; overflow-x: auto;
 -webkit-overflow-scrolling: touch;
 }
 /* 横スクロール案内 (コートが画面幅に収まらない時のみ表示) */
 .live-court-hint {
 display: none; align-items: center; justify-content: center; gap: 6px;
 font-size: 11px; font-weight: 700; color: var(--accent);
 background: #fff5f5; border: 1px dashed var(--accent);
 border-radius: 20px; padding: 4px 12px;
 margin: 0 auto 10px; width: max-content;
 }
 .live-court-grid {
 display: grid; gap: 8px;
 margin: 0 auto;
 width: max-content;
 }
 .live-court-cell {
 background: #fff; border: 2px solid var(--border-strong);
 border-radius: 8px; padding: 20px 6px 6px;
 min-height: 72px; width: 96px;
 display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
 font-size: 11px; position: relative;
 box-sizing: border-box;
 }
 .live-court-cell.empty { background: #f8fafc; color: var(--sub-l); }
 .live-court-cell.active {
 background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
 border-color: var(--accent);
 animation: pulse-cell 2s infinite;
 }
 @keyframes pulse-cell {
 0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, .3); }
 50% { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); }
 }
 .live-court-no {
 position: absolute; top: 3px; left: 0; right: 0;
 font-size: 10px; color: #fff; background: var(--sub);
 font-weight: 700; text-align: center;
 padding: 1px 0; border-radius: 6px 6px 0 0;
 }
 .live-court-cell.active .live-court-no { background: var(--accent); }
 .live-court-match {
 text-align: center; font-weight: 700; font-size: 11px;
 color: var(--accent); line-height: 1.25; margin-top: 2px;
 width: 100%; word-break: keep-all; overflow-wrap: normal;
 }
 .live-court-elapsed { font-size: 9px; color: var(--sub); font-weight: 700; margin-top: 2px; }
 .live-court-hq {
 margin-top: 10px; padding: 10px; background: var(--pri); color: #fff;
 border-radius: 6px; text-align: center; font-weight: 700; font-size: 13px;
 }
 /* 種目名・氏名は単語の途中で改行しない (スペースのみで改行・無ければ1行) */
 .live-match-card .lmc-ev, .live-match-card .lmc-names,
 .un-ev, .un-players, .un-p { word-break: keep-all; overflow-wrap: normal; }
 /* スマホ: コートグリッドを横スクロールさせず画面幅に折り返す (#217) */
 @media (max-width: 640px) {
 .live-court-wrap { overflow-x: visible; padding: 12px 8px; }
 .live-court-hint { display: none !important; }
 .live-court-grid { width: 100% !important;
   grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)) !important; }
 .live-court-cell { width: auto; min-height: 64px; }
 .live-court-hq { width: 100% !important; }
 }

 /* 進行中試合カード */
 .live-match-card {
 background: linear-gradient(90deg, #fffbeb 0%, #fff 100%);
 border: 1px solid var(--warn); border-left: 4px solid var(--accent);
 border-radius: var(--radius); padding: 10px 14px;
 margin-bottom: 6px;
 display: grid; grid-template-columns: auto 1fr;
 gap: 12px; align-items: center;
 }
 .live-tno {
 background: var(--accent); color: #fff;
 padding: 8px 14px; border-radius: 6px;
 font-weight: 700; font-size: 16px; min-width: 60px; text-align: center;
 }
 .next-callable {
 background: #fff; border: 1px dashed var(--pri-l);
 border-radius: var(--radius); padding: 8px 12px;
 margin-bottom: 6px;
 display: grid; grid-template-columns: auto 1fr; gap: 10px;
 font-size: 13px;
 }

 /* ── まもなく呼ばれそうな選手 ── */
 .un-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin: 18px 0 8px; }
 .un-head .un-title { font-size: 15px; font-weight: 800; color: var(--ink-900); }
 .un-head .un-sub { font-size: 11px; color: var(--sub); }
 .un-card {
 display: grid; grid-template-columns: 46px 1fr; gap: 10px; align-items: center;
 background: #fff; border: 1px solid var(--border);
 border-radius: 10px; padding: 10px 12px; margin-bottom: 6px;
 }
 .un-card.is-first {
 border-color: var(--accent);
 background: linear-gradient(135deg, #fff5f5 0%, #fff 60%);
 box-shadow: 0 2px 12px rgba(220,38,38,.10);
 }
 .un-card.is-wait { opacity: .72; }
 .un-rank {
 width: 46px; height: 46px; border-radius: 10px;
 background: var(--ink-100); color: var(--ink-700);
 display: flex; flex-direction: column; align-items: center; justify-content: center;
 font-weight: 800; font-size: 18px; line-height: 1;
 }
 .un-card.is-first .un-rank { background: var(--accent); color: #fff; }
 .un-rank .un-rank-lbl { font-size: 8px; font-weight: 700; opacity: .85; margin-top: 2px; }
 .un-ev { font-size: 11px; color: var(--sub); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
 .un-ev .un-soon {
 background: var(--accent); color: #fff; font-size: 10px; font-weight: 800;
 padding: 1px 9px; border-radius: 10px;
 }
 .un-ev .un-wait-reason {
 background: #fef3c7; color: #92400e; font-size: 10px; font-weight: 700;
 padding: 1px 8px; border-radius: 10px;
 }
 .un-players { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 13px; }
 .un-p { display: inline-flex; align-items: center; gap: 5px; font-weight: 700; color: var(--ink-900); }
 .un-p .un-num {
 font-family: var(--font-mono); font-size: 11px; font-weight: 800;
 background: var(--ink-900); color: #fff; padding: 1px 7px; border-radius: 6px;
 }
 .un-p .un-team { font-size: 11px; color: var(--sub); font-weight: 400; }
 .un-vs { color: var(--sub); font-weight: 800; font-size: 11px; }

 /* ── 試合検索フォーム ── */
 .match-search-form {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
 gap: 8px;
 padding-bottom: 12px;
 border-bottom: 1px solid var(--border);
 }
 .match-search-form .input { padding: 6px 8px; font-size: 13px; }
 .match-search-actions {
 grid-column: 1 / -1;
 display: flex; gap: 8px; justify-content: flex-end;
 padding-top: 8px;
 }

 /* 試合検索結果テーブル */
 .ms-table {
 width: 100%;
 border-collapse: collapse;
 font-size: 13px;
 background: #fff;
 }
 .ms-table thead {
 background: var(--pri);
 color: #fff;
 position: sticky; top: 0;
 }
 .ms-table th {
 padding: 8px 10px; text-align: left;
 font-size: 11px; font-weight: 700;
 letter-spacing: .02em;
 }
 .ms-table td {
 padding: 8px 10px;
 border-bottom: 1px solid var(--border);
 vertical-align: middle;
 }
 .ms-table tbody tr:hover { background: #f8fafc; cursor: pointer; }
 .ms-table .ms-winner { color: var(--accent); font-weight: 700; }
 .ms-table .ms-loser { color: var(--sub); }
 .ms-table .ms-event-cell { white-space: nowrap; font-size: 11px; color: var(--sub); }
 .ms-table .ms-sets { font-family: monospace; font-size: 11px; color: var(--sub); letter-spacing: .05em; }
 .ms-table .ms-score { font-family: monospace; font-weight: 700; font-size: 14px; white-space: nowrap; }

 .ms-pagination {
 display: flex; justify-content: center; gap: 8px;
 padding: 12px 0;
 }
 .ms-pagination button {
 padding: 6px 14px; background: #fff;
 border: 1px solid var(--border-strong);
 border-radius: 6px; font-weight: 600;
 }
 .ms-pagination button:disabled { opacity: .4; }

 /* 申込フォーム */
 .entry-card {
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 16px;
 margin-bottom: 10px;
 }
 .entry-card-head {
 display: grid; grid-template-columns: 1fr auto;
 gap: 10px; align-items: start;
 padding-bottom: 10px;
 border-bottom: 1px solid var(--border);
 margin-bottom: 12px;
 }
 .entry-form-grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
 gap: 10px;
 }
 .entry-events-list {
 display: flex; gap: 6px; flex-wrap: wrap;
 }
 .entry-event-chip {
 padding: 6px 14px; background: #f8fafc;
 border: 1.5px solid var(--border-strong);
 border-radius: 20px; cursor: pointer; font-size: 13px;
 user-select: none;
 }
 .entry-event-chip.selected {
 background: var(--pri); color: #fff; border-color: var(--pri);
 }

 /* 対戦相手別戦績 (H2H) */
 .h2h-table { width: 100%; font-size: 13px; }
 .h2h-table th, .h2h-table td { padding: 6px 8px; text-align: center; }
 .h2h-table th { background: #f1f5f9; color: var(--sub); font-size: 11px; }
 .h2h-table tbody tr:hover { background: #f8fafc; cursor: pointer; }
 .h2h-table .h2h-name { text-align: left; font-weight: 600; }
 .h2h-table .h2h-wl { font-family: monospace; }
 .h2h-rate-bar {
 height: 4px; background: var(--border); border-radius: 2px;
 overflow: hidden; min-width: 50px;
 }
 .h2h-rate-bar-fill {
 height: 100%; background: var(--accent);
 }

 /* 種目別統計 */
 .event-stats-grid {
 display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
 gap: 8px;
 }
 .event-stat-card {
 background: #f8fafc; border-radius: var(--radius); padding: 10px;
 }
 .event-stat-title { font-size: 12px; font-weight: 700; color: var(--pri); margin-bottom: 4px; }
 .event-stat-row { font-size: 11px; color: var(--sub); display: flex; justify-content: space-between; }

 /* ── モバイル: 横はみ出し防止 + ハンバーガーメニュー (#235) ── */
 html, body { overflow-x: hidden; max-width: 100%; }
 .v-burger { display: none; }
 @media (max-width: 640px) {
   .v-burger {
     display: flex; align-items: center; gap: 8px; width: 100%;
     padding: 13px 16px; background: #fff; border: none;
     border-bottom: 1px solid var(--border); font-size: 15px; font-weight: 800;
     color: var(--ink-900); text-align: left; cursor: pointer;
   }
   .tabs { overflow-x: visible; }
   .tabs-in { display: none; flex-direction: column; padding: 0; max-width: none; }
   .tabs-in.open { display: flex; }
   .tabs-in .tab, .tabs-in a.tab {
     width: 100%; text-align: left; padding: 14px 18px;
     border: none; border-bottom: 1px solid var(--border);
     margin: 0 !important; font-size: 15px;
   }
   .tabs-in .tab.active { background: #f1f5f9; }
   /* 選手DB等の横はみ出し対策 (スマホ) */
   .player-list { grid-template-columns: 1fr; }
   .search-bar-in { flex-wrap: wrap; }
   .ms-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
 }
</style>
</head>
<body>

<!-- KTTA Platform ヒーロー -->
<div class="hero">
 <div class="hero-inner">
 <a class="ktta-logo ktta-logo--inverse" href="/viewer">
   <span class="ktta-logo-mark" aria-hidden="true"></span>
   <span class="ktta-logo-text">
     <span class="ktta-logo-name">KTTA Platform</span>
     <span class="ktta-logo-tag">KUSHIRO · TABLE TENNIS · ASSOCIATION</span>
   </span>
 </a>
 <div class="live-indicator" id="liveIndicator" style="display:none">
   <span class="live-dot"></span> LIVE
 </div>
 </div>
</div>

<!-- タブ -->
<div class="tabs">
 <button class="v-burger" id="vBurger" aria-label="メニューを開く">☰ メニュー</button>
 <div class="tabs-in" id="tabsIn">
 <button class="tab active" data-tab="live">大会進行</button>
 <button class="tab" data-tab="myportal">マイ番号</button>
 <button class="tab" data-tab="search">選手データベース</button>
 <button class="tab" data-tab="tournaments">大会一覧</button>
 <a class="tab" href="/viewer/live/" style="text-decoration:none;color:inherit;border-left:1px solid var(--border);margin-left:8px;padding-left:14px">観戦ビュー (大画面)</a>
 </div>
</div>

<!-- 検索バー（選手検索タブでのみ表示） -->
<div class="search-bar hidden" id="searchBar">
 <div class="search-bar-in">
 <input type="text" class="search-input" id="searchInput" placeholder="選手名・ふりがな・所属で検索…">
 <select id="searchGender" class="input" style="width:100px">
 <option value="all">全性別</option>
 <option value="male">男子</option>
 <option value="female">女子</option>
 </select>
 <select id="searchCat" class="input" style="width:110px">
 <option value="all">全カテゴリ</option>
 <option value="general">一般</option>
 <option value="high">高校</option>
 <option value="middle">中学</option>
 <option value="elementary">小学</option>
 <option value="senior">シニア</option>
 </select>
 </div>
</div>

<!-- メインコンテンツ -->
<div class="container" style="padding-top:16px; padding-bottom:40px">

 <!-- 大会一覧 -->
 <div class="tab-panel hidden" id="tab-tournaments">
 <div id="tournamentList"></div>
 </div>

 <!-- 選手データベース (検索のみ) -->
 <div class="tab-panel hidden" id="tab-search">
 <div id="searchStatus" class="text-sub text-sm mb-2" style="padding:0 4px"></div>
 <div id="playerList" class="player-list"></div>
 </div>

 <!-- 大会進行 (Live - デフォルト) -->
 <div class="tab-panel" id="tab-live">
 <div class="card">
 <div class="card-head">
 <div class="card-title">大会進行</div>
 <select class="input input-sm" id="liveTournamentSel" style="width:240px"></select>
 </div>
 <div id="liveMain"></div>
 </div>
 </div>

 <!-- マイ番号 (選手個人ポータル) -->
 <div class="tab-panel hidden" id="tab-myportal">
 <div id="myportalMain"></div>
 </div>

 <!-- 大会詳細 (トーナメント表) -->
 <div class="tab-panel hidden" id="tab-detail">
 <div class="breadcrumb">
 <a href="#" onclick="V.goBack();return false">← 戻る</a>
 </div>
 <div id="tournamentDetail"></div>
 </div>

 <!-- 選手プロフィール -->
 <div class="tab-panel hidden" id="tab-player">
 <div class="breadcrumb">
 <a href="#" onclick="V.goBack();return false">← 戻る</a>
 </div>
 <div id="playerDetail"></div>
 </div>

</div>

<script src="/shared/common.js"></script>
<script>
const { h, esc, api, toast, ratingBadge, fmtDate, fmtDateShort, createPoller, clear } = TT;

// ─── ビューアーアプリ ────────────────────────────────
const V = {
 activeTab: "tournaments",
 _navStack: [], _lastHash: undefined, _navBack: false,   // 戻る用の履歴スタック
 state: { tournaments: [], players: [], stats: null, currentTournament: null, currentPlayer: null },

 async init() {
 // タブクリック
 document.querySelectorAll(".tab").forEach(t => {
 t.addEventListener("click", () => V.showTab(t.dataset.tab));
 });
 // ハンバーガーメニュー (スマホ) トグル
 const burger = document.getElementById("vBurger");
 if (burger) burger.addEventListener("click", () =>
 document.getElementById("tabsIn")?.classList.toggle("open"));

 // 検索入力
 const si = document.getElementById("searchInput");
 let timer;
 si.addEventListener("input", () => {
 clearTimeout(timer);
 timer = setTimeout(() => V.doSearch(), 250);
 });
 document.getElementById("searchGender").addEventListener("change", () => V.doSearch());
 document.getElementById("searchCat").addEventListener("change", () => V.doSearch());

 // 初回ロード
 await V.reload();

 // URLハッシュ処理（#tournament/abc, #player/xyz）
 V.handleHash();
 window.addEventListener("hashchange", () => V.handleHash());

 // 自動更新ポーラー
 createPoller(() => V.reload()).start(() => {
 V.reload();
 // 詳細ページも再取得
 if (V.state.currentTournament) V.openTournament(V.state.currentTournament.id, false);
 if (V.state.currentPlayer) V.openPlayer(V.state.currentPlayer.id, false);
 });
 },

 handleHash() {
 const h = location.hash.slice(1);
 // 直前のページをスタックに記録 (戻る操作で確実に直近ページへ戻すため)
 if (V._lastHash !== undefined && V._lastHash !== h && !V._navBack) {
   V._navStack.push(V._lastHash);
   if (V._navStack.length > 50) V._navStack.shift();
 }
 V._lastHash = h;
 V._navBack = false;
 if (!h) return V.showTab("tournaments", true);
 const [type, id] = h.split("/");
 if (type === "tournament" && id) V.openTournament(id, false);
 else if (type === "player" && id) V.openPlayer(id, false);
 else V.showTab(type || "live", true);
 },

 // skipHash=true: ハッシュを更新しない (hashchange からの呼び出し時)
 showTab(name, skipHash) {
 V.activeTab = name;
 document.getElementById("tabsIn")?.classList.remove("open"); // 選択でメニューを閉じる
 document.querySelectorAll(".tab").forEach(t =>
 t.classList.toggle("active", t.dataset.tab === name)
 );
 document.querySelectorAll(".tab-panel").forEach(p => p.classList.add("hidden"));
 const panel = document.getElementById("tab-" + name);
 if (panel) panel.classList.remove("hidden");
 document.getElementById("searchBar").classList.toggle("hidden", name !== "search");
 // タブ切替もブラウザ履歴に積む (戻るで直前のタブ/ページへ)
 if (!skipHash && location.hash.slice(1) !== name) {
   location.hash = name;
 }
 if (name === "tournaments") V.renderTournaments();
 else if (name === "search") V.doSearch();
 else if (name === "live") L.init();
 else if (name === "myportal") MP.init();
 },

 // 直前のページに戻る (履歴がなければ大会一覧へ)
 goBack() {
 // アプリ内履歴スタックで直近のページへ確実に戻る
 if (V._navStack && V._navStack.length) {
   V._navBack = true;                  // 戻り操作はスタックに積まない
   const prev = V._navStack.pop();
   location.hash = prev || "";         // hashchange → 直前のページを復元
   if (!prev) V.showTab("tournaments", true);
   return;
 }
 if (history.length > 1) history.back();
 else V.showTab("tournaments");
 },

 async reload() {
 try {
 const tournaments = await api.get("/api/public/tournaments");
 V.state.tournaments = tournaments || [];
 V.updateLiveIndicator();
 if (V.activeTab === "tournaments") V.renderTournaments();
 } catch (e) {
 console.error(e);
 }
 },

 // 進行中の大会が1件も無ければ LIVE 表記を隠す
 updateLiveIndicator() {
 const el = document.getElementById("liveIndicator");
 if (!el) return;
 const hasOngoing = (V.state.tournaments || []).some(t => t.status === "ongoing");
 el.style.display = hasOngoing ? "" : "none";
 },

 // ─── 大会一覧 ────────────────────────────────
 renderTournaments() {
 const list = document.getElementById("tournamentList");
 clear(list);
 if (!V.state.tournaments.length) {
 list.appendChild(h("div", { className: "empty-state" },
 "まだ大会が登録されていません。"));
 return;
 }
 const statusLabels = { scheduled: "予定", preparation: "準備中", ongoing: "進行中", completed: "終了", cancelled: "中止" };
 const fmtD = (dt) => dt ? `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}` : "日程未定";

 const buildCard = (t) => {
 const d = t.date ? new Date(t.date) : null;
 const st = t.status || "scheduled";
 const mc = t.match_count || 0;
 const done = t.completed_count != null ? t.completed_count : 0;
 const progress = mc > 0 ? Math.round((done / mc) * 100) : 0;
 const meta = [
   h("span", { className: "meta-chip" }, h("span", { className: "ic" }, "📅"), fmtD(d)),
   h("span", { className: "meta-chip" }, h("span", { className: "ic" }, "📍"), t.venue || "会場未定"),
 ];
 if (t.player_count) meta.push(h("span", { className: "meta-chip" }, h("span", { className: "ic" }, "👤"), t.player_count + "名"));
 if (mc) meta.push(h("span", { className: "meta-chip" }, h("span", { className: "ic" }, "🏓"), mc + "試合"));
 return h("div", { className: "tcard is-" + st, onClick: () => V.openTournament(t.id) },
 h("div", { className: "tcard-accent" }),
 h("div", { className: "tcard-body" },
 h("div", { className: "tcard-top" },
 h("div", { className: "tcard-name" }, t.name || "（無題）"),
 h("span", { className: "st-pill is-" + st }, statusLabels[st] || "予定"),
 ),
 h("div", { className: "tcard-meta" }, ...meta),
 (st === "ongoing" && mc > 0) ? h("div", { className: "wr-bar", style: { marginTop: "10px" },
   title: `${done}/${mc} 試合完了` }, h("span", { style: { width: progress + "%" } })) : null,
 ),
 h("div", { className: "tcard-arrow" }, "›"),
 );
 };

 // 年別にグループ化 (年数が増えてもスクロールを抑制)
 const byYear = {};
 V.state.tournaments.forEach(t => {
   const y = (t.date && /^\d{4}/.test(t.date)) ? t.date.slice(0, 4) : "日付未定";
   (byYear[y] = byYear[y] || []).push(t);
 });
 const years = Object.keys(byYear).sort((a, b) => b.localeCompare(a)); // 新しい年が上
 // 年が1つだけならアコーディオンにせずそのまま表示
 if (years.length <= 1) {
   V.state.tournaments.forEach(t => list.appendChild(buildCard(t)));
   return;
 }
 years.forEach((y, yi) => {
   const ts = byYear[y];
   const ongoingCount = ts.filter(t => t.status === "ongoing").length;
   // 進行中を含む年 or 最新年を開く
   const open = yi === 0 || ongoingCount > 0;
   const acc = h("div", { className: "mr-acc" + (open ? " open" : "") });
   const head = h("div", { className: "mr-acc-head",
     onClick: () => acc.classList.toggle("open") },
     h("span", { className: "mr-acc-title" }, y === "日付未定" ? y : y + "年"),
     ongoingCount ? h("span", { className: "meta-chip hot" }, "進行中" + ongoingCount) : null,
     h("span", { className: "mr-acc-count" }, ts.length + "大会"));
   const bodyEl = h("div", { className: "mr-acc-body" });
   ts.forEach(t => bodyEl.appendChild(buildCard(t)));
   acc.appendChild(head); acc.appendChild(bodyEl);
   list.appendChild(acc);
 });
 },

 // ─── 大会詳細 ────────────────────────────────
 async openTournament(id, updateHash = true) {
 if (updateHash) location.hash = "tournament/" + id;
 TT.showLoading();
 try {
 const t = await api.get("/api/public/tournaments/" + id);
 if (t.error) { toast("大会が見つかりません", "err"); return; }
 const matches = await api.get(`/api/public/tournaments/${id}/matches`);
 V.state.currentTournament = t;
 V.renderTournamentDetail(t, matches || []);
 V.showTabPanelOnly("detail");
 } catch (e) { console.error(e); } finally { TT.hideLoading(); }
 },

 renderTournamentDetail(t, matches) {
 const el = document.getElementById("tournamentDetail");
 clear(el);
 // BYE は実試合ではない (シードの繰り上がり) → 結果表示から除外
 matches = (matches || []).filter(m =>
   m.winner_name !== "BYE" && m.loser_name !== "BYE" && !m.is_walkover);

 // ヘッダ
 const statusLabels = { scheduled: "予定", ongoing: "進行中", completed: "終了" };
 el.appendChild(h("div", { className: "card fi" },
 h("div", { className: "flex gap-3", style: { alignItems: "center", flexWrap: "wrap" } },
 h("div", { className: "flex-1" },
 h("div", { style: { fontSize: "22px", fontWeight: 700 } }, t.name),
 h("div", { className: "text-sm text-sub mt-1" },
 `📅 ${fmtDate(t.date) || "日付未定"}　📍 ${t.venue || "会場未定"}`
 ),
 t.description ? h("div", { className: "text-sm mt-2" }, t.description) : null,
 ),
 h("div", {},
 h("span", { className: "badge status-" + (t.status || "scheduled") },
 statusLabels[t.status] || "予定"),
 ),
 ),
 h("div", { className: "grid grid-auto mt-3" },
 h("div", { className: "stat-box" },
 h("div", { className: "stat-num" }, String(matches.length)),
 h("div", { className: "stat-label" }, "試合数")),
 h("div", { className: "stat-box" },
 h("div", { className: "stat-num" }, String((t.players || []).length)),
 h("div", { className: "stat-label" }, "出場選手")),
 h("div", { className: "stat-box" },
 h("div", { className: "stat-num" }, String(t.court_count || 0)),
 h("div", { className: "stat-label" }, "コート数")),
 ),
 ));

 if (!matches.length) {
 el.appendChild(h("div", { className: "empty-state" }, "まだ試合が登録されていません。"));
 return;
 }

 // イベント種目ごとにグループ化
 const byEvent = {};
 matches.forEach(m => {
 const e = m.event || "その他";
 (byEvent[e] = byEvent[e] || []).push(m);
 });

 // 種目アコーディオン (種目が多くてもスクロールを抑制。最初の種目だけ開く)
 const eventNames = Object.keys(byEvent);
 eventNames.forEach((event, ei) => {
 const ms = byEvent[event];
 const acc = h("div", { className: "mr-acc" + (ei === 0 ? " open" : "") });
 const head = h("div", { className: "mr-acc-head",
   onClick: () => acc.classList.toggle("open") },
   h("span", { className: "mr-acc-title" }, event),
   h("span", { className: "mr-acc-count" }, ms.length + "試合"));
 const bodyEl = h("div", { className: "mr-acc-body" });

 // ラウンドごと (round_order 昇順)
 const byRound = {};
 ms.forEach(m => { const r = m.round || "その他"; (byRound[r] = byRound[r] || []).push(m); });
 Object.entries(byRound).sort((a, b) =>
   (a[1][0].round_order || 99) - (b[1][0].round_order || 99)
 ).forEach(([round, rms]) => {
   bodyEl.appendChild(h("div", { className: "mr-round-label" }, round + " (" + rms.length + ")"));
   rms.forEach(m => bodyEl.appendChild(V.renderMatchResultRow(m)));
 });

 acc.appendChild(head); acc.appendChild(bodyEl);
 el.appendChild(acc);
 });
 },

 // 大会結果: 横並び「○勝者 — スコア — 敗者×」(どっちが勝ったか明快)
 renderMatchResultRow(m) {
 const isBye = !m.loser_name || m.loser_name === "BYE";
 const nameEl = (id, name) => id
   ? h("a", { href: "#player/" + id,
       onClick: (e) => { e.preventDefault(); e.stopPropagation(); V.openPlayer(id); } }, name || "?")
   : h("span", {}, name || "?");
 if (isBye) {
   return h("div", { className: "mr-row" },
     h("div", { className: "mr-win" },
       h("div", { className: "mr-pname" }, nameEl(m.winner_id, m.winner_name),
         m.winner_team ? h("span", { className: "mr-pteam" }, " (" + m.winner_team + ")") : null)),
     h("div", { className: "mr-vs", style: { fontSize: "11px" } }, "不戦勝"),
     h("div", { className: "mr-lose" }, h("div", { className: "mr-pname", style: { color: "var(--sub-l)" } }, "—")));
 }
 return h("div", { className: "mr-row", style: { cursor: "pointer" },
     title: "タップで試合詳細", onClick: () => V.showBracketMatchDetail(m) },
   h("div", { className: "mr-win" },
     h("div", { className: "mr-pname" }, nameEl(m.winner_id, m.winner_name)),
     m.winner_team ? h("div", { className: "mr-pteam" }, m.winner_team) : null),
   h("div", { className: "mr-vs" }, TT.fmtScore(m.winner_sets, m.loser_sets),
     m.result_source === "referee" ? h("div", { style: { fontSize: "8px", color: "#b45309",
       fontWeight: 700, marginTop: "1px" }, title: "審判による速報値（本部確認待ち）" }, "速報") : null,
     m.duration_sec ? h("div", { style: { fontSize: "9px", color: "var(--sub)", fontWeight: "400", marginTop: "2px" } },
       TT.fmtDuration(m.duration_sec)) : null),
   h("div", { className: "mr-lose" },
     h("div", { className: "mr-pname" }, nameEl(m.loser_id, m.loser_name)),
     m.loser_team ? h("div", { className: "mr-pteam" }, m.loser_team) : null),
 );
 },

 // トーナメント表の対戦をタップ → 詳細 + 選手個人DBリンク (シングルス/ダブルス両対応 #255)
 showBracketMatchDetail(m) {
 let sets = [];
 try { sets = m.sets || JSON.parse(m.sets_json || "[]"); } catch (e) {}
 const setsStr = (sets || []).map(s => (Array.isArray(s) && s.length === 2) ? (s[0] + "-" + s[1]) : "").filter(Boolean).join(" / ");
 const body = h("div", {},
   h("div", { className: "badge mb-2", style: { display: "inline-block" } }, [m.event, m.round].filter(Boolean).join(" ")),
   h("div", { style: { background: "#fffbeb", padding: "10px", borderRadius: "8px", borderLeft: "4px solid var(--warn)" } },
     h("div", { className: "font-bold" }, "" + (m.winner_name || "?"),
       m.winner_team ? h("span", { className: "text-sub text-sm" }, " (" + m.winner_team + ")") : null),
     h("div", { className: "text-lg font-bold mt-1", style: { fontFamily: "monospace" } }, TT.fmtScore(m.winner_sets, m.loser_sets)),
     setsStr ? h("div", { className: "text-sm text-sub mt-1" }, setsStr) : null),
   m.loser_name ? h("div", { style: { padding: "10px", marginTop: "8px", background: "#f8fafc", borderRadius: "8px" } },
     h("div", { className: "text-sub" }, "" + m.loser_name,
       m.loser_team ? h("span", { className: "text-sm" }, " (" + m.loser_team + ")") : null)) : null);
 const foot = V.playerDbFoot(V.resultSideMembers(m, "winner"), V.resultSideMembers(m, "loser"));
 TT.openModal("試合詳細", body, foot);
 },

 // ─── 試合カード（試合検索/直近結果で使用・互換維持） ──────
 renderMatchCard(m) {
 const card = h("div", { className: "match-card fi" });
 // 勝者行
 card.appendChild(h("div", { className: "match-row winner" },

 formatSets(sets, isWinner) {

 // 対戦相手サイドのメンバー配列 (#265: ダブルスは相手ペア2名を別々にリンク)。各 {id, name}。
 _oppMembers(m, playerId) {
 const won = m.winner_id === playerId;
 const oppMainId = won ? m.loser_id : m.winner_id;
 const oppMainName = won ? (m.loser_name || "?") : (m.winner_name || "?");
 // 相手サイドが player1 / player2 のどちらかを判定 (partner情報の対応付け)
 let side = null;
 if (m.player1_id && oppMainId && oppMainId === m.player1_id) side = 1;
 else if (m.player2_id && oppMainId && oppMainId === m.player2_id) side = 2;
 else if (m.player1_id && m.player1_id === playerId) side = 2;
 else if (m.player2_id && m.player2_id === playerId) side = 1;
 const first = (s) => String(s == null ? "" : s).split(" / ")[0].trim();
 if (side === 1 || side === 2) {
   const mainId = side === 1 ? m.player1_id : m.player2_id;
   const mainNm = (side === 1 ? m.player1_main_name : m.player2_main_name)
     || first(side === 1 ? m.player1_name : m.player2_name) || oppMainName;
   const pId = side === 1 ? m.player1_partner_id : m.player2_partner_id;
   const pNm = side === 1 ? m.player1_partner_name : m.player2_partner_name;
   const list = [{ id: mainId || null, name: mainNm }];
   if (pId || (pNm && String(pNm).trim())) list.push({ id: pId || null, name: (pNm && String(pNm).trim()) || "ペア" });
   return list;
 }
 return [{ id: oppMainId || null, name: oppMainName }];   // 判定不可(旧データ等)→単独
 },

 // 進行中カード等で片サイドの選手名を個人DBリンクにして返す (#266: ダブルスは両名とも)。
 // 親要素のクリック(詳細モーダル)と競合しないよう stopPropagation する。

 const members = V.sideMembers(m, side);

 const out = [];
 members.forEach((mem, i) => {

         onClick: (e) => { e.preventDefault(); e.stopPropagation(); V.openPlayer(mem.id); } }, mem.name || "?")
     : h("span", {}, mem.name || "?"));
 });
 if (team) out.push(h("span", { style: { color: "var(--sub)", fontWeight: 400, fontSize: "0.9em" } }, " (" + team + ")"));
 return out;

 // 数字カウントアップ (出場選手数のアニメーション)
 _countUp(el, target) {
 const dur = 650, t0 = performance.now();
 const step = (now) => {
   const k = Math.min(1, (now - t0) / dur);
   el.textContent = String(Math.round(target * (1 - Math.pow(1 - k, 3))));
   if (k < 1) requestAnimationFrame(step);
 };
 requestAnimationFrame(step);
 },

 // 勝率リング (SVG・アニメ付き)。total=試合数を下に表示

 collectFilters() {
 const f = { limit: 50, offset: MS.filters.offset || 0 };

 const tm = document.getElementById("msTeam")?.value.trim();
 const tn = document.getElementById("msTournament")?.value;
 const yr = document.getElementById("msYear")?.value;
 const ev = document.getElementById("msEvent")?.value;

 const ct = document.getElementById("msCategory")?.value;

 if (tn) f.tournament_id = tn;
 if (yr) f.year = yr;
 if (ev) f.event = ev;
 if (rd) f.round = rd;
 if (ct) f.category = ct;
 if (op) f.opponent_name = op;

 renderCourtGrid(s) {

 let ec = null;

 requestAnimationFrame(() => {

 // ダブルスのペア両名をそれぞれプロフィール表示できるようにする (#237)。
 // side(1|2) のメンバー配列 [{id,name}] を返す (シングルス=1名 / ダブルス=2名)。
 sideMembers(m, side) {
   const pid      = side === 1 ? m.player1_id : m.player2_id;
   const combined = side === 1 ? m.player1_name : m.player2_name;
   const main     = side === 1 ? m.player1_main_name : m.player2_main_name;
   const ppid     = side === 1 ? m.player1_partner_id : m.player2_partner_id;
   const pname    = side === 1 ? m.player1_partner_name : m.player2_partner_name;
   const first = (main && String(main).trim())
     || String(combined || "").split(" / ")[0].trim() || combined || "選手";
   const list = [{ id: pid || null, name: first }];
   if (ppid || (pname && String(pname).trim())) {
     list.push({ id: ppid || null, name: (pname && String(pname).trim()) || "ペア" });
   }
   return list;
 },
 // 勝者/敗者(who:'winner'|'loser') が属する side を判定してメンバー配列を返す
 resultSideMembers(m, who) {
   let ws = 0;
   if (m.winner_id && m.player1_id && m.winner_id === m.player1_id) ws = 1;
   else if (m.winner_id && m.player2_id && m.winner_id === m.player2_id) ws = 2;
   if (!ws) { // 判定不可(旧データ/手動入力) → 従来通り単独
     const id = who === "winner" ? m.winner_id : m.loser_id;
     const nm = who === "winner" ? m.winner_name : m.loser_name;
     return [{ id: id || null, name: nm || "選手" }];
   }
   return V.sideMembers(m, who === "winner" ? ws : (ws === 1 ? 2 : 1));
 },
 // 試合詳細フッター: シングルス/ダブルス両名の「選手DB ▸」ボタン行 (#260)
 // タップで選手個人DB(戦績・入賞歴つき)へ。admin の _playerDbLinks と同一トンマナ。
 playerDbFoot(...groups) {
   const seen = new Set();
   const btns = [];
   groups.forEach(g => (g || []).forEach(mem => {
     if (mem && mem.id && !seen.has(mem.id)) {
       seen.add(mem.id);
       btns.push(h("button", { className: "btn btn-sm btn-ghost",
         onClick: () => { document.querySelector(".modal-bg")?.remove(); V.openPlayer(mem.id); } },
         (mem.name || "選手") + " ▸"));
     }
   }));
   if (!btns.length) return null;
   return h("div", { className: "flex gap-2", style: { flexWrap: "wrap", alignItems: "center" } },
     h("span", { className: "text-xs text-sub", style: { fontWeight: "700" } }, "選手DB:"),
     ...btns);
 },

 // コートタップ → 進行中の試合詳細 (閲覧・読み取り専用)
 showCourtDetail(t) {
 const m = t.match;
 if (!m) return;
 const num1 = m.player1_bracket_number || m.entrant1_bracket_number;
 const num2 = m.player2_bracket_number || m.entrant2_bracket_number;
 // 選手名そのものをタップで個人DBへ (シングルス/ダブルス両名・#選手名クリック)
 const nameLink = (mem) => mem.id
   ? h("a", { href: "#player/" + mem.id,
       style: { color: "inherit", textDecorationLine: "underline", textDecorationStyle: "dotted", cursor: "pointer" },
       onClick: (e) => { e.preventDefault(); document.querySelector(".modal-bg")?.remove(); V.openPlayer(mem.id); } }, mem.name)
   : h("span", {}, mem.name || "?");
 const playerLine = (side, num, team, furi) => {
   const members = V.sideMembers(m, side);
   const nameRow = h("div", { style: { fontSize: "16px", fontWeight: "700" } },
     num ? h("span", { className: "pnum", style: { marginRight: "5px" } }, "#" + num) : null,
     ...members.map((mem, i) => i === 0 ? nameLink(mem)
       : [h("span", { style: { color: "var(--sub)", margin: "0 4px" } }, "・"), nameLink(mem)]));
   return h("div", { style: { padding: "10px 12px", background: "#f0fdf4",
     border: "1px solid #bbf7d0", borderRadius: "8px" } },
     nameRow,
     furi ? h("div", { style: { fontSize: "11px", color: "var(--sub)" } }, furi) : null,
     team ? h("div", { style: { fontSize: "12px", color: "var(--sub)" } }, team) : null);
 };
 const body = h("div", {},
   h("div", { className: "flex gap-2 mb-2", style: { alignItems: "center", flexWrap: "wrap" } },
     h("span", { className: "badge", style: { background: "#dc2626", color: "#fff" } }, "コート " + t.table_no),
     h("span", { className: "badge" }, [m.event, m.round].filter(Boolean).join(" ")),
     h("span", { style: { fontSize: "12px", color: "#15803d", fontWeight: "700" } }, "● 試合中")),
   playerLine(1, num1, m.player1_team, m.player1_furigana),
   h("div", { style: { textAlign: "center", fontWeight: "800", color: "var(--sub)",
     padding: "6px 0", fontSize: "18px" } }, "VS"),
   playerLine(2, num2, m.player2_team, m.player2_furigana),
   m.referee_name ? h("div", { style: { marginTop: "10px", fontSize: "13px",
     color: "#6d28d9", textAlign: "center" } }, "審判: " + m.referee_name) : null,
 );
 // シングルス/ダブルス両名の「選手DB ▸」ボタン (#237/#260) — タップで個人DB(戦績・入賞歴)へ
 const foot = V.playerDbFoot(V.sideMembers(m, 1), V.sideMembers(m, 2));
 TT.openModal("試合中 — コート " + t.table_no, body, foot);
 },
};

 playerId: null,
 player: null,
 state: null,
 poller: null,
 lastNotified: null, // 直前に通知した状態(連続通知防止)
 notifEnabled: false,

 async init() {
 MP.playerId = localStorage.getItem("tt_player_id") || null;
 if (MP.poller) clearInterval(MP.poller);

 if (!MP.playerId) {
 MP.renderRegister();
 } else {
 await MP.fetch();
 MP.poller = setInterval(() => MP.fetch(), 5000);
 // 既登録なら Web Push を(再)購読 (端末/許可状況が変わっている場合に備える)
 if (("Notification" in window) && Notification.permission === "granted") MP.setupPush();
 }
 },

 // ── 選手番号登録画面 ──
 async renderRegister(prefilled) {
 const main = document.getElementById("myportalMain");
 clear(main);

 const card = h("div", { className: "card fi" },
 h("div", { className: "card-head" },
 h("div", { className: "card-title" }, "マイ番号を登録"),
 ),

 h("input", { className: "input", id: "mpSearchInput",

 ),

 );
 main.appendChild(card);

 const input = document.getElementById("mpSearchInput");
 const results = document.getElementById("mpSearchResults");
 let timer;
 input.addEventListener("input", () => {

 timer = setTimeout(async () => {
 const q = input.value.trim();

 },

 async selectPlayer(id, name) {
 if (!confirm(`「${name}」として登録します。よろしいですか？`)) return;
 MP.playerId = id;
 localStorage.setItem("tt_player_id", id);
 // ブラウザ通知の許可を要求
 if ("Notification" in window && Notification.permission === "default") {
 try { await Notification.requestPermission(); } catch {}
 }
 MP.notifEnabled = ("Notification" in window) && Notification.permission === "granted";
 if (MP.notifEnabled) MP.setupPush();
 await MP.init();
 },

 logout() {
 if (!confirm("登録を解除しますか？")) return;
 localStorage.removeItem("tt_player_id");
 MP.playerId = null;
 if (MP.poller) clearInterval(MP.poller);
 MP.init();
 },

 async fetch() {
 if (!MP.playerId) return;
 try {
 const r = await api.get("/api/public/players/" + MP.playerId + "/live-status");
 if (r.error) {
 // 選手削除等
 localStorage.removeItem("tt_player_id");
 MP.playerId = null;
 return MP.init();
 }
 const prevState = MP.state?.my_state;
 MP.state = r;
 MP.render();
 // 状態が「callable」(呼出可能) になった瞬間 or 「playing」になった瞬間に通知
 const newKey = r.my_state + "|" + (r.current?.id || r.next?.id || "");
 if (newKey !== MP.lastNotified) {
 if ((prevState && prevState !== "callable" && r.my_state === "callable")
 || (prevState && prevState !== "playing" && r.my_state === "playing")) {
 MP.notify(r);
 }
 MP.lastNotified = newKey;
 }
 } catch (e) { console.error(e); }
 },

 // ── 通知発火 (ブラウザ通知 + 音 + バイブ) ──
 notify(r) {
 const isCallable = r.my_state === "callable";
 const isPlaying = r.my_state === "playing";
 const m = r.current || r.next;
 if (!m) return;
 const oppName = m.player1_id === MP.playerId ? m.player2_name : m.player1_name;
 const title = isCallable ? "あなたの試合です!" : isPlaying ? "試合開始" : "ステータス変化";
 const body = `${m.event} ${m.round}\nvs ${oppName}` +
 (m.table_no ? `\nコート${m.table_no}` : "");

 // ブラウザ通知
 if ("Notification" in window && Notification.permission === "granted") {
 try {
 const n = new Notification(title, {
 body, icon: "/shared/assets/icon-192.png", tag: "tt-call",
 requireInteraction: true,
 });
 n.onclick = () => { window.focus(); n.close(); };
 } catch {}
 }
 // 音 (Web Audio で beep)
 MP.beep();
 // バイブ (Android)
 if (navigator.vibrate) {
 navigator.vibrate([300, 150, 300, 150, 300]);
 }
 },

 // ── Web Push 購読 (アプリを閉じていてもバックグラウンド通知) #188 ──
 // 失敗しても致命的ではない (ページ表示中は notify() のブラウザ通知で補完される)。
 // ※ iOS は「ホーム画面に追加」したPWAでのみプッシュが届く。
 // 購読登録。成功時 true を返し MP._pushReady を立てる(UI表示に使用)。
 async setupPush() {
 try {
 if (!("serviceWorker" in navigator) || !("PushManager" in window)) return false;
 if (!("Notification" in window) || Notification.permission !== "granted") return false;
 if (!MP.playerId) return false;
 const cfg = await api.get("/api/push/vapid-public-key");
 if (!cfg || !cfg.enabled || !cfg.key) return false;
 const reg = await navigator.serviceWorker.register("/viewer/sw.js");
 await navigator.serviceWorker.ready;
 let sub = await reg.pushManager.getSubscription();
 if (!sub) {
 sub = await reg.pushManager.subscribe({
 userVisibleOnly: true,
 applicationServerKey: MP._urlB64ToUint8(cfg.key),
 });
 }
 await api.post("/api/push/subscribe",
 { player_id: MP.playerId, subscription: sub.toJSON ? sub.toJSON() : sub });
 MP._pushReady = true;
 return true;
 } catch (e) { console.warn("push setup failed", e); return false; }
 },
 // 環境判定 (iOS Safari は「ホーム画面に追加」しないと Web Push 不可)
 _pushEnv() {
 const ua = navigator.userAgent || "";
 const isIOS = /iphone|ipad|ipod/i.test(ua) ||
   (/Macintosh/.test(ua) && typeof document !== "undefined" && "ontouchend" in document); // iPadOS
 const standalone = (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)
   || navigator.standalone === true;
 const supported = ("serviceWorker" in navigator) && ("PushManager" in window) && ("Notification" in window);
 const perm = ("Notification" in window) ? Notification.permission : "unsupported";
 return { isIOS, standalone, supported, perm };
 },
 // 「通知をオンにする」: 許可要求 → 購読登録 → 明確なフィードバック (#268-push)
 async enablePush() {
 const btn = document.getElementById("mpEnablePush");
 if (btn) { btn.disabled = true; btn.textContent = "設定中…"; }
 try {
 if (("Notification" in window) && Notification.permission === "default") {
 try { await Notification.requestPermission(); } catch (e) {}
 }
 if (!("Notification" in window) || Notification.permission !== "granted") {
 toast("通知が許可されませんでした。ブラウザ設定で許可してください。", "err");
 return MP.render();
 }
 const ok = await MP.setupPush();
 MP.notifEnabled = true;
 toast(ok ? "この端末で通知をオンにしました。" : "許可しましたが登録に失敗しました。少し待って再度お試しください。",
   ok ? "ok" : "warn");
 } catch (e) {
 toast("通知の設定に失敗しました。", "err");
 }
 MP.render();
 },
 // 通知有効化カード(状態に応じて案内/ボタン/完了を出し分け)
 // iPhone / Android の詳しい設定手順 (実機の操作どおり) #284
 _pushHowto() {
 const li = (t) => h("li", { style: { marginBottom: "2px" } }, t);
 const block = (title, color, steps, note) => h("div", { style: { marginBottom: "10px" } },
   h("div", { className: "font-bold", style: { color, marginBottom: "3px", fontSize: "13px" } }, title),
   h("ol", { style: { margin: "0 0 0 18px", padding: 0, fontSize: "12.5px", lineHeight: "1.85" } }, ...steps.map(li)),
   note ? h("div", { className: "text-xs text-sub", style: { marginTop: "3px" } }, note) : null);
 const d = h("details", { className: "card", style: { padding: "0", marginTop: "8px", background: "#fff", borderColor: "var(--border)" } });
 d.appendChild(h("summary", { style: { cursor: "pointer", padding: "10px 14px", fontWeight: 700, fontSize: "13px" } },
   "iPhone / Android の通知設定 手順を見る"));
 const body = h("div", { style: { padding: "0 14px 12px" } },
   block("iPhone・iPad（Safari）", "#1e40af", [
     "Safari でこのページを開く（LINEやInstagram内のブラウザでは不可）",
     "画面下の「共有」ボタン（□に↑が付いた四角いマーク）をタップ",
     "メニューを下にスクロールして「ホーム画面に追加」をタップ",
     "右上の「追加」をタップ",
     "ホーム画面にできた「KTTA」アイコンから開き直す",
     "この画面の「通知をオンにする」→「許可」をタップ",
   ], "※ iPhoneはホーム画面に追加したアプリからのみ通知が届きます（Apple仕様・iOS16.4以降）。"),
   block("Android（Chrome）", "#15803d", [
     "Chrome でこのページを開く",
     "「通知をオンにする」をタップ→ 表示された「許可」をタップ（これで受信できます）",
     "（おすすめ）右上の三点リーダー「⋮」→「アプリをインストール」または「ホーム画面に追加」でアプリ化すると安定します",
     "届かない時:「⋮」→「設定」→「サイトの設定」→「通知」でこのサイトを許可。端末の「設定→アプリ→Chrome→通知」もONに",
   ], null));
 d.appendChild(body);
 return d;
 },
 _notifCard() {
 const e = MP._pushEnv();
 const withHowto = (cardEl) => { const w = h("div", {}); w.appendChild(cardEl); w.appendChild(MP._pushHowto()); return w; };
 if (e.isIOS && !e.standalone) {
 // iPhone/iPad: ホーム画面追加が必須
 return withHowto(h("div", { className: "card", style: { background: "#eff6ff", borderColor: "#3b82f6", padding: "12px 14px" } },
   h("div", { className: "font-bold", style: { marginBottom: "6px", color: "#1e40af" } }, "iPhone・iPad で通知を受け取るには"),
   h("ol", { style: { margin: "0 0 0 18px", padding: 0, fontSize: "13px", lineHeight: "1.9" } },
     h("li", {}, "画面下の「共有」ボタン（□に↑のマーク）をタップ"),
     h("li", {}, "「ホーム画面に追加」を選ぶ"),
     h("li", {}, "追加されたアイコンから開き直す"),
     h("li", {}, "もう一度この画面で「通知をオンにする」")),
   h("div", { className: "text-xs text-sub", style: { marginTop: "6px" } },
     "※ iPhoneはホーム画面に追加したアプリからのみ通知を受け取れます (Apple仕様)。")));
 }
 if (!e.supported) {
 return withHowto(h("div", { className: "card", style: { background: "#f5f5f4", padding: "10px 14px" } },
   h("div", { className: "text-sm text-sub" }, "このブラウザは通知に対応していません。iPhoneはSafari、AndroidはChromeでお試しください。")));
 }
 if (e.perm === "granted" && MP._pushReady) {
 return h("div", { className: "card", style: { background: "#f0fdf4", borderColor: "#16a34a", padding: "10px 14px" } },
   h("div", { className: "text-sm", style: { fontWeight: 700, color: "#166534" } },
     "通知ON — 呼び出し時にこの端末へ届きます"));
 }
 if (e.perm === "denied") {
 return withHowto(h("div", { className: "card", style: { background: "#fef2f2", borderColor: "#dc2626", padding: "10px 14px" } },
   h("div", { className: "text-sm" }, "通知がブロックされています。ブラウザ設定でこのサイトの通知を「許可」に変更してください。")));
 }
 // default、または granted だが未購読 → 有効化ボタン
 return withHowto(h("div", { className: "card", style: { background: "#fef3c7", borderColor: "#d97706", padding: "12px 14px" } },
   h("div", { className: "flex gap-2", style: { alignItems: "center" } },
     h("div", { className: "flex-1 text-sm" }, "呼び出しをこのスマホで受け取れます"),
     h("button", { className: "btn btn-sm", id: "mpEnablePush", onClick: () => MP.enablePush() }, "通知をオンにする"))));
 },
 _urlB64ToUint8(base64) {
 const padding = "=".repeat((4 - base64.length % 4) % 4);
 const b64 = (base64 + padding).replace(/-/g, "+").replace(/_/g, "/");
 const raw = atob(b64);
 const arr = new Uint8Array(raw.length);
 for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
 return arr;
 },

 beep() {
 try {
 const ctx = new (window.AudioContext || window.webkitAudioContext)();
 const osc = ctx.createOscillator();
 const gain = ctx.createGain();
 osc.connect(gain); gain.connect(ctx.destination);
 osc.type = "sine"; osc.frequency.value = 880;
 gain.gain.setValueAtTime(0.3, ctx.currentTime);
 gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
 osc.start(); osc.stop(ctx.currentTime + 1.0);
 // 2発目
 setTimeout(() => {
 const o2 = ctx.createOscillator();
 const g2 = ctx.createGain();
 o2.connect(g2); g2.connect(ctx.destination);
 o2.type = "sine"; o2.frequency.value = 1100;
 g2.gain.setValueAtTime(0.3, ctx.currentTime);
 g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
 o2.start(); o2.stop(ctx.currentTime + 0.8);
 }, 400);
 } catch (e) { console.warn("beep failed", e); }
 },

 render() {
 const main = document.getElementById("myportalMain");
 clear(main);
 const s = MP.state;
 if (!s) return;

 // ── ヘッダー (誰として登録中か) ──
 main.appendChild(h("div", {
 className: "card",
 style: { background: "linear-gradient(135deg,var(--pri) 0%,var(--pri-l) 100%)",
 color: "#fff", display: "flex", alignItems: "center", gap: "12px",
 padding: "14px 18px" }
 },
 h("div", { className: "player-avatar",
 style: { width: "44px", height: "44px", background: "rgba(255,255,255,.2)", color: "#fff",
 fontSize: "18px" } }, (s.player.name || "?")[0]),
 h("div", { className: "flex-1" },
 h("div", { className: "font-bold", style: { fontSize: "16px" } }, s.player.name),
 h("div", { className: "text-xs", style: { opacity: .85 } },
 s.player.team || "—"),
 ),
 h("button", { className: "btn btn-sm btn-ghost",
 style: { background: "rgba(255,255,255,.2)", color: "#fff", border: "none" },
 onClick: () => MP.logout() }, "登録解除"),
 ));

 // ── 通知の有効化 (状態に応じて iOS案内 / 「通知をオンにする」ボタン / 完了表示) ──
 main.appendChild(MP._notifCard());

 // ── 大会情報 ──
 if (!s.tournament) {
 main.appendChild(h("div", { className: "empty-state" },
 "出場中の大会がありません。大会が始まると自動で表示されます。"));
 return;
 }
 main.appendChild(h("div", { className: "card",
 style: { padding: "10px 14px", marginBottom: "10px" } },
 h("div", { className: "text-xs text-sub" }, "出場大会"),
 h("div", { className: "font-bold" }, s.tournament.name),
 h("div", { className: "text-xs text-sub" },
 `${s.tournament.venue || ""} ${s.tournament.date || ""}`)));

 // ── メインステータス表示 (これが一番大きい) ──
 main.appendChild(MP.renderStatus(s));

 // ── 次の試合(対戦相手等) ──
 if (s.my_state === "waiting" && s.next) {
 main.appendChild(MP.renderNextMatch(s));
 }

 // ── 審判担当中の試合 ──
 if (s.refereeing) {
 main.appendChild(h("div", { className: "card fi",
 style: { background: "#fef3c7", borderColor: "#d97706" } },
 h("div", { className: "font-bold", style: { color: "#92400e" } },
 "あなたは審判担当中です"),
 h("div", { className: "text-sm mt-1" },
 `コート${s.refereeing.table_no} の試合が終了するまで他の試合に出られません`),
 h("div", { className: "text-sm mt-1" },
 `${s.refereeing.player1_name} vs ${s.refereeing.player2_name}`),
 ));
 }

 // ── 直近結果 ──
 if (s.recent && s.recent.length) {
 const recentCard = h("div", { className: "card fi" },
 h("div", { className: "card-head" },
 h("div", { className: "card-title" }, "直近の結果")),
 );
 s.recent.forEach(r => {
 const won = r.winner_id === MP.playerId;
 const opp = won ? r.loser_name : r.winner_name;
 recentCard.appendChild(h("div", {
 style: { padding: "8px 0", borderBottom: "1px solid var(--border)",
 display: "flex", justifyContent: "space-between", alignItems: "center" }
 },
 h("div", {},
 h("div", { className: "text-xs text-sub" }, `${r.event} ${r.round}`),
 h("div", { className: won ? "font-bold" : "" },
 `${won ? "勝" : "負"}: vs ${opp}`)),
 h("div", { style: { fontFamily: "monospace" } },
 TT.fmtScore(r.winner_sets, r.loser_sets))
 ));
 });
 main.appendChild(recentCard);
 }

 // ── 通知テスト ──
 main.appendChild(h("div", { className: "text-center mt-3" },
 h("button", { className: "btn btn-sm btn-ghost",
 onClick: () => { MP.beep(); if (navigator.vibrate) navigator.vibrate([200,100,200]); } },
 "通知テスト")));
 },

 renderStatus(s) {
 const states = {
 callable: { icon: "", title: "あなたの試合です!", color: "#dc2626", bg: "#fef2f2",
 sub: "係員の呼び出しに従って準備してください" },
 playing: { icon: "", title: "進行中", color: "#d97706", bg: "#fffbeb",
 sub: "現在試合中です。頑張ってください!" },
 waiting: { icon: "", title: "次の試合を待機中", color: "#1e3a8a", bg: "#eff6ff",
 sub: "対戦相手が決まり次第呼び出されます" },
 refereeing: { icon: "", title: "審判担当中", color: "#d97706", bg: "#fffbeb",
 sub: "担当試合終了まで他の試合に出られません" },
 finished: { icon: "", title: "全試合終了", color: "#059669", bg: "#ecfdf5",
 sub: "お疲れさまでした" },
 idle: { icon: "", title: "待機", color: "#64748b", bg: "#f1f5f9",
 sub: "現在予定の試合はありません" },
 };
 const ss = states[s.my_state] || states.idle;
 const m = s.current || s.next;
 const opp = m
 ? (m.player1_id === MP.playerId ? m.player2_name : m.player1_name)
 : null;
 const oppTeam = m
 ? (m.player1_id === MP.playerId ? m.player2_team : m.player1_team)
 : null;

 return h("div", { className: "card fi",
 style: { background: ss.bg, borderColor: ss.color, borderWidth: "3px",
 padding: "20px", textAlign: "center", marginBottom: "12px" } },
 h("div", { style: { fontSize: "56px", lineHeight: 1, marginBottom: "8px" } }, ss.icon),
 h("div", { style: { fontSize: "22px", fontWeight: 700, color: ss.color,
 marginBottom: "6px" } }, ss.title),
 h("div", { className: "text-sm text-sub", style: { marginBottom: "12px" } }, ss.sub),
 m && opp ? h("div", { style: { marginTop: "12px",
 padding: "12px", background: "#fff", borderRadius: "8px" } },
 h("div", { className: "text-xs text-sub" }, `${m.event} ${m.round}`),
 h("div", { style: { fontSize: "18px", fontWeight: 700, marginTop: "4px" } },
 `vs ${opp}`),
 oppTeam ? h("div", { className: "text-sm text-sub" }, oppTeam) : null,
 (s.my_state === "callable" || s.my_state === "playing") && m.table_no
 ? h("div", { style: { fontSize: "32px", fontWeight: 700, color: ss.color,
 marginTop: "8px" } }, "コート " + m.table_no)
 : null,
 ) : null,
 );
 },

 renderNextMatch(s) {
 const m = s.next;
 if (!m) return null;
 const opp = m.player1_id === MP.playerId ? m.player2_name : m.player1_name;
 return h("div", { className: "card fi" },
 h("div", { className: "card-head" },
 h("div", { className: "card-title" }, "次の試合"),
 ),
 h("div", { className: "text-sm" },
 h("div", {}, `${m.event} ${m.round}`),
 h("div", { className: "font-bold mt-1" },
 `vs ${opp || "(相手未確定)"}`),
 h("div", { className: "text-xs text-sub mt-2" },
 m.player1_name && m.player2_name && m.player1_name !== "BYE" && m.player2_name !== "BYE"
 ? "両者揃いました。呼び出しをお待ちください。"
 : "対戦相手が確定するまでお待ちください。"),
 ),
 );
 },
};
</script>
