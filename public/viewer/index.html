<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KTTA Platform - 試合結果・選手検索</title>
<!-- PWA / iOS ホーム画面追加 (マイ番号のプッシュ通知に必要) #268-push -->
<meta name="theme-color" content="#15803d">
<link rel="manifest" href="/viewer/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/shared/ktta-mark.svg">
<link rel="icon" type="image/png" sizes="192x192" href="/shared/assets/icon-192.png">
<link rel="apple-touch-icon" href="/shared/assets/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="マイ番号">
<link rel="stylesheet" href="/shared/common.css">
<link rel="preload" href="/shared/common.js" as="script"><!-- 末尾<script>の発見を前倒し(高RTT会場のクリティカルパス短縮)。?v=は版注入で自動付与 -->
<style>
 /* viewer 専用の追加スタイル */
 .hero {
 /* トンマナ(タンチョウ/卓球=ティール〜グリーン)の濃色グラデ + 薄い斜めライン模様。軽量(CSSのみ) */
 background:
   repeating-linear-gradient(135deg, rgba(255,255,255,.045) 0 2px, rgba(255,255,255,0) 2px 24px),
   radial-gradient(120% 180% at 90% -40%, rgba(94,234,212,.18), rgba(94,234,212,0) 60%),
   linear-gradient(100deg, #0f172a 0%, #134e4a 55%, #0f766e 118%);
 color: var(--ink-0);
 padding: 14px 0;
 border-bottom: 3px solid #5eead4;
 position: sticky; top: 0; z-index: 50;
 box-shadow: 0 2px 14px rgba(0,0,0,.20);
 }
 .hero-inner {
 max-width: 1200px; margin: 0 auto; padding: 0 20px;
 display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
 }
 .hero-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
 .hero-sub { font-size: 12px; opacity: .8; }
 .live-indicator {
 display: inline-flex; align-items: center; gap: 6px;
 background: rgba(255,255,255,.06);
 border: 1px solid rgba(255,255,255,.12);
 padding: 5px 12px; border-radius: 14px;
 font-size: 10px; font-weight: 600;
 letter-spacing: 0.1em; text-transform: uppercase;
 }
 .live-dot {
 width: 7px; height: 7px; border-radius: 50%; background: #10b981;
 animation: pulse 1.5s infinite;
 box-shadow: 0 0 0 2px rgba(16,185,129,.25);
 }
 @media (max-width: 480px) {
 .hero-inner { padding: 0 12px; }
 .ktta-logo-tag { display: none; }
 }
 @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

 .search-bar {
 background: #fff; padding: 12px 16px;
 border-bottom: 1px solid var(--border);
 position: sticky; top: 0; z-index: 50;
 }
 .search-bar-in {
 max-width: 1100px; margin: 0 auto;
 display: flex; gap: 8px; align-items: center;
 }
 .search-input {
 flex: 1; padding: 10px 14px 10px 38px;
 border: 1px solid var(--border-strong); border-radius: 24px;
 background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%2364748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') no-repeat 12px center;
 font-size: 14px;
 }

 /* 選手カード */
 .player-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
 .player-card {
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 12px 14px;
 display: flex; align-items: center; gap: 10px;
 cursor: pointer; transition: all .15s;
 content-visibility: auto; contain-intrinsic-size: auto 68px;  /* 選手DB大量カードの画面外をskip */
 }
 .player-card:hover { border-color: var(--pri-l); box-shadow: 0 2px 8px rgba(30,58,138,.08); transform: translateY(-1px); }
 .player-avatar {
 width: 40px; height: 40px; border-radius: 50%;
 background: var(--pri-bg); color: var(--pri);
 display: inline-flex; align-items: center; justify-content: center;
 font-size: 16px; font-weight: 700; flex: 0 0 40px;
 }
 .player-avatar.female { background: #fce7f3; color: #be185d; }
 .player-info { flex: 1; min-width: 0; }
 .player-name { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
 .player-meta { font-size: 12px; color: var(--sub); display: flex; gap: 6px; }

 /* 大会一覧 */
 .tournament-card {
 display: grid; grid-template-columns: auto 1fr auto;
 gap: 14px; align-items: center;
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 14px 18px;
 margin-bottom: 8px; cursor: pointer; transition: all .15s;
 }
 .tournament-card:hover { border-color: var(--pri-l); box-shadow: 0 2px 10px rgba(30,58,138,.08); }
 .tournament-date {
 background: var(--pri-bg); color: var(--pri);
 padding: 6px 10px; border-radius: 6px;
 font-size: 12px; font-weight: 700; text-align: center; min-width: 60px;
 }
 .tournament-date .month { font-size: 10px; font-weight: 400; }
 .tournament-title { font-weight: 700; font-size: 15px; }
 .tournament-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }
 .tournament-arrow { color: var(--sub-l); font-size: 20px; }

 /* ステータスバッジ */
 .status-scheduled { background: var(--pri-bg); color: var(--pri); }
 .status-preparation { background: #ede9fe; color: #6d28d9; }
 .status-ongoing { background: #fef3c7; color: #ca8a04; }
 .status-completed { background: var(--ok-bg); color: var(--ok); }

 /* 選手詳細戦績テーブル */
 .profile-head {
 display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center;
 padding: 20px; background: linear-gradient(135deg, var(--pri) 0%, var(--pri-l) 100%);
 color: #fff; border-radius: var(--radius) var(--radius) 0 0;
 }
 .profile-avatar {
 width: 72px; height: 72px; border-radius: 50%;
 background: rgba(255,255,255,.2); color: #fff;
 display: inline-flex; align-items: center; justify-content: center;
 font-size: 28px; font-weight: 700;
 }
 .profile-name { font-size: 22px; font-weight: 700; }
 .profile-sub { font-size: 13px; opacity: .85; margin-top: 4px; }
 .profile-stats { display: flex; gap: 16px; font-size: 11px; }
 .profile-stat-num { font-size: 20px; font-weight: 700; display: block; }
 .profile-body { padding: 16px; }

 /* セクション見出し */
 .section-title {
 font-size: 13px; font-weight: 700; color: var(--sub);
 padding: 8px 0; margin-bottom: 10px;
 border-bottom: 2px solid var(--border);
 display: flex; align-items: center; gap: 6px;
 }

 /* ★ 大会結果: 横並び 勝者-スコア-敗者 (どっちが勝ったか明快) */
 .mr-acc { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; background: #fff; }
 .mr-acc-head {
   display: flex; align-items: center; gap: 10px;
   padding: 11px 14px; cursor: pointer;
   background: linear-gradient(135deg, #fafafa, #f4f4f5);
   border-bottom: 1px solid var(--border);
 }
 .mr-acc-head:hover { background: #f4f4f5; }
 .mr-acc-title { font-weight: 700; font-size: 14px; flex: 1; }
 .mr-acc-count { font-size: 11px; color: var(--sub); background: var(--ink-100);
   padding: 3px 9px; border-radius: 10px; font-family: var(--font-mono); }
 .mr-acc-head::after { content: "›"; font-size: 20px; color: var(--sub);
   transform: rotate(90deg); transition: transform .15s; }
 .mr-acc.open .mr-acc-head::after { transform: rotate(-90deg); }
 .mr-acc-body { display: none; padding: 6px 10px 10px; }
 .mr-acc.open .mr-acc-body { display: block; }
 .mr-round-label { font-size: 11px; font-weight: 700; color: var(--sub);
   margin: 8px 0 4px; padding-left: 2px; }
 .mr-row {
   display: grid; grid-template-columns: 1fr auto 1fr;
   align-items: center; gap: 8px;
   padding: 8px 6px; border-bottom: 1px solid #f1f5f9;
   /* 画面外の行はレイアウト/ペイントをskip(総試合タブの大量行でモバイル軽量化)。
      auto キーワードで実寸を記憶しスクロール変動を抑制。非対応ブラウザは従来描画=縮退安全。 */
   content-visibility: auto; contain-intrinsic-size: auto 44px;
 }
 .mr-row:last-child { border-bottom: none; }
 .mr-win { text-align: right; min-width: 0; }
 .mr-lose { text-align: left; min-width: 0; }
 .mr-pname { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .mr-win .mr-pname { font-weight: 700; color: #15803d; }
 .mr-win .mr-pname::before { content: "○ "; font-size: 12px; }
 .mr-lose .mr-pname { color: var(--sub); }
 .mr-lose .mr-pname::after { content: " ×"; font-size: 11px; color: #b91c1c; }
 .mr-pname a { color: inherit; text-decoration: none; }
 .mr-pname a:hover { text-decoration: underline; }
 .mr-pteam { font-size: 11px; color: var(--sub-l); }
 .mr-vs {
   font-family: var(--font-mono); font-weight: 800; font-size: 16px;
   color: var(--ink-800); white-space: nowrap; padding: 2px 8px;
   background: var(--ink-50); border-radius: 6px; text-align: center;
 }
 @media (max-width: 480px) {
   .mr-pname { font-size: 13px; white-space: normal; line-height: 1.3; } .mr-vs { font-size: 14px; padding: 2px 5px; }
 }

 /* ★ 選手視点の試合行 (初心者向け・○勝ち/×負け) */
 .pm-row {
   display: grid; grid-template-columns: 54px 1fr auto;
   gap: 10px; align-items: center;
   padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
   border: 1px solid var(--border); background: #fff;
 }
 .pm-row.win  { border-left: 5px solid #16a34a; background: #f0fdf4; }
 .pm-row.loss { border-left: 5px solid #dc2626; background: #fef2f2; }
 .pm-result {
   font-size: 13px; font-weight: 800; text-align: center;
   border-radius: 8px; padding: 6px 0; line-height: 1.2;
   white-space: pre-line;
 }
 .pm-row.win  .pm-result { background: #16a34a; color: #fff; }
 .pm-row.loss .pm-result { background: #dc2626; color: #fff; }
 .pm-opp { min-width: 0; }
 .pm-opp-label { font-size: 11px; color: var(--sub); }
 .pm-opp-name { font-size: 15px; font-weight: 700; color: var(--ink-900);
   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .pm-opp-name a { color: var(--ink-900); text-decoration: none; }
 .pm-opp-name a:hover { text-decoration: underline; }
 .pm-opp-team { font-size: 11px; color: var(--sub); font-weight: 400; }
 .pm-opp-ev { font-size: 11px; color: var(--sub); margin-top: 1px; }
 .pm-score {
   text-align: right; font-family: var(--font-mono);
   font-size: 20px; font-weight: 800; white-space: nowrap;
 }
 .pm-row.win  .pm-score { color: #15803d; }
 .pm-row.loss .pm-score { color: #b91c1c; }
 .pm-score .pm-score-sets { font-size: 11px; color: var(--sub); font-weight: 400; display: block; }

 /* H2H 平易版 */
 .h2h-clean { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
 .h2h-c-row {
   display: grid; grid-template-columns: 1fr auto;
   gap: 10px; align-items: center; padding: 8px 12px;
   border: 1px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer;
 }
 .h2h-c-row:hover { border-color: var(--pri-l); }
 .h2h-c-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .h2h-c-team { font-size: 11px; color: var(--sub); font-weight: 400; margin-left: 4px; }
 .h2h-c-record { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
 .h2h-c-record .w { color: #15803d; font-weight: 800; font-size: 15px; }
 .h2h-c-record .l { color: #b91c1c; font-weight: 800; font-size: 15px; }
 .h2h-c-record .sep { color: var(--sub-l); }
 .h2h-c-verdict { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
 .h2h-c-verdict.lead { background: #dcfce7; color: #15803d; }
 .h2h-c-verdict.even { background: var(--ink-100); color: var(--ink-600); }
 .h2h-c-verdict.behind { background: #fee2e2; color: #b91c1c; }

 /* イベントグループ */
 .event-group { margin-bottom: 16px; }
 .event-title {
 background: var(--pri);
 color: #fff;
 padding: 8px 14px;
 font-size: 13px; font-weight: 700;
 border-radius: var(--radius) var(--radius) 0 0;
 display: flex; justify-content: space-between; align-items: center;
 }
 .event-count { font-size: 11px; opacity: .8; font-weight: 400; }

 .breadcrumb {
 display: flex; align-items: center; gap: 6px;
 padding: 10px 0; font-size: 12px; color: var(--sub);
 }
 .breadcrumb a { color: var(--pri-l); }

 /* ランキング */
 .rank-card {
 display: grid; grid-template-columns: 36px 1fr auto auto;
 gap: 10px; align-items: center;
 padding: 10px 14px; background: #fff;
 border: 1px solid var(--border);
 border-radius: var(--radius); margin-bottom: 6px;
 }
 .rank-num {
 font-size: 18px; font-weight: 700; text-align: center;
 color: var(--sub);
 }
 .rank-num.gold { color: var(--gold); font-size: 22px; }
 .rank-num.silver { color: var(--silver); font-size: 20px; }
 .rank-num.bronze { color: var(--bronze); font-size: 20px; }
 .rank-name { font-weight: 700; font-size: 14px; }
 .rank-meta { font-size: 11px; color: var(--sub); }
 .rank-rating { font-family: monospace; font-weight: 700; font-size: 15px; color: var(--pri); }
 .rank-wl { font-size: 11px; color: var(--sub); font-family: monospace; }

 @media (max-width: 640px) {
 .hero-title { font-size: 18px; }
 .profile-head { grid-template-columns: auto 1fr; gap: 12px; padding: 14px; }
 .profile-stats { grid-column: 1/-1; justify-content: space-around; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.2); }
 .profile-avatar { width: 56px; height: 56px; font-size: 22px; }
 }

 /* ── 進行中 (Live) ── */
 .live-stats {
 display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
 gap: 8px; margin-bottom: 14px;
 }
 .live-stat {
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 12px 10px; text-align: center;
 min-height: 56px;
 }
 .live-stat-num { font-size: 22px; font-weight: 700; line-height: 1; }
 /* 進行状態タブ (サマリカードをタブ化) */
 .live-stats.tabs .live-stat { cursor: pointer; user-select: none;
   transition: box-shadow .12s, border-color .12s, background .12s; }
 .live-stats.tabs .live-stat:hover { border-color: var(--accent); }
 .live-stats.tabs .live-stat.active { border-color: var(--accent);
   box-shadow: 0 0 0 2px var(--accent); background: #fffaf5; }
 .live-stats.tabs .stat-label { margin-top: 3px; }
 /* タブ内 試合行 (待機中/終了/総試合) */
 .tab-empty { text-align: center; color: var(--sub); padding: 26px 10px; font-size: 14px; }
 .tab-note { font-size: 11px; color: var(--sub); margin: 2px 0 8px; }
 .term-note { font-size: 12px; color: var(--sub); margin: 4px 0 8px; }
 .tab-row { background: #fff; border: 1px solid var(--border); border-radius: 10px;
   padding: 8px 11px; margin-bottom: 6px; }
 .tab-row-head { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 3px; }
 .tab-ev { font-size: 11px; color: var(--sub); font-weight: 700; }
 .tab-mlabel { font-size: 11px; color: var(--sub-l); font-family: monospace; }
 .tab-chip { font-size: 11px; font-weight: 700; border-radius: 6px; padding: 1px 7px; }
 .tab-row-body { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 14px; }
 .tab-row-body.result .tab-win { font-weight: 700; color: var(--ink-900); }
 .tab-row-body.result .tab-score { font-weight: 700; font-family: monospace; color: var(--accent); }
 .tab-row-body.result .tab-lose { color: var(--sub); }
 .tab-p { font-weight: 600; }
 .tab-bnum { display: inline-block; font-size: 11px; font-weight: 700; color: #fff;
   background: var(--ink-500, #64748b); border-radius: 5px; padding: 0 4px; margin-right: 4px; }
 .tab-vs { font-size: 11px; color: var(--sub); font-weight: 700; }
 .tab-pteam { font-size: 11px; color: var(--sub); font-weight: 400; margin-left: 3px; }
 .tab-court { font-size: 11px; font-weight: 700; color: #dc2626; margin-left: auto; }
 .tab-bye { font-size: 11px; color: var(--sub); }

 /* viewer用コートグリッド */
 .live-court-wrap {
 background: #f1f5f9; border: 2px solid var(--border-strong);
 border-radius: var(--radius); padding: 16px;
 margin-bottom: 14px; overflow-x: auto;
 -webkit-overflow-scrolling: touch;
 }
 /* 横スクロール案内 (コートが画面幅に収まらない時のみ表示) */
 .live-court-hint {
 display: none; align-items: center; justify-content: center; gap: 6px;
 font-size: 11px; font-weight: 700; color: var(--accent);
 background: #fff5f5; border: 1px dashed var(--accent);
 border-radius: 20px; padding: 4px 12px;
 margin: 0 auto 10px; width: max-content;
 }
 .live-court-grid {
 display: grid; gap: 8px;
 margin: 0 auto;
 width: max-content;
 }
 .live-court-cell {
 background: #fff; border: 2px solid var(--border-strong);
 border-radius: 8px; padding: 20px 6px 6px;
 min-height: 72px; width: 104px;
 display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
 font-size: 11px; position: relative;
 box-sizing: border-box;
 }
 .live-court-cell.empty { background: #f8fafc; color: var(--sub-l); }
 .live-court-cell.active {
 background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
 border-color: var(--accent);
 animation: pulse-cell 2s infinite;
 }
 @keyframes pulse-cell {
 0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, .3); }
 50% { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); }
 }
 .live-court-no {
 position: absolute; top: 3px; left: 0; right: 0;
 font-size: 11px; color: #fff; background: var(--sub);
 font-weight: 700; text-align: center;
 padding: 1px 0; border-radius: 6px 6px 0 0;
 }
 .live-court-cell.active .live-court-no { background: var(--accent); }
 .live-court-match {
 text-align: center; font-weight: 700; font-size: 11px;
 color: var(--accent); line-height: 1.25; margin-top: 2px;
 width: 100%; word-break: keep-all; overflow-wrap: normal;
 }
 .live-court-elapsed { font-size: 10px; color: var(--sub); font-weight: 700; margin-top: 2px; }
 .live-court-hq {
 margin-top: 10px; padding: 10px; background: var(--pri); color: #fff;
 border-radius: 6px; text-align: center; font-weight: 700; font-size: 13px;
 }
 /* 種目名・氏名は単語の途中で改行しない (スペースのみで改行・無ければ1行) */
 .live-match-card .lmc-ev, .live-match-card .lmc-names,
 .un-ev, .un-players, .un-p { word-break: keep-all; overflow-wrap: normal; }
 /* スマホ: コートグリッドを横スクロールさせず画面幅に折り返す (#217) */
 @media (max-width: 640px) {
 .live-court-wrap { overflow-x: visible; padding: 12px 8px; }
 .live-court-hint { display: none !important; }
 .live-court-grid { width: 100% !important;
   grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)) !important; }
 .live-court-cell { width: auto; min-height: 64px; }
 .live-court-hq { width: 100% !important; }
 }

 /* 進行中試合カード */
 .live-match-card {
 background: linear-gradient(90deg, #fffbeb 0%, #fff 100%);
 border: 1px solid var(--warn); border-left: 4px solid var(--accent);
 border-radius: var(--radius); padding: 10px 14px;
 margin-bottom: 6px;
 display: grid; grid-template-columns: auto 1fr;
 gap: 12px; align-items: center;
 }
 .live-tno {
 background: var(--accent); color: #fff;
 padding: 8px 14px; border-radius: 6px;
 font-weight: 700; font-size: 16px; min-width: 60px; text-align: center;
 }
 .next-callable {
 background: #fff; border: 1px dashed var(--pri-l);
 border-radius: var(--radius); padding: 8px 12px;
 margin-bottom: 6px;
 display: grid; grid-template-columns: auto 1fr; gap: 10px;
 font-size: 13px;
 }

 /* ── まもなく呼ばれそうな選手 ── */
 .un-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin: 18px 0 8px; }
 .un-head .un-title { font-size: 15px; font-weight: 800; color: var(--ink-900); }
 .un-head .un-sub { font-size: 11px; color: var(--sub); }
 .un-card {
 display: grid; grid-template-columns: 46px 1fr; gap: 10px; align-items: center;
 background: #fff; border: 1px solid var(--border);
 border-radius: 10px; padding: 10px 12px; margin-bottom: 6px;
 }
 .un-card.is-first {
 border-color: var(--accent);
 background: linear-gradient(135deg, #fff5f5 0%, #fff 60%);
 box-shadow: 0 2px 12px rgba(220,38,38,.10);
 }
 .un-card.is-wait { opacity: .72; }
 .un-rank {
 width: 46px; height: 46px; border-radius: 10px;
 background: var(--ink-100); color: var(--ink-700);
 display: flex; flex-direction: column; align-items: center; justify-content: center;
 font-weight: 800; font-size: 18px; line-height: 1;
 }
 .un-card.is-first .un-rank { background: var(--accent); color: #fff; }
 .un-rank .un-rank-lbl { font-size: 8px; font-weight: 700; opacity: .85; margin-top: 2px; }
 .un-ev { font-size: 11px; color: var(--sub); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
 .un-ev .un-soon {
 background: var(--accent); color: #fff; font-size: 10px; font-weight: 800;
 padding: 1px 9px; border-radius: 10px;
 }
 .un-ev .un-wait-reason {
 background: #fef3c7; color: #92400e; font-size: 10px; font-weight: 700;
 padding: 1px 8px; border-radius: 10px;
 }
 .un-players { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 13px; }
 .un-p { display: inline-flex; align-items: center; gap: 5px; font-weight: 700; color: var(--ink-900); }
 .un-p .un-num {
 font-family: var(--font-mono); font-size: 11px; font-weight: 800;
 background: var(--ink-900); color: #fff; padding: 1px 7px; border-radius: 6px;
 }
 .un-p .un-team { font-size: 11px; color: var(--sub); font-weight: 400; }
 .un-vs { color: var(--sub); font-weight: 800; font-size: 11px; }

 /* ── 試合検索フォーム ── */
 .match-search-form {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
 gap: 8px;
 padding-bottom: 12px;
 border-bottom: 1px solid var(--border);
 }
 .match-search-form .input { padding: 6px 8px; font-size: 13px; }
 .match-search-actions {
 grid-column: 1 / -1;
 display: flex; gap: 8px; justify-content: flex-end;
 padding-top: 8px;
 }

 /* 試合検索結果テーブル */
 .ms-table {
 width: 100%;
 border-collapse: collapse;
 font-size: 13px;
 background: #fff;
 }
 .ms-table thead {
 background: var(--pri);
 color: #fff;
 position: sticky; top: 0;
 }
 .ms-table th {
 padding: 8px 10px; text-align: left;
 font-size: 11px; font-weight: 700;
 letter-spacing: .02em;
 }
 .ms-table td {
 padding: 8px 10px;
 border-bottom: 1px solid var(--border);
 vertical-align: middle;
 }
 .ms-table tbody tr:hover { background: #f8fafc; cursor: pointer; }
 .ms-table .ms-winner { color: var(--accent); font-weight: 700; }
 .ms-table .ms-loser { color: var(--sub); }
 .ms-table .ms-event-cell { white-space: nowrap; font-size: 11px; color: var(--sub); }
 .ms-table .ms-sets { font-family: monospace; font-size: 11px; color: var(--sub); letter-spacing: .05em; }
 .ms-table .ms-score { font-family: monospace; font-weight: 700; font-size: 14px; white-space: nowrap; }

 .ms-pagination {
 display: flex; justify-content: center; gap: 8px;
 padding: 12px 0;
 }
 .ms-pagination button {
 padding: 6px 14px; background: #fff;
 border: 1px solid var(--border-strong);
 border-radius: 6px; font-weight: 600;
 }
 .ms-pagination button:disabled { opacity: .4; }

 /* 申込フォーム */
 .entry-card {
 background: #fff; border: 1px solid var(--border);
 border-radius: var(--radius); padding: 16px;
 margin-bottom: 10px;
 }
 .entry-card-head {
 display: grid; grid-template-columns: 1fr auto;
 gap: 10px; align-items: start;
 padding-bottom: 10px;
 border-bottom: 1px solid var(--border);
 margin-bottom: 12px;
 }
 .entry-form-grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
 gap: 10px;
 }
 .entry-events-list {
 display: flex; gap: 6px; flex-wrap: wrap;
 }
 .entry-event-chip {
 padding: 6px 14px; background: #f8fafc;
 border: 1.5px solid var(--border-strong);
 border-radius: 20px; cursor: pointer; font-size: 13px;
 user-select: none;
 }
 .entry-event-chip.selected {
 background: var(--pri); color: #fff; border-color: var(--pri);
 }

 /* 対戦相手別戦績 (H2H) */
 .h2h-table { width: 100%; font-size: 13px; }
 .h2h-table th, .h2h-table td { padding: 6px 8px; text-align: center; }
 .h2h-table th { background: #f1f5f9; color: var(--sub); font-size: 11px; }
 .h2h-table tbody tr:hover { background: #f8fafc; cursor: pointer; }
 .h2h-table .h2h-name { text-align: left; font-weight: 600; }
 .h2h-table .h2h-wl { font-family: monospace; }
 .h2h-rate-bar {
 height: 4px; background: var(--border); border-radius: 2px;
 overflow: hidden; min-width: 50px;
 }
 .h2h-rate-bar-fill {
 height: 100%; background: var(--accent);
 }

 /* 種目別統計 */
 .event-stats-grid {
 display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
 gap: 8px;
 }
 .event-stat-card {
 background: #f8fafc; border-radius: var(--radius); padding: 10px;
 }
 .event-stat-title { font-size: 12px; font-weight: 700; color: var(--pri); margin-bottom: 4px; }
 .event-stat-row { font-size: 11px; color: var(--sub); display: flex; justify-content: space-between; }

 /* ── モバイル: 横はみ出し防止 + ハンバーガーメニュー (#235) ── */
 html, body { overflow-x: hidden; max-width: 100%; }
 .v-burger { display: none; }
 @media (max-width: 640px) {
   .v-burger {
     display: flex; align-items: center; gap: 8px; width: 100%;
     padding: 13px 16px; background: #fff; border: none;
     border-bottom: 1px solid var(--border); font-size: 15px; font-weight: 800;
     color: var(--ink-900); text-align: left; cursor: pointer;
   }
   .tabs { overflow-x: visible; }
   .tabs-in { display: none; flex-direction: column; padding: 0; max-width: none; }
   .tabs-in.open { display: flex; }
   .tabs-in .tab, .tabs-in a.tab {
     width: 100%; text-align: left; padding: 14px 18px;
     border: none; border-bottom: 1px solid var(--border);
     margin: 0 !important; font-size: 15px;
   }
   .tabs-in .tab.active { background: #f1f5f9; }
   /* 選手DB等の横はみ出し対策 (スマホ) */
   .player-list { grid-template-columns: 1fr; }
   .search-bar-in { flex-wrap: wrap; }
   .ms-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
 }

 /* ═══ 監督・顧問ビュー: 柔らかい明るいトーン (#tab-coach にスコープ) ═══ */
 #tab-coach {
   --card: #ffffff; --card-elev: #ffffff;
   --border: #e0ebe7; --border-strong: #cdded8;
   --txt: #1c2230; --txt-l: #334155; --sub: #64748b; --sub-l: #8a97a8;
   --ink-50: #eef6f4; --ink-100: #e6f3ef; --ink-400: #94a3b8;
   background:
     radial-gradient(1200px 360px at 50% -8%, rgba(15,118,110,.06), transparent 60%),
     linear-gradient(180deg, #f4fbf9 0%, #ecf6f3 100%);
   color: var(--txt);
   border-radius: 16px;
   padding: 14px 12px 28px;
   margin-top: 4px;
   box-shadow: inset 0 0 0 1px rgba(15,118,110,.08);
 }
 #tab-coach .card {
   background: var(--card);
   border: 1px solid #e0ebe7;
   box-shadow: 0 2px 8px rgba(15,40,35,.06);
 }
 #tab-coach .card-title { color: #14322c; }
 #tab-coach .card-head { border-bottom-color: #e3eeea; }
 #tab-coach .input, #tab-coach select, #tab-coach textarea {
   background: #ffffff; color: #1c2230; border-color: #cdded8;
 }
 #tab-coach .input::placeholder, #tab-coach textarea::placeholder { color: #9aa6ba; }
 #tab-coach .input:hover, #tab-coach select:hover, #tab-coach textarea:hover { border-color: #0f766e; }
 #tab-coach .btn { background: var(--accent); border-color: var(--accent); color: #fff; }
 #tab-coach .btn:hover { background: #b91c1c; border-color: #b91c1c; }
 #tab-coach .btn-ghost { background: #ffffff; color: #44403c; border-color: #cdded8; }
 #tab-coach .btn-ghost:hover { background: #f0faf7; border-color: #0f766e; }
 #tab-coach .empty-state { color: #64748b; }
 #tab-coach .text-sub, #tab-coach .text-xs.text-sub { color: #64748b; }
 #tab-coach .badge-sub { background: #e6f3ef; color: #14322c; }
 #tab-coach a { color: #0f766e; }
 #tab-coach code { background: #f1f5f4 !important; color: #134e4a !important; border: 1px solid #e0ebe7; }
 /* 共有の通知手順ボックス(_pushHowto)も明るいトーンに */
 #tab-coach details.card { background: #fbfdfc !important; border-color: #e3eeea !important; color: #1c2230; }
 #tab-coach details.card summary { color: #14322c; }
 #tab-coach details.card .font-bold { color: #1c2230 !important; }
 #tab-coach .pdb-push, #tab-coach .badge { color: #14322c; }

 /* ═══════════ 丹頂エディトリアル: 選手DB(白・ゴシック / viewer scoped) ═══════════
    申込フォームと同じ世界観(白基調・丹頂レッドのアクセント・ゴシック・編集的)を
    選手データベース(#tab-search)と選手プロフィール(#tab-player)へ適用。
    #tab-* で詳細度を上げて共有CSS(common.css)を上書き、admin・他タブには影響させない。 */
 #tab-search, #tab-player{
   --tc-ink:#191917; --tc-ink2:#5c5c63; --tc-ink3:#9a9aa2;
   --tc-line:#e9e9ec; --tc-line2:#f1f1f3; --tc-red:#c01526; --tc-redbg:#fdecee;
   --tc-amber:#9a6a10; --tc-amberbg:#fbf2dc; --tc-green:#1a7a45; --tc-greenbg:#e8f6ee;
   --tc-sh:0 10px 30px -16px rgba(20,16,12,.22); --tc-sh-h:0 16px 38px -16px rgba(192,21,38,.28);
   font-family:'Hiragino Sans','BIZ UDPGothic','Yu Gothic UI','Yu Gothic','Meiryo',system-ui,sans-serif;
   font-variant-numeric:tabular-nums;
 }
 /* 選手名鑑マストヘッド */
 .pdb-masthead{padding:18px 2px 14px;border-bottom:2px solid var(--tc-ink);margin-bottom:16px}
 .pdb-masthead .k{font-size:11px;letter-spacing:.4em;color:var(--tc-red);font-weight:800}
 .pdb-masthead h2{font-size:27px;font-weight:800;letter-spacing:.02em;line-height:1.1;margin:4px 0 2px;display:flex;align-items:center;gap:10px}
 .pdb-masthead .crane{width:12px;height:12px;border-radius:50%;background:var(--tc-red);box-shadow:0 0 0 3px #fff,0 0 0 4px var(--tc-red);flex:0 0 auto}
 .pdb-masthead .s{font-size:12px;color:var(--tc-ink2)}

 /* 検索バー */
 #searchBar{background:#fff;border-bottom:1px solid var(--tc-line)}
 #searchBar .search-input{border:1.5px solid var(--tc-line);border-radius:12px}
 #searchBar .search-input:focus{border-color:var(--tc-red);outline:none}

 /* カード一覧 */
 #tab-search .player-list{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
 #tab-search .pdb-card{background:#fff;border:1px solid var(--tc-line);border-radius:16px;padding:15px 16px;
   box-shadow:var(--tc-sh);gap:13px;align-items:flex-start}
 #tab-search .pdb-card:hover{transform:translateY(-3px);box-shadow:var(--tc-sh-h)}
 #tab-search .pdb-card .pdb-avatar,
 #tab-search .pdb-card.male .pdb-avatar,
 #tab-search .pdb-card.female .pdb-avatar{background:#f3f1ee;color:var(--tc-ink);border:1px solid var(--tc-line);font-weight:800}
 #tab-search .pdb-card .pdb-name{font-size:21px;font-weight:800;color:var(--tc-ink);letter-spacing:.01em;line-height:1.2}
 #tab-search .pdb-card .pdb-furi{font-size:11px;color:var(--tc-ink3);letter-spacing:.12em}
 #tab-search .pdb-card .pdb-meta{color:var(--tc-ink2);font-size:12px;gap:6px;align-items:center}
 #tab-search .pdb-cat{background:var(--tc-amberbg);color:var(--tc-amber);border-radius:6px;font-weight:800}
 #tab-search .pdb-stats .pdb-stat{border-radius:7px;font-weight:800}
 #tab-search .pdb-stat.app{background:var(--tc-line2);color:var(--tc-ink2)}
 #tab-search .pdb-stat.win{background:var(--tc-greenbg);color:var(--tc-green)}
 #tab-search .pdb-stat.loss{background:var(--tc-redbg);color:var(--tc-red)}
 #tab-search .pdb-stat.medal{background:var(--tc-amberbg);color:var(--tc-amber)}
 #tab-search .pdb-winrate-bar{background:var(--tc-line)}
 #tab-search .pdb-winrate-bar>span{background:var(--tc-green)}
 #tab-search #searchStatus{color:var(--tc-ink3)}

 /* ── プロフィール: 通算勝率ヒーロー(緑ベタ→白カード+丹頂赤帯) ── */
 #tab-player .psum{background:#fff!important;color:var(--tc-ink)!important;border:1px solid var(--tc-line);
   border-left:5px solid var(--tc-red);border-radius:16px;box-shadow:var(--tc-sh);padding:20px 22px}
 #tab-player .psum-rate-v{color:var(--tc-ink);font-size:48px}
 #tab-player .psum-rate-k,#tab-player .psum-rec{color:var(--tc-ink2);opacity:1}
 #tab-player .psum-rec b{color:var(--tc-ink)}
 #tab-player .psum-wl{background:var(--tc-line)}
 #tab-player .psum-wl .w{background:var(--tc-green)} #tab-player .psum-wl .l{background:var(--tc-red);opacity:.85}
 #tab-player .psum-kv-i b{color:var(--tc-ink)} #tab-player .psum-kv-i span{color:var(--tc-ink3);opacity:1}
 @media(min-width:560px){#tab-player .psum-kv{border-left:1px solid var(--tc-line)}}

 /* KPI / タイル */
 #tab-player .pstat-tile{background:#fff;border:1px solid var(--tc-line);border-radius:13px;box-shadow:var(--tc-sh)}
 #tab-player .pstat-v{color:var(--tc-ink);font-weight:700;line-height:1.2}
 #tab-player .pstat-l{color:var(--tc-ink2);font-weight:700;margin-top:6px}
 #tab-player .pstat-s{color:var(--tc-ink3)}
 #tab-player .pstat-cmp-a{color:var(--tc-ink3)}
 #tab-player .pstat-cmp.up .pstat-cmp-d{color:var(--tc-green)}
 #tab-player .pstat-cmp.down .pstat-cmp-d{color:var(--tc-red)}

 /* 直近フォーム */
 #tab-player .pform-dot{width:30px;height:30px;font-size:12px;font-weight:900;color:#fff}
 #tab-player .pform-dot.win{background:var(--tc-green)} #tab-player .pform-dot.lose{background:var(--tc-red)}
 #tab-player .pform-label{color:var(--tc-ink2);font-weight:800}

 /* 折りたたみ(詳細スタッツ・内訳) */
 #tab-player .pmore{background:#fff;border:1px solid var(--tc-line);border-radius:14px;box-shadow:var(--tc-sh)}
 #tab-player .pmore-sum{font-weight:800;color:var(--tc-ink)}
 #tab-player .pmore-sum::after{color:var(--tc-red)}

 /* 内訳: ゲームカウント分布 / 勝率行 / 見出し */
 #tab-player .pdist-chip.w{background:var(--tc-greenbg);color:#15633a;border-color:#cde9d8}
 #tab-player .pdist-chip.l{background:var(--tc-redbg);color:#9c0f1c;border-color:#f3d3d6}
 #tab-player .pdist-label.w{color:var(--tc-green)} #tab-player .pdist-label.l{color:var(--tc-red)}
 #tab-player .pstat-bar i.hi{background:var(--tc-green)}
 #tab-player .pstat-rp.hi{color:var(--tc-green)}
 #tab-player .section-sub{color:var(--tc-ink2);font-weight:800;display:flex;align-items:center;gap:8px}
 #tab-player .section-sub::before{content:"";width:3px;height:13px;background:var(--tc-red);border-radius:2px;display:inline-block}
 #tab-player .preach-chip{font-weight:800}

 /* 太さ・被り(重なり)調整: 大きな表示文字は 700 に、値クラスは行間を確保して
    「1時間56分」等の折返し時の重なりを防止。ラベルとの間隔も少し広げる。 */
 .pdb-masthead h2{font-weight:700}
 #tab-search .pdb-card .pdb-name{font-weight:700;line-height:1.3}
 #tab-search .pdb-cat,#tab-search .pdb-stats .pdb-stat{font-weight:700}
 #tab-player .psum-rate-v{font-weight:700;font-size:44px;line-height:1.06}
 #tab-player .psum-kv-i b{font-weight:700}
 #tab-player .pstat-cmp-d{font-weight:700}
 #tab-player .pstat-cmp-d{font-weight:700}
 #tab-player .pmore-sum{font-weight:700}
 #tab-player .pform-label{font-weight:700}
 #tab-player .preach-chip{font-weight:700}

 /* ═══════════ 丹頂: viewer 全体トンマナ統一 ═══════════
    base(common.css)は既にモノクロ＋赤＋ゴシック。viewer 内で :root トークンを上書きして
    アクセントを丹頂レッドに、背景を純白に、角丸/影をソフトに揃える。緑ヘッダーを白へ。
    この <style> は viewer ドキュメント専用なので admin には影響しない。 */
 body{
   --kt-accent:#c01526; --kt-accent-d:#9c0f1c; --kt-accent-l:#fdecee;
   /* common.css は --accent:var(--kt-accent) を :root で定義するため、body での --kt-accent 上書きは
      --accent に伝播しない(変数は使用箇所でなく定義箇所の値で確定)。--accent 系を直接上書きして
      viewer 全体を真の丹頂レッド #c01526 にする(これまで #dc2626 のままだった)。 */
   --accent:#c01526; --accent-l:#9c0f1c; --accent-bg:#fdecee; --accent-d:#9c0f1c;
   --bg:#ffffff; --border:#e9e9ec; --border-strong:#dcdce0;
   --radius:7px; --radius-lg:12px; --radius-xl:16px;
   --shadow-sm:0 1px 2px rgba(20,16,12,.05);
   --shadow:0 2px 10px -5px rgba(20,16,12,.14);
   --shadow-lg:0 14px 34px -18px rgba(20,16,12,.22);
   /* 団体リーグ星取表(TT.leagueTableEl)を丹頂トンマナに */
   --lg-win:#1a7a45; --lg-lose:#c01526; --lg-head:#faf7f5; --lg-line:#ece7e3; --lg-self:#f3efeb; --lg-bg:#ffffff;
   --lg-win-bg:#e9f5ee;   /* 勝利の淡い背景(汎用 #f0fdf4/#dcfce7 の丹頂harmonized置換) */
   background:#ffffff;
 }
 /* 緑(ティール)ヘッダー → 白の丹頂ヘッダー(下端に墨の罫) */
 .hero{ background:#ffffff; color:var(--txt); border-bottom:2px solid var(--ink-900);
   box-shadow:0 1px 0 rgba(20,16,12,.05); }
 .hero-title{ color:var(--txt); }
 .hero-sub{ color:var(--sub); opacity:1; }
 .live-indicator{ background:var(--accent-bg); border:1px solid #f3c9cd; color:var(--accent-l); }
 .live-dot{ background:var(--accent); box-shadow:0 0 0 2px rgba(192,21,38,.20); }
 /* カードを少しソフトに(選手DBのトーンへ) */
 .container .card{ border-radius:var(--radius-lg); box-shadow:var(--shadow); border-color:var(--border); }
 /* タブのアクティブ下線などは --accent 経由で自動的に丹頂レッドへ */

 /* ═══════════ 丹頂エディトリアル: 大会 一覧・詳細・結果(明色ムラの追補) ═══════════
    紺(--pri)/灰グラデ/汎用緑赤のままだった大会系ビューを、白基調＋丹頂レッドの
    編集的トーン(赤ドット見出し・赤縦棒・細罫・タブラー数字)へ統一する。 */
 /* 大会カード: 紺の影 → ソフト影＋ホバーで持ち上げ。アイコン/矢印は丹頂赤 */
 .tournament-card{ border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
   transition:box-shadow .15s ease, transform .15s ease, border-color .15s ease; }
 .tournament-card:hover{ border-color:var(--border-strong); box-shadow:var(--shadow); transform:translateY(-1px); }
 .tournament-icon{ background:var(--accent-bg); color:var(--accent); }
 .tournament-arrow{ color:var(--accent); }

 /* 大会詳細ヘッダ: 上端に丹頂赤の細帯。タイトルに赤い縦棒(編集的) */
 #tournamentDetail > .card.fi{ border-top:3px solid var(--accent); }
 #tournamentDetail > .card.fi .flex-1 > div:first-child{ position:relative; padding-left:14px; }
 #tournamentDetail > .card.fi .flex-1 > div:first-child::before{ content:"";
   position:absolute; left:0; top:.14em; bottom:.14em; width:4px; border-radius:2px; background:var(--accent); }
 #tournamentDetail .stat-num{ font-variant-numeric:tabular-nums; font-weight:700; }
 #tournamentDetail .stat-box{ background:#fff; border:1px solid var(--border); border-radius:var(--radius); }

 /* 種目アコーディオン: 灰グラデ見出し → 白＋丹頂赤ドット＋細罫 */
 .mr-acc{ border-radius:var(--radius-lg); border-color:var(--border); }
 .mr-acc-head{ background:#fff; }
 .mr-acc-head:hover{ background:var(--accent-bg); }
 .mr-acc-title{ position:relative; padding-left:16px; }
 .mr-acc-title::before{ content:""; position:absolute; left:0; top:50%; width:7px; height:7px;
   margin-top:-3.5px; border-radius:50%; background:var(--accent); }
 .mr-acc-count{ font-variant-numeric:tabular-nums; background:var(--accent-bg); color:var(--accent-l); }
 .mr-acc-head::after{ color:var(--accent); }

 /* ラウンド見出し: 赤ドット＋右へ伸びる細罫 */

 /* 対戦者未確定の将来戦をまとめた控えめな注記 */

 .badge.status-ongoing, .status-ongoing{ background:var(--accent-bg); color:var(--accent-l); }

 /* ═══════════ 丹頂: 選手プロフィール/H2H/ランキング/進行の総仕上げ ═══════════
    紺(--pri)・旧赤(#dc2626)・汎用緑赤(#15803d/#16a34a/#b91c1c)・汎用灰(#f1f5f9)のまま
    だった残りのビューを丹頂トークンへ統一する。元CSSは触らず後勝ちで上書き。 */
 /* (a) 選手プロフィール・戦績 */
 .profile-head{ background:#ffffff; color:var(--txt); border-top:3px solid var(--accent); }
 .profile-avatar{ background:var(--accent-bg); color:var(--accent); }
 .pm-row.win{ border-left:5px solid var(--lg-win); background:var(--lg-win-bg); }
 .pm-row.loss{ border-left:5px solid var(--accent); background:var(--accent-bg); }
 .pm-row.win .pm-result{ background:var(--lg-win); }
 .pm-row.loss .pm-result{ background:var(--accent); }
 .pm-row.win .pm-score{ color:var(--lg-win); }
 .pm-row.loss .pm-score{ color:var(--accent); }
 /* (b) H2H(対戦相手別戦績) */
 .h2h-c-row:hover{ border-color:var(--accent); }
 .h2h-c-record .w{ color:var(--lg-win); }
 .h2h-c-record .l{ color:var(--accent); }
 .h2h-c-verdict.lead{ background:var(--lg-win-bg); color:var(--lg-win); }
 .h2h-c-verdict.behind{ background:var(--accent-bg); color:var(--accent); }
 .h2h-table th{ background:var(--ink-100); }
 /* (c) ランキング */
 .rank-rating{ color:var(--accent); }
 /* (d) 進行(ライブコート)・その他 */
 .event-title{ background:var(--accent); }
 .breadcrumb a{ color:var(--accent); }
 .live-court-hq{ background:var(--accent); }
 .next-callable{ border-color:var(--accent); }
 .ms-table thead{ background:var(--accent); }
 .event-stat-title{ color:var(--accent); }
 .entry-event-chip.selected{ background:var(--accent); border-color:var(--accent); }
 .tab-court{ color:var(--accent); }
 .player-card:hover{ border-color:var(--accent-l); }
 .player-avatar{ background:var(--accent-bg); color:var(--accent); }
 .live-court-wrap{ background:var(--ink-100); }
 .live-court-cell.active{ background:linear-gradient(135deg,#fff5f5 0%,var(--accent-bg) 100%); }
 /* a11y: キーボードフォーカスの可視化(role=button化したカード/チップ・各種操作要素)。
    マウス操作では出さない(:focus-visible)ので見た目を乱さない。 */
 [role="button"]:focus-visible, .tcard:focus-visible, .pdb-card:focus-visible,
 .player-card:focus-visible, .entry-event-chip:focus-visible, a:focus-visible,
 button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
   outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px;
 }
/* ═══════════ viewer 選手カード刷新「モダン・ミニマル」(2026-06) ═══════════
   白基調・余白・タイポ主役。バッジ群/性別グラデ丸アバター/支部色の左罫線/赤線を廃止。
   差し色は控えめなスレートブルー(勝率バー・勝率%・フォーカスのみ)。動きはCSSのみ。
   新クラス vp-* で旧 .pdb-card 系(共有common.css)と非干渉。スコープは #tab-search 内。 */
#tab-search .pdb-acc.open .pdb-acc-body { grid-template-columns: repeat(auto-fill, minmax(264px, 1fr)); gap: 12px; background: transparent; padding: 8px 2px; }
#tab-search .pdb-acc.open .vp-card { animation: pdbCardIn .34s cubic-bezier(.2,.7,.3,1) both; }
#tab-search .vp-card { --vp-accent:#3b5a7a; display:block; background:#fff; border:1px solid var(--tc-line); border-radius:14px;
  padding:17px 18px 15px; cursor:pointer; transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease; }
#tab-search .vp-card:hover { border-color:#d7d7db; transform:translateY(-2px); box-shadow:0 10px 26px -14px rgba(24,24,34,.16); }
#tab-search .vp-card:focus-visible { outline:2px solid var(--vp-accent); outline-offset:2px; }
#tab-search .vp-head { display:flex; align-items:flex-start; gap:12px; }
#tab-search .vp-mono { flex:none; width:38px; height:38px; border-radius:10px; background:var(--tc-line2); color:var(--tc-ink2);
  display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; letter-spacing:.02em; }
#tab-search .vp-id { min-width:0; flex:1; }
#tab-search .vp-name { font-size:18px; font-weight:650; color:var(--tc-ink); letter-spacing:.01em; line-height:1.25;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#tab-search .vp-furi { margin-top:2px; font-size:11px; color:var(--tc-ink3); letter-spacing:.08em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#tab-search .vp-team { margin-top:3px; font-size:12px; color:var(--tc-ink2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#tab-search .vp-tag { flex:none; font-size:11px; color:var(--tc-ink3); letter-spacing:.04em; padding-top:3px; white-space:nowrap; }
#tab-search .vp-rule { border-top:1px solid var(--tc-line2); margin:14px 0 0; }
#tab-search .vp-stats { display:flex; align-items:flex-end; justify-content:space-between; margin-top:13px; gap:8px; }
#tab-search .vp-stat { display:flex; flex-direction:column; gap:2px; }
#tab-search .vp-stat .v { font-family:var(--font-mono, 'SF Mono', Menlo, Consolas, monospace); font-size:20px; font-weight:600; line-height:1;
  color:var(--tc-ink); font-variant-numeric:tabular-nums; }
#tab-search .vp-stat.loss .v { color:var(--tc-ink3); }
#tab-search .vp-stat .k { font-size:10px; color:var(--tc-ink3); letter-spacing:.1em; }
#tab-search .vp-stat.rate { align-items:flex-end; }
#tab-search .vp-stat.rate .v { color:var(--vp-accent); font-weight:700; }
#tab-search .vp-stat.rate .v.none { font-size:11px; font-weight:600; color:var(--tc-ink3); }
#tab-search .vp-stat.rate .pct-sign { font-size:11px; font-weight:600; }
#tab-search .vp-bar { height:4px; border-radius:2px; margin-top:11px; background:var(--tc-line2); overflow:hidden; }
#tab-search .vp-bar > i { display:block; height:100%; border-radius:2px; background:var(--vp-accent); }
#tab-search .vp-bar-empty { height:4px; margin-top:11px; }
#tab-search .vp-norec { margin-top:13px; font-size:12px; color:var(--tc-ink3); letter-spacing:.02em; }

/* ═══════════ 案B 新聞エディトリアル(承認済み方向) ═══════════
   温白の紙 × 墨の太罫 × 丹頂赤1色 × タブラー数字。AI-tell(紫グラデ/左縁色線/絵文字/em-dash)を排除。
   スポーツ結果面の権威と信頼感。既存の丹頂scopedより後勝ちで上書きする。 */
body{ background:#fbfaf7; }
.container{ background:transparent; }
/* 数字は等幅(スコア・順位・件数・統計) */
.num,.rk-rank,.rk-wins,.rk-rate,.rk-champ,.st-tile .v,.st-card .big,.vp-stat .v,
.lv-tab-count,.pdb-total-num,.mr-score,.ms-score{ font-variant-numeric:tabular-nums; }
/* マストヘッド: ヘッダは白地・太い墨罫、ブランドを大きく */
.hero{ border-bottom:none; box-shadow:none; background:#fbfaf7; }
.ktta-logo-name{ font-weight:800; letter-spacing:.01em; }
/* ナビ: 下端に太い墨罫(新聞の題字下罫)、アクティブは赤ブロック */
.tabs{ border-bottom:3px solid var(--ink-900); background:#fbfaf7; }
.tabs-in{ gap:0; }
.tab{ border-bottom:none !important; padding:11px 15px; font-weight:700; color:var(--ink-700);
  border-right:1px solid var(--border); }
.tab:first-child{ border-left:none; }
.tab.active{ background:var(--accent); color:#fff; border-bottom:none !important; }
.tab.active:hover{ background:var(--accent-l); }
/* 選手名鑑バナー: 紫グラデ・左縁インディゴを撤去 → 白地・墨の太上罫・大きな黒数字・赤キッカー */
.pdb-total,.pdb-hero{ background:#fff !important; border:1px solid var(--border) !important;
  border-top:3px solid var(--ink-900) !important; border-left:1px solid var(--border) !important;
  border-radius:0 !important; box-shadow:none !important; padding:16px 20px; }
.pdb-total .pdb-total-num,.pdb-hero .pdb-total-num{ color:var(--ink-900) !important; text-shadow:none !important;
  font-variant-numeric:tabular-nums; }
.pdb-total .pdb-total-unit,.pdb-hero .pdb-total-unit{ color:var(--ink-700) !important; }
.pdb-hero .pdb-total-lbl{ color:var(--accent) !important; font-weight:800; letter-spacing:.08em; }
.pdb-hero .pdb-total-sub{ color:var(--sub) !important; }
/* カード左縁の色付きアクセント線を撤去(オーナー最頻指摘) */
.tcard-accent{ display:none !important; }
.pm-row.win,.pm-row.loss{ border-left:none !important; }
.pm-row.win{ box-shadow:inset 3px 0 0 var(--lg-win); }   /* 左バーの代わりに控えめなinset */
.pm-row.loss{ box-shadow:inset 3px 0 0 var(--accent); }
/* 大会カード: 左バー型をやめ、上端に細い赤帯+白カード(新聞のセクション見出し風) */
.tcard{ border-radius:0; border-left:1px solid var(--border); }
/* 大会カードは新聞のセクション見出し風: 上端に細い赤帯(左バーは廃止済) */
.tcard{ border-top:2px solid var(--accent); }
.tcard.is-completed,.tcard.is-cancelled{ border-top-color:var(--border-strong); }
/* 状態バッジ: 進行中=丹頂赤(LIVEと統一)、他は墨系の中立。高彩度多色をやめる */
.st-pill.is-ongoing{ background:var(--accent-bg); color:var(--accent); }
.st-pill.is-preparation{ background:#f4efe7; color:var(--ink-700); }
.st-pill.is-scheduled{ background:var(--ink-100); color:var(--ink-700); }
.st-pill.is-ongoing::before{ background:var(--accent); }
.st-pill.is-preparation::before,.st-pill.is-scheduled::before{ background:var(--ink-500); }
/* 進捗バー: 緑グラデ→単色(完了の意味色)、赤みトラック→中立 */
.wr-bar{ background:var(--line2, #f0ebe1); border-radius:0; height:6px; }
.wr-bar > span{ background:var(--lg-win, #1a7a45); }
/* 選手名鑑のグループ切替(セグメント制御): CSS未定義で375pxで見切れていた。横スクロール可能に。 */
.pdb-seg{ display:flex; gap:2px; overflow-x:auto; -webkit-overflow-scrolling:touch;
  border:1px solid var(--border); border-radius:0; background:#fff; padding:3px; margin:14px 0;
  scrollbar-width:thin; }
.pdb-seg-btn{ flex:none; white-space:nowrap; padding:8px 16px; font-size:13px; font-weight:700;
  color:var(--sub); background:transparent; border:none; border-radius:0; cursor:pointer; }
.pdb-seg-btn.active{ color:#fff; background:var(--accent); }
/* 検索バーの固定幅 select を可変に(375pxで見切れ解消) */
#searchGender,#searchCat{ width:auto !important; min-width:96px; flex:1 1 auto; }
.search-bar-in{ flex-wrap:wrap; }
@media(max-width:560px){
  .search-bar-in{ gap:8px; }
  #searchInput{ flex:1 1 100%; }
  #searchGender,#searchCat{ flex:1 1 40%; }
}
/* 接続状態バッジ: 大会進行の更新経路(SSE即時 / ポーリング / 断)を控えめに可視化 (#264) */
.conn-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 9px; border-radius:999px;
  font-size:11px; font-weight:600; white-space:nowrap;
  color:var(--sub); background:var(--bg); border:1px solid var(--border);
}
.conn-badge::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--sub-l); flex:none; }
.conn-badge.is-live { color:var(--ok); border-color:var(--ok-bg); background:var(--ok-bg); }
.conn-badge.is-live::before { background:var(--ok); }
.conn-badge.is-poll { color:var(--warn); }
.conn-badge.is-poll::before { background:var(--warn); }
.conn-badge.is-down::before { background:var(--sub-l); }
/* ランキング / 統計タブ(丹頂トーン・レート非表示・勝利数ベース) */
.rk-title-bar{display:flex;align-items:center;gap:10px;margin:6px 2px 14px}
.rk-title-bar::before{content:"";width:4px;height:22px;background:var(--accent);border-radius:2px;flex:none}
.rk-title-bar h2{font-size:19px;font-weight:700;letter-spacing:.01em}
.rk-basis{font-size:11px;font-weight:700;color:var(--accent);border:1px solid var(--accent);border-radius:999px;padding:2px 10px;margin-left:auto}
.rk-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.rk-filters .input{width:auto;min-width:120px}
.rk-toggle{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);margin-left:auto}
.rk-table{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.rk-head,.rk-row{display:grid;grid-template-columns:44px 1fr 96px 58px 66px;gap:10px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border)}
.rk-head{background:var(--bg);font-size:11px;color:var(--sub);font-weight:700;letter-spacing:.04em}
.rk-head .num,.rk-row .rk-wins,.rk-row .rk-rate,.rk-row .rk-champ{text-align:right;font-variant-numeric:tabular-nums}
.rk-row{cursor:pointer}
.rk-row:last-child{border-bottom:none}
.rk-row:hover,.rk-row:focus-visible{background:var(--bg);outline:none}
.rk-rank{font-weight:800;font-size:16px;text-align:center;font-variant-numeric:tabular-nums;color:var(--sub)}
.rk-row.top .rk-rank{color:var(--accent)}
.rk-name{font-weight:700;font-size:15px}
.rk-team{font-size:12px;color:var(--sub)}
.rk-wins{font-weight:800;font-size:16px}
.rk-wins small{font-size:11px;color:var(--sub);font-weight:600}
.rk-rate{font-size:13px;color:var(--sub)}
.rk-champ b{color:#9a6a10;font-weight:800}
.rk-champ .none{color:var(--sub-l)}
.rk-foot{font-size:12px;color:var(--sub);text-align:center;padding:12px 4px 0}
.st-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.st-tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
.st-tile .v{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
.st-tile .k{font-size:12px;color:var(--sub);margin-top:4px}
.st-tile.accent .v{color:var(--accent)}
.st-duo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.st-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.st-card .big{font-size:24px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}

.st-sub-h{display:flex;align-items:baseline;gap:10px;margin:16px 2px 10px}
.st-sub-h span{font-size:14px;font-weight:700}
.st-more{font-size:12px;color:var(--accent);margin-left:auto;text-decoration:none}
@media(max-width:560px){
 .st-tiles{grid-template-columns:1fr 1fr}

 .rk-row .rk-rate,.rk-row .rk-champ{display:none}
 .rk-filters .rk-toggle{margin-left:0;width:100%}
}
</style>
</head>

 <div class="tab-panel hidden" id="tab-player">
 <div class="breadcrumb">
 <a href="#" onclick="V.goBack();return false">← 戻る</a>
 </div>
 <div id="playerDetail"></div>
 </div>

</div>

<script src="/shared/common.js"></script>
<script>
const { h, esc, api, toast, ratingBadge, fmtDate, fmtDateShort, createPoller, clear } = TT;

// ─── ビューアーアプリ ────────────────────────────────
const V = {
 activeTab: "tournaments",
 _navStack: [], _lastHash: undefined, _navBack: false,   // 戻る用の履歴スタック
 state: { tournaments: [], players: [], stats: null, currentTournament: null, currentPlayer: null },

 // a11y: クリック専用 div をキーボード操作可能なボタンにする属性セット(role/tabindex/Enter・Space)。
 // h() の属性に `...V._kbtn(fn)` で展開して使う。
 _kbtn(onAct) {
   return { role: "button", tabindex: "0", onClick: onAct,
     onKeyDown: (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onAct(e); } } };
 },

 async init() {
 // タブクリック
 document.querySelectorAll(".tab").forEach(t => {
 t.addEventListener("click", () => V.showTab(t.dataset.tab));
 });
 // ハンバーガーメニュー (スマホ) トグル
 const burger = document.getElementById("vBurger");
 if (burger) burger.addEventListener("click", () =>
 document.getElementById("tabsIn")?.classList.toggle("open"));

 // 検索入力
 const si = document.getElementById("searchInput");
 let timer;
 si.addEventListener("input", () => {
 clearTimeout(timer);
 timer = setTimeout(() => V.doSearch(), 250);
 });
 document.getElementById("searchGender").addEventListener("change", () => V.doSearch());
 document.getElementById("searchCat").addEventListener("change", () => V.doSearch());

 // 初回ロード
 await V.reload();

 // ランキング/統計タブは成績データがある時だけ表示(協会初回・大会序盤の空タブを常設しない)。
 await V._updateStatTabs();

 // URLハッシュ処理（#tournament/abc, #player/xyz）
 V.handleHash();
 // 協会サイト等からの ?q= / ?search= 直リンク対応：検索語をURLクエリで受け取っても「検索済み」で開く
 // （#search/<語> ルートに加えた保険。古い連携実装が ?q=… で送っていても拾えるようにする）
 try {
   const _sp = new URLSearchParams(location.search);
   const _q = (_sp.get("q") || _sp.get("search") || _sp.get("s") || "").trim();
   if (_q) {
     const _si = document.getElementById("searchInput");
     if (_si) _si.value = _q;
     V.showTab("search", true);
   }
 } catch (e) {}
 window.addEventListener("hashchange", () => V.handleHash());

 // 自動更新ポーラー
 createPoller(() => V.reload()).start(() => {
 V.reload();
 // 詳細ページも再取得
 if (V.state.currentTournament) V.openTournament(V.state.currentTournament.id, false);
 if (V.state.currentPlayer) V.openPlayer(V.state.currentPlayer.id, false);
 });
 },

 handleHash() {
 const h = location.hash.slice(1);
 // 直前のページをスタックに記録 (戻る操作で確実に直近ページへ戻すため)
 if (V._lastHash !== undefined && V._lastHash !== h && !V._navBack) {
   V._navStack.push(V._lastHash);
   if (V._navStack.length > 50) V._navStack.shift();
 }
 V._lastHash = h;
 V._navBack = false;
 if (!h) return V.showTab("tournaments", true);
 const [type, id] = h.split("/");
 if (type === "tournament" && id) V.openTournament(id, false);
 else if (type === "player" && id) V.openPlayer(id, false);
 else if (type === "search" && id) {
   // #search/<検索語> で「検索済みの画面」を開く（協会サイト等からの直リンク用）。
   // 検索語を入力欄へセットしてから検索タブを表示すると showTab("search") が doSearch() を実行する。
   const si = document.getElementById("searchInput");
   if (si) { try { si.value = decodeURIComponent(id); } catch (e) { si.value = id; } }
   V.showTab("search", true);
 }
 else V.showTab(type || "live", true);
 },

 // skipHash=true: ハッシュを更新しない (hashchange からの呼び出し時)
 showTab(name, skipHash) {
 V.activeTab = name;
 document.getElementById("tabsIn")?.classList.remove("open"); // 選択でメニューを閉じる
 document.querySelectorAll(".tab").forEach(t =>
 t.classList.toggle("active", t.dataset.tab === name)
 );
 document.querySelectorAll(".tab-panel").forEach(p => p.classList.add("hidden"));
 const panel = document.getElementById("tab-" + name);
 if (panel) panel.classList.remove("hidden");
 document.getElementById("searchBar").classList.toggle("hidden", name !== "search");
 // タブ切替もブラウザ履歴に積む (戻るで直前のタブ/ページへ)
 if (!skipHash && location.hash.slice(1) !== name) {
   location.hash = name;
 }
 if (name !== "coach" && typeof CO !== "undefined") CO._stopDash();  // ダッシュボード自動更新を停止 (#286)
 // タブ離脱時は各モジュールのSSE接続を閉じ、会場NAT配下の同時接続数を節約 (#264)。
 // 再入時に各 init() が張り直す。
 if (name !== "live" && typeof L !== "undefined") L._closeOpsStream();
 if (name !== "myportal" && typeof MP !== "undefined") MP._closeOpsStream();
 if (name === "tournaments") V.renderTournaments();
 else if (name === "search") V.doSearch();
 else if (name === "ranking") V.renderRanking();
 else if (name === "stats") V.renderStats();
 else if (name === "live") L.init();
 else if (name === "myportal") MP.init();
 else if (name === "coach") CO.render();
 },

 // 直前のページに戻る (履歴がなければ大会一覧へ)
 goBack() {
 // アプリ内履歴スタックで直近のページへ確実に戻る
 if (V._navStack && V._navStack.length) {
   V._navBack = true;                  // 戻り操作はスタックに積まない
   const prev = V._navStack.pop();
   location.hash = prev || "";         // hashchange → 直前のページを復元
   if (!prev) V.showTab("tournaments", true);
   return;
 }
 if (history.length > 1) history.back();
 else V.showTab("tournaments");
 },

 async reload() {
 try {
 const tournaments = await api.get("/api/public/tournaments");
 V.state.tournaments = tournaments || [];
 V.updateLiveIndicator();
 if (V.activeTab === "tournaments") V.renderTournaments();
 } catch (e) {
 console.error(e);
 }
 },

 // 成績(試合)データがある時だけ ランキング/統計 タブを表示する。
 // 協会初回・大会序盤は常に空なので、空タブを常設せず畳む(破壊者指摘)。
 async _updateStatTabs() {
 let hasData = false;
 try { const st = await api.get("/api/public/stats"); hasData = !!(st && (st.matchCount || 0) > 0); } catch (e) {}
 ["ranking", "stats"].forEach(name => {
 const btn = document.querySelector('.tab[data-tab="' + name + '"]');
 if (btn) btn.style.display = hasData ? "" : "none";
 });
 // 非表示タブが今アクティブなら大会一覧へ退避
 if (!hasData && (V.activeTab === "ranking" || V.activeTab === "stats")) V.showTab("tournaments");
 },

 // 進行中の大会が1件も無ければ LIVE 表記を隠す
 updateLiveIndicator() {
 const el = document.getElementById("liveIndicator");
 if (!el) return;
 const hasOngoing = (V.state.tournaments || []).some(t => t.status === "ongoing");
 el.style.display = hasOngoing ? "" : "none";
 },

 // ─── 大会一覧 ────────────────────────────────
 renderTournaments() {
 const list = document.getElementById("tournamentList");
 clear(list);
 if (!V.state.tournaments.length) {
 list.appendChild(h("div", { className: "empty-state" },
 "まだ大会が登録されていません。"));
 return;
 }
 const statusLabels = { scheduled: "予定", preparation: "準備中", ongoing: "進行中", completed: "終了", cancelled: "中止" };
 const fmtD = (dt) => dt ? `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}` : "日程未定";

 const buildCard = (t) => {
 const d = t.date ? new Date(t.date) : null;
 const st = t.status || "scheduled";
 const mc = t.match_count || 0;
 const done = t.completed_count != null ? t.completed_count : 0;
 const progress = mc > 0 ? Math.round((done / mc) * 100) : 0;
 const meta = [
   h("span", { className: "meta-chip" }, fmtD(d)),
   h("span", { className: "meta-chip" }, t.venue || "会場未定"),
 ];
 if (t.player_count) meta.push(h("span", { className: "meta-chip" }, t.player_count + "名"));
 if (mc) meta.push(h("span", { className: "meta-chip" }, mc + "試合"));
 return h("div", { className: "tcard is-" + st, "aria-label": (t.name || "大会") + " を開く", ...V._kbtn(() => V.openTournament(t.id)) },
 h("div", { className: "tcard-accent" }),
 h("div", { className: "tcard-body" },
 h("div", { className: "tcard-top" },
 h("div", { className: "tcard-name" }, t.name || "（無題）"),
 h("span", { className: "st-pill is-" + st }, statusLabels[st] || "予定"),
 ),
 h("div", { className: "tcard-meta" }, ...meta),
 (st === "ongoing" && mc > 0) ? h("div", { className: "wr-bar", style: { marginTop: "10px" },
   title: `${done}/${mc} 試合完了` }, h("span", { style: { width: progress + "%" } })) : null,
 ),
 h("div", { className: "tcard-arrow", "aria-hidden": "true" }, "›"),
 );
 };

 // 年別にグループ化 (年数が増えてもスクロールを抑制)
 const byYear = {};
 V.state.tournaments.forEach(t => {
   const y = (t.date && /^\d{4}/.test(t.date)) ? t.date.slice(0, 4) : "日付未定";
   (byYear[y] = byYear[y] || []).push(t);
 });
 const years = Object.keys(byYear).sort((a, b) => b.localeCompare(a)); // 新しい年が上
 // 年が1つだけならアコーディオンにせずそのまま表示
 if (years.length <= 1) {
   V.state.tournaments.forEach(t => list.appendChild(buildCard(t)));
   return;
 }
 years.forEach((y, yi) => {
   const ts = byYear[y];
   const ongoingCount = ts.filter(t => t.status === "ongoing").length;
   // 進行中を含む年 or 最新年を開く
   const open = yi === 0 || ongoingCount > 0;
   const acc = h("div", { className: "mr-acc" + (open ? " open" : "") });
   const head = h("div", { className: "mr-acc-head",
     onClick: () => acc.classList.toggle("open") },
     h("span", { className: "mr-acc-title" }, y === "日付未定" ? y : y + "年"),
     ongoingCount ? h("span", { className: "meta-chip hot" }, "進行中" + ongoingCount) : null,
     h("span", { className: "mr-acc-count" }, ts.length + "大会"));
   const bodyEl = h("div", { className: "mr-acc-body" });
   ts.forEach(t => bodyEl.appendChild(buildCard(t)));
   acc.appendChild(head); acc.appendChild(bodyEl);
   list.appendChild(acc);
 });
 },

 // ─── 大会詳細 ────────────────────────────────
 async openTournament(id, updateHash = true) {
 if (updateHash) location.hash = "tournament/" + id;
 TT.showLoading();
 try {
 const t = await api.get("/api/public/tournaments/" + id);
 if (t.error) { toast("大会が見つかりませんでした。一覧から選び直してください", "err"); return; }
 const matches = await api.get(`/api/public/tournaments/${id}/matches`);
 V.state.currentTournament = t;
 V.renderTournamentDetail(t, matches || []);
 V.showTabPanelOnly("detail");
 } catch (e) { console.error(e); } finally { TT.hideLoading(); }
 },

 renderTournamentDetail(t, matches) {
 const el = document.getElementById("tournamentDetail");
 clear(el);
 // BYE は実試合ではない (シードの繰り上がり) → 結果表示から除外
 matches = (matches || []).filter(m =>
   m.winner_name !== "BYE" && m.loser_name !== "BYE" && !m.is_walkover);

 // ヘッダ
 const statusLabels = { scheduled: "予定", ongoing: "進行中", completed: "終了" };
 el.appendChild(h("div", { className: "card fi" },
 h("div", { className: "flex gap-3", style: { alignItems: "center", flexWrap: "wrap" } },
 h("div", { className: "flex-1" },
 h("div", { style: { fontSize: "22px", fontWeight: 700 } }, t.name),
 h("div", { className: "text-sm text-sub mt-1" },
 `${fmtDate(t.date) || "日付未定"}　・　${t.venue || "会場未定"}`
 ),
 t.description ? h("div", { className: "text-sm mt-2" }, t.description) : null,
 ),
 h("div", {},
 h("span", { className: "badge status-" + (t.status || "scheduled") },
 statusLabels[t.status] || "予定"),
 ),
 ),
 h("div", { className: "grid grid-auto mt-3" },
 h("div", { className: "stat-box" },
 h("div", { className: "stat-num" }, String(matches.length)),
 h("div", { className: "stat-label" }, "試合数")),
 h("div", { className: "stat-box" },
 h("div", { className: "stat-num" }, String((t.players || []).length)),
 h("div", { className: "stat-label" }, "出場選手")),
 h("div", { className: "stat-box" },
 h("div", { className: "stat-num" }, String(t.court_count || 0)),
 h("div", { className: "stat-label" }, "コート数")),
 ),
 ));

 if (!matches.length) {
 el.appendChild(h("div", { className: "empty-state" }, "まだ試合が登録されていません。"));
 return;
 }

 // イベント種目ごとにグループ化
 const byEvent = {};
 matches.forEach(m => {
 const e = m.event || "その他";
 (byEvent[e] = byEvent[e] || []).push(m);
 });

 // 用語の凡例 (初めて見る人向け)
 el.appendChild(h("div", { className: "term-note" }, "「不戦勝(BYE)」= 相手がいない枠。次の試合へ自動で進みます"));

 // 種目アコーディオン (種目が多くてもスクロールを抑制。最初の種目だけ開く)
 const eventNames = Object.keys(byEvent);
 eventNames.forEach((event, ei) => {
 const ms = byEvent[event];
 const acc = h("div", { className: "mr-acc" + (ei === 0 ? " open" : "") });
 const head = h("div", { className: "mr-acc-head",
   onClick: () => acc.classList.toggle("open") },
   h("span", { className: "mr-acc-title" }, event),
   h("span", { className: "mr-acc-count" }, ms.length + "試合"));
 const bodyEl = h("div", { className: "mr-acc-body" });

 // 団体リーグ(総当たり)なら順位表(星取表)を先頭に。観客に分かりやすく順位/セット率/得点率を提示。
 if (ms.some(m => m.round === "予選リーグ" || m.league_block)) {
   const stWrap = h("div", { className: "lg-standings" });
   bodyEl.appendChild(stWrap);
   V._loadStandings(t.id, event, stWrap);
 }

 // ラウンドごと (round_order 昇順)
 const byRound = {};
 ms.forEach(m => { const r = m.round || "その他"; (byRound[r] = byRound[r] || []).push(m); });
 Object.entries(byRound).sort((a, b) =>
   (a[1][0].round_order || 99) - (b[1][0].round_order || 99)
 ).forEach(([round, rms]) => {
   // 両者とも対戦者未確定の将来戦(? vs ?)は情報ゼロの骨組み。取込直後は大量に並んでノイズになるため、
   // 完了済み・対戦カード確定(片側でも選手が入っている)分だけ表示し、未確定は件数に畳む(情報は失わない)。
   const known = (nm) => nm && nm !== "BYE";
   const shown = rms.filter(m => (m.status === "completed" && m.winner_name) || known(m.player1_name) || known(m.player2_name));
   const undetermined = rms.length - shown.length;
   if (!shown.length && !undetermined) return;
   bodyEl.appendChild(h("div", { className: "mr-round-label" }, round + " (" + rms.length + ")"));
   shown.forEach(m => bodyEl.appendChild(V.renderMatchResultRow(m)));
   if (undetermined) bodyEl.appendChild(h("div", { className: "mr-undetermined" },
     `他 ${undetermined} 試合 — 対戦者未確定`));
 });

 acc.appendChild(head); acc.appendChild(bodyEl);
 el.appendChild(acc);
 });
 },

 // 団体リーグの順位表(星取表)を非同期で読込んで描画。未生成/エラーなら何も出さない。
 async _loadStandings(tid, event, wrap) {
 try {
   const sd = await api.get(`/api/public/tournaments/${tid}/standings?event=${encodeURIComponent(event)}`);
   const blocks = sd && sd.standings;
   const has = blocks && (Array.isArray(blocks) ? blocks.length : Object.keys(blocks).length);
   if (!has) { wrap.remove(); return; }
   const byBlock = Array.isArray(blocks) ? { "": blocks } : blocks;
   clear(wrap);
   wrap.appendChild(h("div", { className: "mr-round-label" }, "順位表"));
   Object.keys(byBlock).sort().forEach(bk =>
     wrap.appendChild(TT.leagueTableEl(bk, byBlock[bk], (sd.matches || []).filter(m => m.block === bk))));
 } catch (e) { wrap.remove(); }
 },

 // 大会結果: 横並び「○勝者 — スコア — 敗者×」(どっちが勝ったか明快)
 renderMatchResultRow(m) {
 const nameEl = (id, name) => id
   ? h("a", { href: "#player/" + id,
       onClick: (e) => { e.preventDefault(); e.stopPropagation(); V.openPlayer(id); } }, name || "?")
   : h("span", {}, name || "?");
 // 未対戦(将来の試合): 勝者未確定。"不戦勝"ではなく「選手 vs 選手(予定)」で表示する。
 //   旧実装は isBye=!loser_name としており、まだ行われていない試合を一律「不戦勝」と誤表示していた
 //   (取込直後は全将来戦が不戦勝表示になる)。完了済みのみ結果/不戦勝として扱う。
 const done = m.status === "completed" && !!m.winner_name;
 if (!done) {
   const slot = (nm) => (nm && nm !== "BYE") ? nm : "?";
   return h("div", { className: "mr-row mr-pending" },
     h("div", { className: "mr-win" },
       h("div", { className: "mr-pname", style: { color: "var(--sub)", fontWeight: 500 } }, slot(m.player1_name))),
     h("div", { className: "mr-vs", style: { fontSize: "11px", color: "var(--sub-l)" } }, "vs"),
     h("div", { className: "mr-lose" },
       h("div", { className: "mr-pname", style: { color: "var(--sub)", fontWeight: 500 } }, slot(m.player2_name))));
 }
 // 完了済みで敗者なし(=不戦勝/BYE。通常は呼出元で除外済みだが防御的に)
 const isBye = m.is_walkover || !m.loser_name || m.loser_name === "BYE";
 if (isBye) {
   return h("div", { className: "mr-row" },
     h("div", { className: "mr-win" },
       h("div", { className: "mr-pname" }, nameEl(m.winner_id, m.winner_name),
         m.winner_team ? h("span", { className: "mr-pteam" }, " (" + m.winner_team + ")") : null)),
     h("div", { className: "mr-vs", style: { fontSize: "11px" }, title: "対戦相手がいないため、次の試合へ自動で進みます" }, "不戦勝"),
     h("div", { className: "mr-lose" }, h("div", { className: "mr-pname", style: { color: "var(--sub-l)" } }, "対戦相手なし")));
 }
 return h("div", { className: "mr-row", style: { cursor: "pointer" },
     title: "タップで試合詳細", onClick: () => V.showBracketMatchDetail(m) },
   h("div", { className: "mr-win" },
     h("div", { className: "mr-pname" }, nameEl(m.winner_id, m.winner_name)),
     m.winner_team ? h("div", { className: "mr-pteam" }, m.winner_team) : null),
   h("div", { className: "mr-vs" }, TT.fmtScore(m.winner_sets, m.loser_sets),
     m.result_source === "referee" ? h("div", { style: { fontSize: "10px", color: "#b45309",
       fontWeight: 700, marginTop: "1px" }, title: "審判による速報値（本部確認待ち）" }, "速報") : null,
     m.duration_sec ? h("div", { style: { fontSize: "10px", color: "var(--sub)", fontWeight: "400", marginTop: "2px" } },
       TT.fmtDuration(m.duration_sec)) : null),
   h("div", { className: "mr-lose" },
     h("div", { className: "mr-pname" }, nameEl(m.loser_id, m.loser_name)),
     m.loser_team ? h("div", { className: "mr-pteam" }, m.loser_team) : null),
 );
 },

 // トーナメント表の対戦をタップ → 詳細 + 選手個人DBリンク (シングルス/ダブルス両対応 #255)
 showBracketMatchDetail(m) {
 let sets = [];
 try { sets = m.sets || JSON.parse(m.sets_json || "[]"); } catch (e) {}
 // sets は選手1視点で保存。見出し(勝者先頭)と揃えるため、勝者が選手2のときは各セットを反転(#セット逆順)。
 // 同名対戦(player1とplayer2が同名)では誤反転を避けるため、player1 と一致しない場合のみ反転。
 const _p2Won = m.winner_name && m.winner_name === m.player2_name && m.winner_name !== m.player1_name;
 const setsStr = (sets || []).map(s => (Array.isArray(s) && s.length === 2) ? (_p2Won ? s[1] + "-" + s[0] : s[0] + "-" + s[1]) : "").filter(Boolean).join(" / ");
 const body = h("div", {},
   h("div", { className: "badge mb-2", style: { display: "inline-block" } }, [m.event, m.round].filter(Boolean).join(" ")),
   h("div", { style: { background: "#fffbeb", padding: "10px", borderRadius: "8px", borderLeft: "4px solid var(--warn)" } },
     h("div", { className: "font-bold" }, "" + (m.winner_name || "?"),
       m.winner_team ? h("span", { className: "text-sub text-sm" }, " (" + m.winner_team + ")") : null),
     h("div", { className: "text-lg font-bold mt-1", style: { fontFamily: "monospace" } }, TT.fmtScore(m.winner_sets, m.loser_sets)),
     setsStr ? h("div", { className: "text-sm text-sub mt-1" }, setsStr) : null),
   // 団体戦(tie)の内訳: 各個別試合の勝ちチーム(home=選手1 / away=選手2)を表示。
   (Array.isArray(m.tie_results) && m.tie_results.length) ? h("div", { style: { marginTop: "8px", padding: "10px", background: "#f8fafc", borderRadius: "8px" } },
     h("div", { className: "text-sm font-bold text-sub mb-1" }, "団体戦の内訳"),
     ...m.tie_results.map(r => {

 formatSets(sets, isWinner) {

 // 対戦相手サイドのメンバー配列 (#265: ダブルスは相手ペア2名を別々にリンク)。各 {id, name}。
 _oppMembers(m, playerId) {
 const won = m.winner_id === playerId;
 const oppMainId = won ? m.loser_id : m.winner_id;
 const oppMainName = won ? (m.loser_name || "?") : (m.winner_name || "?");
 // 相手サイドが player1 / player2 のどちらかを判定 (partner情報の対応付け)
 let side = null;
 if (m.player1_id && oppMainId && oppMainId === m.player1_id) side = 1;
 else if (m.player2_id && oppMainId && oppMainId === m.player2_id) side = 2;
 else if (m.player1_id && m.player1_id === playerId) side = 2;
 else if (m.player2_id && m.player2_id === playerId) side = 1;
 const first = (s) => String(s == null ? "" : s).split(" / ")[0].trim();
 if (side === 1 || side === 2) {
   const mainId = side === 1 ? m.player1_id : m.player2_id;
   const mainNm = (side === 1 ? m.player1_main_name : m.player2_main_name)
     || first(side === 1 ? m.player1_name : m.player2_name) || oppMainName;
   const pId = side === 1 ? m.player1_partner_id : m.player2_partner_id;
   const pNm = side === 1 ? m.player1_partner_name : m.player2_partner_name;
   const list = [{ id: mainId || null, name: mainNm }];
   if (pId || (pNm && String(pNm).trim())) list.push({ id: pId || null, name: (pNm && String(pNm).trim()) || "ペア" });
   return list;
 }
 return [{ id: oppMainId || null, name: oppMainName }];   // 判定不可(旧データ等)→単独
 },

 // 数字カウントアップ (出場選手数のアニメーション)
 _countUp(el, target) {
 const dur = 650, t0 = performance.now();
 const step = (now) => {
   const k = Math.min(1, (now - t0) / dur);
   el.textContent = String(Math.round(target * (1 - Math.pow(1 - k, 3))));
   if (k < 1) requestAnimationFrame(step);
 };
 requestAnimationFrame(step);
 },

const L = {

 async init() {
 const sel = document.getElementById("liveTournamentSel");
 // 選べるのは「進行中」の大会のみ (閲覧の大会進行)

 const def = ongoing[0];
 if (def) { sel.value = def.id; L.select(def.id); return; }

 // 再開: データ再取得 + SSE が閉じていれば再接続
 if (L.tournamentId) { L.fetch(); if (!L._es) L._initOpsStream(); L._updateConnBadge(); }

 if (!sel.value) {

 + (ongoing.length ? "大会を選択してください。"

 select(id) {
 L.tournamentId = id;
 L._ver = null;
 L._tickFails = 0;
 if (L.poller) clearInterval(L.poller);
 L._closeOpsStream();
 if (!id) { document.getElementById("liveMain").textContent = ""; L._updateConnBadge(); return; }
 L.fetch();
 // 変化検知: SSE で即時 push (#264)。SSE 不可/断の環境では下の ops-version ポーリングが代替。
 L._initOpsStream();
 L.poller = setInterval(() => L.tick(), 4000);
 L._updateConnBadge();
 },

 async tick() {
 if (!L.tournamentId) return;
 // SSE が生きている間 (直近メッセージ < 7秒) はポーリングを省略 (SSE が変化を即push)。
 if (L._sseLastMsg && (Date.now() - L._sseLastMsg) < 7000) { L._updateConnBadge(); return; }
 try {
 const r = await api.get("/api/public/tournaments/" + L.tournamentId + "/ops-version");
 if (r && r.v !== undefined && r.v !== L._ver) { L._ver = r.v; L.fetch(); }

 } catch (e) { L._tickFails++; }

 },

 async fetch() {
 if (!L.tournamentId) return;
 try {
 const r = await api.get("/api/public/tournaments/" + L.tournamentId + "/live");
 if (r.error) return;
 L.state = r;
 L.render();
 } catch (e) { console.error(e); }
 },

 // ── SSE リアルタイム push (#264 パターンを観戦ビューへ移植) ──
 // サーバが進行変化を即push。EventSource は自動再接続。SSE 不可/断の環境 (旧端末・
 // 会場NATで上限超過の 429/503 等) では tick(ポーリング)が代替するため安全に縮退する。
 // 送られるのは reload 合図のみ (PII無し)。実データは従来どおり /live で取得。
 _initOpsStream() {
 L._closeOpsStream();
 if (typeof EventSource === "undefined" || !L.tournamentId) return;
 try {
 const es = new EventSource("/api/public/tournaments/" + encodeURIComponent(L.tournamentId) + "/ops-stream");
 L._es = es;
 es.onmessage = (e) => {
 L._sseLastMsg = Date.now();   // hello/ping/ops いずれでも健全性を更新
 L._tickFails = 0;
 let d = null; try { d = JSON.parse(e.data || "{}"); } catch (_) {}
 // 変化 → 即時 /live 取得。観戦タブを離れている間は隠れた再描画を避け、
 // 復帰時に init() が再取得する (接続は維持し変化検知だけ継続)。
 if (d && d.type === "ops" && V.activeTab === "live") L.fetch();
 L._updateConnBadge();

 es.onerror = () => { L._updateConnBadge(); /* 自動再接続。復帰までは tick(ポーリング)が代替 */ };

 },
 _closeOpsStream() {
 if (L._es) { try { L._es.close(); } catch (e) {} L._es = null; }

 },

 // 更新経路の可視化: SSE即時 / ポーリング / 断 の3状態を控えめに表示。

 const el = document.getElementById("lConnBadge");
 if (!el) return;
 if (!L.tournamentId) { el.hidden = true; return; }
 el.hidden = false;
 const sseAlive = L._sseLastMsg && (Date.now() - L._sseLastMsg) < 7000;
 let cls, label;
 if (sseAlive) { cls = "is-live"; label = "ライブ更新中"; }
 else if (L._tickFails >= 2) { cls = "is-down"; label = "再接続中…"; }

 // ダブルスのペア両名をそれぞれプロフィール表示できるようにする (#237)。
 // side(1|2) のメンバー配列 [{id,name}] を返す (シングルス=1名 / ダブルス=2名)。
 sideMembers(m, side) {
   const pid      = side === 1 ? m.player1_id : m.player2_id;
   const combined = side === 1 ? m.player1_name : m.player2_name;
   const main     = side === 1 ? m.player1_main_name : m.player2_main_name;
   const ppid     = side === 1 ? m.player1_partner_id : m.player2_partner_id;
   const pname    = side === 1 ? m.player1_partner_name : m.player2_partner_name;
   const first = (main && String(main).trim())
     || String(combined || "").split(" / ")[0].trim() || combined || "選手";
   const list = [{ id: pid || null, name: first }];
   if (ppid || (pname && String(pname).trim())) {
     list.push({ id: ppid || null, name: (pname && String(pname).trim()) || "ペア" });
   }
   return list;
 },
 // 勝者/敗者(who:'winner'|'loser') が属する side を判定してメンバー配列を返す
 resultSideMembers(m, who) {
   let ws = 0;
   if (m.winner_id && m.player1_id && m.winner_id === m.player1_id) ws = 1;
   else if (m.winner_id && m.player2_id && m.winner_id === m.player2_id) ws = 2;
   if (!ws) { // 判定不可(旧データ/手動入力) → 従来通り単独
     const id = who === "winner" ? m.winner_id : m.loser_id;
     const nm = who === "winner" ? m.winner_name : m.loser_name;
     return [{ id: id || null, name: nm || "選手" }];
   }
   return L.sideMembers(m, who === "winner" ? ws : (ws === 1 ? 2 : 1));
 },
 // 試合詳細フッター: シングルス/ダブルス両名の「選手DB ▸」ボタン行 (#260)
 // タップで選手個人DB(戦績・入賞歴つき)へ。admin の _playerDbLinks と同一トンマナ。

     color: "#6d28d9", textAlign: "center" } }, "審判: " + m.referee_name) : null,
 );
 // シングルス/ダブルス両名の「選手DB ▸」ボタン (#237/#260) — タップで個人DB(戦績・入賞歴)へ
 const foot = L.playerDbFoot(L.sideMembers(m, 1), L.sideMembers(m, 2));

// マイ番号ポータル (選手個人ビュー + 呼出通知)
// ═══════════════════════════════════════════════════════
const MP = {
 playerId: null,
 player: null,
 state: null,
 poller: null,
 lastNotified: null, // 直前に通知した状態(連続通知防止)
 notifEnabled: false,
 _pushReady: false,   // 購読登録済みフラグ (通知ON表示に使用) #268-push
 _es: null,           // SSE (EventSource) 接続 — 呼出をより速く検知 (#264 パターン)
 _sseTid: null,       // 購読中の大会ID
 _sseLastMsg: 0,      // 直近SSEメッセージ時刻 (ポーリング省略判定用)

 async init() {
 MP.playerId = localStorage.getItem("tt_player_id") || null;
 if (MP.poller) clearInterval(MP.poller);

 if (!MP.playerId) {
 MP.renderRegister();
 } else {
 await MP.fetch();
 // SSE健全時はポーリングを省略し、変化時はSSE pushで即 fetch (呼出をより速く通知)。
 // SSE不可/断時は5秒ポーリングが確実な代替として残る (呼出見落とし防止)。
 MP.poller = setInterval(() => MP.tick(), 5000);
 // 既登録なら Web Push を(再)購読 (端末/許可状況が変わっている場合に備える)
 if (("Notification" in window) && Notification.permission === "granted") MP.setupPush();
 }
 },

 // ── 選手番号登録画面 ──
 async renderRegister(prefilled) {
 const main = document.getElementById("myportalMain");
 clear(main);

 const card = h("div", { className: "card fi" },
 h("div", { className: "card-head" },
 h("div", { className: "card-title" }, "マイ番号を登録"),
 ),
 h("div", { className: "text-sm text-sub mb-3" },
 "あなたが大会にエントリーしているなら、自分の名前を検索して選んでください。"),
 h("div", { className: "field" },
 h("label", { className: "field-label" }, "選手名・所属で検索"),
 h("input", { className: "input", id: "mpSearchInput",
 placeholder: "例: 山田 太郎、高校", autocomplete: "off",
 value: prefilled || "" }),
 ),
 h("div", { id: "mpSearchResults" }),
 h("div", { className: "text-xs text-sub mt-3" },
 "ヒント: 一度登録すると、このスマホで自動的にあなたの試合状況が表示されます。"),
 );
 main.appendChild(card);

 const input = document.getElementById("mpSearchInput");
 const results = document.getElementById("mpSearchResults");
 let timer;
 input.addEventListener("input", () => {
 clearTimeout(timer);
 timer = setTimeout(async () => {
 const q = input.value.trim();
 clear(results);
 if (!q) return;
 const players = await api.get("/api/public/players?search=" + encodeURIComponent(q));
 if (!players.length) {
 results.appendChild(h("div", { className: "empty-state" },
 "該当する選手が見つかりませんでした。姓と名の間の空白を外す・ひらがなで試すなど、表記を変えてお試しください"));
 return;
 }
 players.slice(0, 10).forEach(p => {
 results.appendChild(h("div", {
 className: "player-card",
 "aria-label": (p.name || "選手") + " を選択",
 ...V._kbtn(() => MP.selectPlayer(p.id, p.name)),
 style: { marginBottom: "6px" }
 },
 h("div", { className: "player-avatar " +
 (p.gender === "female" ? "female" : "") },
 (p.name || "?")[0]),
 h("div", { className: "player-info" },
 h("div", { className: "player-name" }, p.name),

 p.team || "",
 p.furigana ? " / " + p.furigana : "")),
 ));
 });
