<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1e2a4a">
<title>KTTA Platform - LIVE 観戦ビュー</title>
<link rel="stylesheet" href="/shared/common.css">
<style>
  :root {
    /* ─── 丹頂ライトテーマ (白基調・丹頂レッド・墨ヘッダー / 視認性最優先) ─── */
    --lv-bg: #ffffff;
    --lv-surface: #ffffff;
    --lv-surface-2: #f7f7f9;
    --lv-line: #e4dccb;       /* わずかに温かみのある罫 */
    --lv-line-strong: #c9bfa8;
    --lv-text: #191917;
    --lv-text-2: #3a3a3f;
    --lv-sub: #6b6b72;
    --lv-accent: #c01526;     /* 丹頂レッド (アクセント・LIVE) */
    --lv-warn: #9a6a10;       /* アンバー (呼出可能) */
    --lv-ok: #1a7a45;         /* 緑 (使用可能・終了) */
    --lv-blue: #2563eb;       /* 青 (待機) */
    --lv-purple: #7c3aed;     /* 紫 (団体追加コート) */
    --lv-header: #191917;     /* ヘッダー墨(ink) */
    /* 仕上げ: 部分ハードコードのトークン化(見た目は実質同等・トンマナ統一) */
    --lv-ok-2: #22c55e;       /* 緑(明) 進捗バーのグラデ上端 */
    --lv-ok-d: #15803d;       /* 緑(暗) 進捗の数字 */
    --lv-disabled: #9ca3af;   /* 空コートの文字(無彩) */
    --lv-disabled-2: #a1a1aa; /* 空コートhover文字 */
    --lv-border-weak: #d4d4d8;/* 空コートの破線罫 */
    --lv-warn-bg: #fef3c7; --lv-warn-fg: #92400e; --lv-warn-line: #f59e0b;   /* 再コール cc1 黄 */
    --lv-warn2-bg: #fed7aa; --lv-warn2-fg: #7c2d12; --lv-warn2-line: #ea580c;/* 再コール cc2 橙 */
    --lv-danger-bg: #fecaca; --lv-danger-fg: #7f1d1d; --lv-danger-line: #dc2626;/* 再コール cc3+ 赤 */
  }
  html { background: var(--lv-bg); }
  body {
    background: var(--lv-bg);
    color: var(--lv-text);
    font-family: var(--font-body);
    overflow-x: hidden;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .lv-shell {
    max-width: 1600px; margin: 0 auto;
    padding: 10px;
  }

  /* ─── ヘッダー (濃紺ベース・コンパクト化) ─── */
  .lv-header {
    background: var(--lv-header);
    color: #fff;
    border-radius: 6px;
    padding: 8px 14px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .lv-header .lv-brand-name,
  .lv-header .lv-brand-tag {
    color: #fff;
  }
  .lv-header .lv-brand-tag { color: rgba(255,255,255,.7); }
  .lv-brand {
    display: flex; align-items: center; gap: 10px;
    flex: 1; min-width: 220px;
  }
  .lv-brand-mark {
    width: 36px; height: 36px;
    background: url("/shared/ktta-mark.svg") center / contain no-repeat;
    flex-shrink: 0;
  }
  .lv-brand-text {
    display: flex; flex-direction: column; line-height: 1;
  }
  .lv-brand-name {
    font-family: var(--font-display);
    font-size: 14px; font-weight: 700;
    letter-spacing: -0.01em;
  }
  .lv-brand-tag {
    font-family: var(--font-display);
    font-size: 8px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--lv-sub);
    margin-top: 3px;
  }
  .lv-live-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--lv-accent);
    border: 1px solid var(--lv-accent);
    color: #fff;
    padding: 5px 11px; border-radius: 14px;
    font-family: var(--font-display);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.16em;
  }
  .lv-live-chip::before {
    background: #fff !important;
  }
  .lv-live-chip::before {
    content: ""; width: 6px; height: 6px;
    border-radius: 50%; background: var(--lv-accent);
    animation: lvPulse 1.4s infinite;
  }
  @keyframes lvPulse { 0%,100%{opacity:1}50%{opacity:.35} }

  .lv-controls {
    display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto;
  }
  .lv-btn {
    background: rgba(255,255,255,.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,.3);
    padding: 7px 13px;
    border-radius: 5px;
    font-family: var(--font-body); font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all .12s;
  }
  .lv-btn:hover { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.5); }
  .lv-btn.active { background: #fff; color: var(--lv-header); border-color: #fff; }
  /* 閲覧モードへ戻るリンク (#259) */
  a.lv-btn { text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
  .lv-btn-back {
    background: rgba(255,255,255,.16);
    border-color: rgba(255,255,255,.45);
    font-weight: 700;
  }
  .lv-btn-back:hover { background: rgba(255,255,255,.28); border-color: #fff; }
  .lv-select {
    background: rgba(255,255,255,.95);
    color: var(--lv-text);
    border: 1px solid rgba(255,255,255,.3);
    padding: 7px 28px 7px 13px;
    border-radius: 5px;
    font-family: var(--font-body); font-size: 12px;
    cursor: pointer;
  }

  /* ─── 大会タイトル + ステータス (コンパクト) ─── */
  .lv-tournament-bar {
    display: flex; align-items: baseline; gap: 12px;
    padding: 4px 4px; margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .lv-tournament-name {
    font-family: var(--font-display);
    font-size: 18px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .lv-tournament-meta {
    font-size: 11px; color: var(--lv-sub);
  }

  /* ─── 統計バー (大型カード・コンパクト化) ─── */
  /* 全体進捗バー */
  .lv-progress {
    background: var(--lv-surface); border: 2px solid var(--lv-line);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 10px;
  }
  .lv-progress-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 7px; flex-wrap: wrap; gap: 4px;
  }
  .lv-progress-title { font-size: 14px; font-weight: 700; }
  .lv-progress-figure { font-size: 13px; color: var(--lv-sub); }
  .lv-progress-figure strong { color: var(--lv-ok); font-size: 17px; }
  .lv-progress-bar {
    height: 24px; border-radius: 12px; background: var(--lv-line);
    overflow: hidden;
  }
  .lv-progress-fill {
    height: 100%; border-radius: 12px;
    background: linear-gradient(90deg, var(--lv-ok-2), var(--lv-ok));
    display: flex; align-items: center; justify-content: flex-end;
    transition: width .5s ease;
  }
  .lv-progress-fill.done { background: linear-gradient(90deg, var(--lv-ok), var(--lv-ok-d)); }
  .lv-progress-eta { margin-top: 7px; font-size: 14px; font-weight: 700; color: var(--lv-sub); text-align: right; }
  .lv-progress-pct { color: #fff; font-size: 12px; font-weight: 800; padding-right: 10px; }

  .lv-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px; margin-bottom: 10px;
  }
  .lv-stat {
    background: var(--lv-surface);
    border: 2px solid var(--lv-line);
    border-radius: 6px;
    padding: 8px 12px;
    text-align: center;
    transition: transform .12s;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .lv-stat-num {
    font-family: var(--font-mono);
    font-size: 24px; font-weight: 800;
    line-height: 1;
  }
  .lv-stat-num.red { color: var(--lv-accent); }
  .lv-stat-num.yellow { color: var(--lv-warn); }
  .lv-stat-num.green { color: var(--lv-ok); }
  .lv-stat-num.blue { color: var(--lv-blue); }
  .lv-stat-label {
    font-family: var(--font-body);
    font-size: 11px; font-weight: 700;
    color: var(--lv-text-2);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  /* 進行中カードは赤帯付き */
  .lv-stat.highlight-red { border-color: var(--lv-accent); background: #fef2f2; }
  .lv-stat.highlight-yellow { border-color: var(--lv-warn); background: #fffbeb; }
  .lv-stat.highlight-blue { border-color: var(--lv-blue); background: #eff6ff; }
  .lv-stat.highlight-green { border-color: var(--lv-ok); background: #f0fdf4; }

  /* ─── コートボード ─── */
  .lv-board {
    background: var(--lv-surface);
    border: 1px solid var(--lv-line);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .lv-section-title {
    font-family: var(--font-display);
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--lv-text);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--lv-line);
  }

  /* ─── ステータス凡例 (色の見方) ─── */
  .lv-legend {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 8px; padding: 6px 10px;
    background: var(--lv-surface-2);
    border-radius: 5px; border: 1px solid var(--lv-line);
    font-size: 10px;
  }
  .lv-legend-item {
    display: flex; align-items: center; gap: 6px;
    font-weight: 600;
  }
  .lv-legend-swatch {
    width: 16px; height: 16px; border-radius: 3px;
    border: 1.5px solid;
  }
  .lv-legend-swatch.empty   { background: #fff; border-color: var(--lv-line-strong); }
  .lv-legend-swatch.active  { background: var(--lv-accent); border-color: var(--lv-accent); }
  .lv-legend-swatch.extra   { background: var(--lv-purple); border-color: var(--lv-purple); }

  .lv-board-inner {
    display: grid; gap: 8px; margin: 0 auto;
    grid-template-columns: repeat(var(--lv-cols, 4), 1fr);
    max-width: var(--lv-maxw, none);
  }
  /* スマホで横スクロール案内 (overflow時のみ JS で表示) */
  .lv-scroll-hint {
    display: none; align-items: center; justify-content: center; gap: 6px;
    font-size: 11px; font-weight: 700; color: var(--lv-accent);
    background: var(--lv-surface-2); border: 1px dashed var(--lv-accent);
    border-radius: 20px; padding: 4px 12px;
    margin: 0 auto 8px; width: max-content;
  }

  /* ─── コート (コート) - 上部にヘッダーストリップ / 下部に審判 ─── */
  .lv-court {
    background: #fff;
    border: 2px solid var(--lv-line);
    border-radius: 6px;
    padding: 18px 4px 16px;  /* 上 18 = ヘッダーストリップ分、下 16 = 審判ストリップ分 */
    min-height: 90px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    cursor: pointer;
    transition: all .15s;
    overflow: hidden;
    gap: 1px;
  }
  /* 上部ストリップ (コートN | 種目) */
  .lv-court-header {
    position: absolute; top: 0; left: 0; right: 0;
    height: 14px;
    display: flex; align-items: center;
    background: rgba(0,0,0,.06);
    padding: 0 4px;
    font-size: 9px; font-weight: 700;
    line-height: 1;
    gap: 4px;
  }
  .lv-court-header .tno {
    font-family: var(--font-mono);
    background: var(--lv-header); color: #fff;
    padding: 1px 5px; border-radius: 3px;
    flex-shrink: 0;
  }
  .lv-court-header .ev {
    color: var(--lv-text-2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
    font-size: 8px;
    letter-spacing: 0.02em;
  }
  .lv-court.active .lv-court-header { background: rgba(0,0,0,.3); }
  .lv-court.active .lv-court-header .ev { color: rgba(255,255,255,.92); }
  .lv-court.extra .lv-court-header { background: rgba(0,0,0,.3); }
  .lv-court.extra .lv-court-header .ev { color: rgba(255,255,255,.92); }
  /* 下部ストリップ (審判) */
  .lv-court-footer {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 13px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.04);
    padding: 0 4px;
    font-size: 8px; font-weight: 600;
    color: var(--lv-text-2);
    line-height: 1;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .lv-court-footer:empty { display: none; }
  .lv-court.active .lv-court-footer {
    background: rgba(0,0,0,.25); color: rgba(255,255,255,.85);
  }
  .lv-court.extra .lv-court-footer {
    background: rgba(0,0,0,.25); color: rgba(255,255,255,.85);
  }

  /* 空きコート: 白背景(種目色=特に男子D緑 との混同を避ける。空きは無彩色+破線で非アクティブ感) */
  .lv-court.empty {
    background: var(--lv-bg);
    border-color: var(--lv-border-weak);
    border-style: dashed;
    color: var(--lv-disabled);
  }
  .lv-court.empty:hover {
    border-color: var(--lv-disabled-2);
    background: var(--lv-surface-2);
  }
  .lv-court.empty .lv-court-header { background: rgba(0,0,0,.04); }
  .lv-court.empty .lv-court-header .ev { color: var(--lv-disabled); font-weight: 700; }
  .lv-court.empty .lv-court-footer { background: rgba(0,0,0,.03); color: var(--lv-disabled); }

  /* 進行中: 赤背景・白文字・脈動アニメ */
  .lv-court.active {
    background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
    border-color: #991b1b;
    color: #fff;
    animation: lvCourtPulse 2.4s infinite;
    box-shadow: 0 2px 8px rgba(220,38,38,.3);
  }

  /* 団体追加コート: 紫背景 */
  .lv-court.extra {
    background: linear-gradient(180deg, #a78bfa 0%, #7c3aed 100%);
    border-color: #5b21b6;
    color: #fff;
  }

  /* 種目色で塗られるため box-shadow は色中立に (脈動のみ) */
  @keyframes lvCourtPulse {
    0%, 100% { box-shadow: 0 2px 8px rgba(0,0,0,.20), 0 0 0 0 rgba(0,0,0,.16); }
    50%      { box-shadow: 0 2px 8px rgba(0,0,0,.20), 0 0 0 6px rgba(0,0,0,0); }
  }
  /* 種目色の凡例 */
  .lv-ev-legend { display:flex; flex-wrap:wrap; gap:6px 12px; margin:6px 0 2px;
    font-size:11px; color:var(--lv-sub); align-items:center; }
  .lv-ev-legend .lv-ev-item { display:inline-flex; align-items:center; gap:5px; }
  .lv-ev-legend .lv-ev-swatch { width:13px; height:13px; border-radius:4px;
    border:1px solid rgba(0,0,0,.15); flex:0 0 auto; }

  /* 旧 lv-court-no / lv-court-round は廃止 (lv-court-header に統合) */

  /* 選手名 (大きく・読みやすく) */
  .lv-court-p {
    font-size: 13px; font-weight: 800;
    line-height: 1.25;
    margin-top: 4px;
    max-width: 100%;
    overflow: hidden; text-overflow: ellipsis;
    text-align: center;
    text-shadow: 0 1px 2px rgba(0,0,0,.15);
  }
  .lv-court.empty .lv-court-p { text-shadow: none; color: var(--lv-disabled); }
  /* 選手名→個人DBリンク (#266) */
  .lv-name-link { color: inherit; text-decoration: underline; text-decoration-style: dotted;
    text-underline-offset: 2px; cursor: pointer; }
  .lv-name-link:hover { opacity: .82; }
  .lv-name-sep { opacity: .6; margin: 0 3px; font-weight: 700; }

  .lv-court-team {
    font-size: 10px; opacity: .9;
    text-align: center;
    overflow: hidden; text-overflow: ellipsis;
    max-width: 100%; font-weight: 600;
  }

  .lv-court-vs {
    font-family: var(--font-display);
    font-size: 9px; opacity: .7;
    margin: 3px 0; letter-spacing: 0.15em;
    font-weight: 700;
  }

  .lv-court-empty-label {
    display: none;  /* ::after で「空」表示するため */
  }

  /* 本部 (BENCH) 表示 */
  .lv-hq {
    margin-top: 14px;
    background: var(--lv-header);
    color: #fff;
    text-align: center;
    padding: 10px;
    border-radius: 6px;
    font-family: var(--font-display);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.22em;
  }

  /* ─── 試合タブ (コンパクト) ─── */
  .lv-tabs {
    display: flex; gap: 0;
    border-bottom: 2px solid var(--lv-line);
    margin-bottom: 8px;
    background: var(--lv-surface);
    border-radius: 6px 6px 0 0;
    padding: 0 6px;
  }
  .lv-tab {
    background: transparent;
    color: var(--lv-sub);
    border: none;
    padding: 9px 14px;
    font-family: var(--font-body); font-size: 13px;
    font-weight: 700; cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all .12s;
  }
  .lv-tab:hover { color: var(--lv-text); }
  .lv-tab.active {
    color: var(--lv-accent);
    border-bottom-color: var(--lv-accent);
  }
  .lv-tab-count {
    display: inline-block;
    background: var(--lv-line);
    color: var(--lv-text);
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 800;
    padding: 2px 8px; border-radius: 10px;
    margin-left: 6px;
  }
  .lv-tab.active .lv-tab-count {
    background: var(--lv-accent); color: #fff;
  }

  /* ─── 進行中試合ロー (コンパクト化) ─── */
  .lv-match {
    background: var(--lv-surface);
    border: 2px solid var(--lv-accent);
    border-radius: 6px;
    padding: 8px 12px;
    margin: 0 auto 6px;
    max-width: 680px;           /* 視線移動を抑えるため横幅を制限 (#186) */
    display: grid;
    grid-template-columns: 54px minmax(0,1fr) auto;
    gap: 10px;
    align-items: center;
    cursor: pointer;
    transition: all .12s;
    box-shadow: 0 1px 3px rgba(220,38,38,.1);
  }
  .lv-match:hover {
    border-color: var(--lv-accent);
    box-shadow: 0 4px 12px rgba(220,38,38,.2);
    transform: translateY(-1px);
  }
  .lv-match-table {
    background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
    color: #fff;
    font-family: var(--font-display);
    font-size: 16px; font-weight: 800;
    text-align: center;
    padding: 6px 4px;
    border-radius: 5px;
    letter-spacing: -0.01em;
    box-shadow: 0 2px 4px rgba(220,38,38,.3);
  }
  .lv-match-players {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    overflow: hidden;
  }
  /* 両選手を VS の近くにまとめて視線移動を最小化 (#186) */
  .lv-match-side {
    flex: 0 1 auto; min-width: 0; max-width: 44%; text-align: right;
  }
  .lv-match-side.right { text-align: left; }
  .lv-match-name {
    font-size: 14px; font-weight: 700;
    overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lv-match-team {
    font-size: 11px; color: var(--lv-sub);
    overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lv-match-vs {
    font-family: var(--font-display);
    font-size: 11px; font-weight: 600;
    color: var(--lv-sub);
    letter-spacing: 0.12em;
  }
  .lv-match-meta {
    text-align: right;
    font-size: 10px; color: var(--lv-sub);
    line-height: 1.4;
  }
  .lv-match-meta .ref {
    color: var(--lv-warn);
    font-weight: 600;
  }

  /* ─── 直近結果 (左右対比+勝敗強調・コンパクト化) ─── */
  .lv-result {
    background: var(--lv-surface);
    border: 2px solid var(--lv-line);
    border-radius: 6px;
    padding: 8px 14px;
    margin: 0 auto 6px;
    max-width: 620px;           /* 視線移動を抑える (#186) */
    display: grid;
    grid-template-columns: minmax(0,1fr) 96px minmax(0,1fr);
    gap: 10px;
    align-items: center;
  }
  .lv-result-side {
    min-width: 0;
  }
  .lv-result-side.right { text-align: right; }
  .lv-result-side .name {
    font-size: 15px; font-weight: 700;
    overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lv-result-side .team {
    font-size: 12px; color: var(--lv-sub);
    margin-top: 3px;
    overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* 負けた選手は取り消し線なし・グレーアウトのみ (#217) */
  .lv-result-side.loser { opacity: 0.55; color: var(--lv-sub); }
  .lv-result-side.loser .name {
    color: var(--lv-sub);
  }
  .lv-result-side.winner .name {
    color: var(--lv-accent);
    font-weight: 800;
  }
  .lv-result-side.winner::before {
    content: "勝";
    display: inline-block;
    background: var(--lv-accent);
    color: #fff;
    font-size: 11px; font-weight: 800;
    padding: 2px 7px;
    border-radius: 3px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .lv-result-side.right.winner::before {
    margin-right: 0; margin-left: 6px;
  }
  .lv-result-side.right.winner {
    text-align: right;
  }
  .lv-result-score {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: var(--lv-surface-2);
    border-radius: 6px;
  }
  .lv-result-counts {
    font-family: var(--font-mono);
    font-size: 28px; font-weight: 800;
    letter-spacing: 0;
    line-height: 1;
    color: var(--lv-text);
  }
  .lv-result-counts .winner-pt {
    color: var(--lv-accent);
  }
  .lv-result-counts .sep {
    color: var(--lv-sub);
    margin: 0 5px;
  }
  .lv-result-event {
    font-family: var(--font-display);
    font-size: 10px; font-weight: 700;
    color: var(--lv-text-2);
    letter-spacing: 0.04em;
  }

  /* ─── 残試合 ─── */
  .lv-next {
    display: grid;
    grid-template-columns: 70px 1fr;
    gap: 14px; padding: 11px 16px;
    border-bottom: 1px solid var(--lv-line);
    align-items: center;
    background: var(--lv-surface);
  }
  .lv-next:hover { background: var(--lv-surface-2); }
  .lv-next:last-child { border-bottom: none; }
  .lv-next-tag {
    font-family: var(--font-display);
    font-size: 9px; font-weight: 600;
    color: var(--lv-warn);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .lv-next-content {
    font-size: 13px;
  }
  .lv-next-content .vs-sep { color: var(--lv-sub); margin: 0 7px; font-size: 11px; }

  /* ─── 検索 (コンパクト) ─── */
  .lv-search {
    margin-bottom: 8px;
  }
  .lv-search input {
    width: 100%;
    background: var(--lv-surface);
    border: 2px solid var(--lv-line);
    color: var(--lv-text);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: inherit; font-size: 13px;
    font-weight: 500;
  }
  .lv-search input::placeholder { color: var(--lv-sub); font-weight: 400; }
  .lv-search input:focus {
    outline: none;
    border-color: var(--lv-accent);
    box-shadow: 0 0 0 3px rgba(220,38,38,.1);
  }
  .lv-search-hit {
    background: #fffbeb;
    border: 2px solid var(--lv-warn);
    padding: 10px 14px; border-radius: 6px;
    margin: 6px 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--lv-text);
  }

  /* ─── 再コール 注意/警告マーク (観戦者向け・選手別 inline) ─── */
  /* コート (コート) セル内の選手名直下に表示 */
  .lv-call-badge {
    display: inline-block;
    background: var(--lv-warn-bg);
    color: var(--lv-warn-fg);
    border: 1px solid var(--lv-warn-line);
    font-family: var(--font-display);
    font-size: 8px; font-weight: 800;
    padding: 0px 4px;
    border-radius: 6px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    line-height: 1.3;
    margin-top: 1px;
    vertical-align: middle;
  }
  .lv-call-badge.warning {
    background: var(--lv-warn2-bg);
    color: var(--lv-warn2-fg);
    border-color: var(--lv-warn2-line);
    animation: lvCallPulse 1.5s infinite;
  }
  .lv-call-badge.critical {
    background: var(--lv-danger-bg);
    color: var(--lv-danger-fg);
    border-color: var(--lv-danger-line);
    animation: lvCallPulse 1s infinite;
  }
  @keyframes lvCallPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: .55; }
  }
  .lv-court.active .lv-call-badge {
    background: var(--lv-warn-bg);  /* 赤背景でも黄バッジが視認できるよう維持 */
    box-shadow: 0 1px 3px rgba(0,0,0,.25);
  }
  /* 進行中ロー用 (選手名 inline) */
  .lv-match-call-badge {
    display: inline-block;
    background: var(--lv-warn-bg);
    color: var(--lv-warn-fg);
    border: 1px solid var(--lv-warn-line);
    font-family: var(--font-display);
    font-size: 9px; font-weight: 800;
    padding: 1px 5px;
    border-radius: 7px;
    margin-left: 5px;
    vertical-align: middle;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .lv-match-call-badge.warning {
    background: var(--lv-warn2-bg); color: var(--lv-warn2-fg); border-color: var(--lv-warn2-line);
    animation: lvCallPulse 1.5s infinite;
  }
  .lv-match-call-badge.critical {
    background: var(--lv-danger-bg); color: var(--lv-danger-fg); border-color: var(--lv-danger-line);
    animation: lvCallPulse 1s infinite;
  }

  /* ─── 選手番号バッジ (大会固有・左右別) ─── */
  .lv-pnum {
    display: inline-block;
    background: rgba(0,0,0,.18);
    color: inherit;
    font-family: var(--font-mono);
    font-weight: 800;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 7px;
    margin-right: 3px;
    vertical-align: middle;
    letter-spacing: 0;
  }
  .lv-court.empty .lv-pnum { background: rgba(0,0,0,.05); color: #9ca3af; }
  .lv-court.active .lv-pnum,
  .lv-court.extra .lv-pnum { background: rgba(255,255,255,.28); color: #fff; }
  .lv-match-name .lv-pnum,
  .lv-result-side .lv-pnum,
  .lv-detail-val .lv-pnum {
    background: var(--lv-header);
    color: #fff;
    font-size: 10px;
    padding: 1px 6px;
  }
  .lv-next-content .lv-pnum {
    background: var(--lv-header);
    color: #fff;
    font-size: 10px;
    padding: 1px 5px;
  }

  /* ─── 大画面モード ─── */
  body.lv-big { font-size: 18px; }
  body.lv-big .lv-court { min-height: 130px; padding: 14px 8px; }
  body.lv-big .lv-court-p { font-size: 16px; }
  body.lv-big .lv-court-team { font-size: 12px; }
  body.lv-big .lv-stat-num { font-size: 32px; }
  body.lv-big .lv-match-name { font-size: 17px; }
  /* 全画面/大画面 終了ボタン (#185) — 大画面 or 全画面時のみ表示 */
  .lv-exit-big { display: none; }
  body.lv-big .lv-exit-big,
  body.lv-fs .lv-exit-big {
    display: inline-flex; align-items: center; gap: 6px;
    position: fixed; top: 12px; right: 12px; z-index: 99999;
    padding: 11px 18px; border-radius: 26px;
    background: rgba(15,23,42,.88); color: #fff;
    border: 1px solid rgba(255,255,255,.28);
    font-size: 14px; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 18px rgba(0,0,0,.45);
  }
  .lv-exit-big:hover { background: #dc2626; border-color: #dc2626; }

  /* ─── モーダル (コートクリック詳細) ─── */
  .lv-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.82);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .lv-overlay-card {
    background: var(--lv-surface);
    border: 1px solid var(--lv-line);
    border-radius: 10px;
    max-width: 520px; width: 100%;
    padding: 24px;
    color: var(--lv-text);
  }
  .lv-overlay-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--lv-line);
  }
  .lv-overlay-title {
    font-family: var(--font-display);
    font-size: 18px; font-weight: 700;
  }
  .lv-overlay-close {
    background: none; color: var(--lv-sub);
    border: 1px solid var(--lv-line);
    width: 28px; height: 28px; border-radius: 4px;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .lv-overlay-close:hover { color: var(--lv-text); }

  .lv-detail-row {
    display: grid; grid-template-columns: 100px 1fr;
    gap: 10px; padding: 8px 0;
    border-bottom: 1px dashed var(--lv-line);
    font-size: 13px;
  }
  .lv-detail-row:last-child { border: none; }
  .lv-detail-label {
    color: var(--lv-sub);
    font-family: var(--font-display);
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .lv-detail-val { word-break: break-all; }
  .lv-detail-val.player {
    font-size: 15px; font-weight: 700;
  }
  .lv-detail-val .team { font-size: 12px; color: var(--lv-sub); margin-top: 2px; }
  .lv-detail-val.ref {
    color: var(--lv-warn); font-weight: 600;
  }

  /* QR ダイアログ */
  .lv-qr {
    background: #fff; color: #111;
    padding: 24px;
    border-radius: 10px;
    max-width: 360px;
    text-align: center;
  }
  .lv-qr h3 {
    font-family: var(--font-display);
    font-size: 17px; font-weight: 700;
    margin-bottom: 14px;
  }
  .lv-qr .url-text {
    word-break: break-all; font-size: 11px;
    background: #f4f4f5; padding: 8px 10px;
    border-radius: 3px; margin: 10px 0;
    font-family: var(--font-mono);
  }

  /* 空ステート */
  .lv-empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--lv-sub);
  }
  .lv-empty h2 {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 700;
    margin-bottom: 8px; color: var(--lv-text);
  }
  .lv-empty .list { max-width: 600px; margin: 20px auto 0; }
  .lv-empty .card {
    background: var(--lv-surface);
    border: 1px solid var(--lv-line);
    border-radius: 6px;
    padding: 14px 18px;
    margin-bottom: 6px;
    cursor: pointer;
    text-align: left;
    transition: all .12s;
  }
  .lv-empty .card:hover {
    border-color: var(--lv-text);
    background: var(--lv-surface-2);
  }
  .lv-empty .card .name {
    font-family: var(--font-display);
    font-size: 15px; font-weight: 700;
    color: var(--lv-text);
  }
  .lv-empty .card .meta {
    font-size: 12px; color: var(--lv-sub);
    margin-top: 4px;
  }

  /* ─── レスポンシブ ─── */
  /* タブレット */
  @media (max-width: 960px) {
    .lv-shell { padding: 10px; }
    .lv-header { padding: 12px 14px; }
    .lv-stats { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .lv-stat-num { font-size: 18px; }
    .lv-court { min-height: 80px; padding: 8px 4px; }
    .lv-court-p { font-size: 11px; }
  }
  /* スマホ */
  @media (max-width: 640px) {
    .lv-shell { padding: 8px; }
    .lv-header { padding: 10px 12px; gap: 8px; }
    .lv-brand-tag { display: none; }
    .lv-controls { width: 100%; margin-left: 0; }
    .lv-controls .lv-btn { font-size: 11px; padding: 6px 10px; }
    .lv-controls .lv-select { font-size: 11px; padding: 6px 22px 6px 10px; flex: 1; }
    .lv-tournament-name { font-size: 18px; }
    .lv-tournament-meta { font-size: 11px; }
    .lv-stats { grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .lv-stat { padding: 7px 8px; }
    .lv-stat-num { font-size: 15px; }
    .lv-stat-label { font-size: 8px; letter-spacing: 0.08em; }
    .lv-board { padding: 12px 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    /* 1fr で潰れて縦長になるのを防ぎ、固定幅+横スクロールに */
    .lv-board-inner { grid-template-columns: repeat(var(--lv-cols, 4), 92px); max-width: none; width: max-content; }
    .lv-court { min-height: 64px; padding: 16px 3px 14px; }
    .lv-court-p { font-size: 10px; }
    .lv-court-team { font-size: 8px; }
    .lv-court-vs { font-size: 7px; margin: 1px 0; }
    .lv-court-no { font-size: 8px; left: 4px; top: 3px; }
    .lv-court-round { font-size: 7px; padding: 1px 3px; }
    .lv-match { grid-template-columns: 50px 1fr; gap: 10px; padding: 10px 12px; }
    .lv-match-table { font-size: 12px; padding: 4px; }
    .lv-match-name { font-size: 13px; }
    .lv-match-team { font-size: 10px; }
    .lv-match-meta { display: none; }
    .lv-result { grid-template-columns: 1fr 70px 1fr; padding: 11px 12px; }
    .lv-result-side .name { font-size: 13px; }
    .lv-result-side .team { font-size: 10px; }
    .lv-result-counts { font-size: 18px; }
    .lv-tab { padding: 9px 11px; font-size: 12px; }
    .lv-tab-count { font-size: 9px; }
    .lv-overlay-card { padding: 18px; }
    .lv-detail-row { grid-template-columns: 80px 1fr; font-size: 12px; }
  }
  /* 小型スマホ */
  @media (max-width: 380px) {
    .lv-stats { grid-template-columns: repeat(2, 1fr); }
    /* 9px は観客に読みづらいため底上げ(選手名11px/所属9px)。レイアウトは維持 */
    .lv-court-p { font-size: 11px; }
    .lv-court-team { font-size: 9px; }
    .lv-tab { padding: 9px 8px; font-size: 11px; }
  }
</style>
</head>
<body>

<div class="lv-shell">

  <!-- ヘッダー -->
  <div class="lv-header">
    <div class="lv-brand">
      <div class="lv-brand-mark" aria-label="KTTA"></div>
      <div class="lv-brand-text">
        <div class="lv-brand-name">KTTA Platform</div>
        <div class="lv-brand-tag">KUSHIRO · TABLE TENNIS</div>
      </div>
      <span class="lv-live-chip">LIVE</span>
    </div>
    <div class="lv-controls">
      <a class="lv-btn lv-btn-back" href="/viewer/" title="閲覧モード（通常表示）に戻る">← 閲覧モード</a>
      <select id="tournSel" class="lv-select" onchange="LV.selectTournament(this.value)"></select>
      <button class="lv-btn" id="bsBtn" onclick="LV.toggleBigscreen()">大画面</button>
      <button class="lv-btn" onclick="LV.toggleFullscreen()">全画面</button>
      <button class="lv-btn" onclick="LV.showShareDialog()">共有</button>
    </div>
  </div>

  <div id="lvMain">
    <div class="lv-empty">
      <h2>大会を選択してください</h2>
      <div style="font-size:13px;color:var(--lv-sub);margin-top:8px">
        参加者・保護者の方は、観戦したい大会を選んでください。
      </div>
      <div class="list" id="emptyTList"></div>
    </div>
  </div>

</div>

<!-- 全画面/大画面モードの終了ボタン (#185) -->
<button class="lv-exit-big" id="lvExitBig" onclick="LV.exitBigscreen()"
  title="大画面/全画面を終了">✕ 表示を戻す</button>

<!-- 動的オーバーレイ (コート詳細・QR) -->
<div id="lvOverlay"></div>

<script src="/shared/common.js"></script>
<script>
const { h, api, clear, fmtDate } = TT;

const LV = {
  tournamentId: null,
  state: null,
  poller: null,
  searchQuery: "",
  activeTab: "live", // "live" | "next" | "done"
  tournaments: [],

  async init() {
    const params = new URLSearchParams(location.search);
    const fromUrl = params.get("t") || params.get("tournament") || "";
    const hashParts = location.hash.replace(/^#/, "").split("/");
    const fromHash = hashParts[0] === "live" && hashParts[1] ? hashParts[1] : "";
    const initialId = fromUrl || fromHash;

    await LV.loadTournaments();
    if (initialId) {
      LV.selectTournament(initialId);
    } else {
      LV.renderEmptyState();
    }

    if (localStorage.getItem("ktta_lv_big") === "1") {
      document.body.classList.add("lv-big");
      document.getElementById("bsBtn").classList.add("active");
    }

    // 全画面状態を body.lv-fs に反映 (#185 終了ボタンの表示制御)
    document.addEventListener("fullscreenchange", () => {
      document.body.classList.toggle("lv-fs", !!document.fullscreenElement);
    });
    // Esc で詳細/QRモーダルを閉じる(init で1回だけ登録)。
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        const ov = document.getElementById("lvOverlay");
        if (ov && ov.childElementCount) ov.replaceChildren();
      }
    });
  },

  async loadTournaments() {
    try {
      const all = await api.get("/api/public/tournaments");
      // ★ 観戦ビューは「進行中」の大会のみ表示
      LV.tournaments = (all || []).filter(t => t.status === "ongoing");
      const sel = document.getElementById("tournSel");
      clear(sel);
      if (!LV.tournaments.length) {
        sel.appendChild(h("option", { value: "" }, "— 進行中の大会はありません —"));
      } else {
        sel.appendChild(h("option", { value: "" }, "— 大会を選択 —"));
        LV.tournaments.forEach(t => {
          sel.appendChild(h("option", { value: t.id },
            `${t.name} (${fmtDate(t.date) || ""})`));
        });
      }
    } catch (e) { console.error(e); }
  },

  renderEmptyState() {
    const list = document.getElementById("emptyTList");
    if (!list) return;
    clear(list);
    if (!LV.tournaments || !LV.tournaments.length) {
      list.appendChild(h("div", { style: { color: "var(--lv-sub)", textAlign: "center", padding: "20px" } },
        h("div", { style: { fontSize: "16px", marginBottom: "6px" } }, "現在、進行中の大会はありません"),
        h("div", { style: { fontSize: "13px", opacity: ".8" } },
          "大会が始まると、ここに自動で表示されます。")));
      return;
    }
    // 進行中のみなのでソート不要だが念のため
    LV.tournaments.forEach(t => {
      list.appendChild(h("div", {
          className: "card",
          onClick: () => LV.selectTournament(t.id)
        },
        h("div", { className: "name" }, t.name),
        h("div", { className: "meta" },
          `${fmtDate(t.date) || "日程未定"}  ·  ${t.venue || "会場未定"}  ·  [進行中]`),
      ));
    });
  },

  selectTournament(id) {
    LV.tournamentId = id;
    LV._ver = null;
    document.getElementById("tournSel").value = id || "";
    if (LV.poller) clearInterval(LV.poller);
    if (!id) {
      LV.renderEmptyState();
      history.replaceState({}, "", location.pathname);
      return;
    }
    history.replaceState({}, "", location.pathname + "?t=" + encodeURIComponent(id));
    LV.fetch();
    // 変化検知: 軽量 ops-version を見て、変化時だけ重い /live を取得
    LV.poller = setInterval(() => LV.tick(), 4000);
  },

  async tick() {
    if (!LV.tournamentId) return;
    try {
      const r = await api.get("/api/public/tournaments/" + LV.tournamentId + "/ops-version");
      if (r && r.v !== undefined && r.v !== LV._ver) { LV._ver = r.v; LV.fetch(); }
    } catch (e) {}
  },

  async fetch() {
    if (!LV.tournamentId) return;
    try {
      const r = await api.get("/api/public/tournaments/" + LV.tournamentId + "/live");
      if (r.error) return;
      LV.state = r;
      LV.render();
    } catch (e) { console.error(e); }
  },

  render() {
    const s = LV.state;
    if (!s) return;
    const main = document.getElementById("lvMain");
    // V2: 全再描画で検索入力のフォーカス/カーソルが失われる(毎キーストローク+ポーリング)ため、再描画前に保存
    const _ae = document.activeElement;
    const _searchFocused = !!(_ae && _ae.id === "lvSearchInput");
    const _caret = _searchFocused ? _ae.selectionStart : null;
    // ライブ更新の全再描画でスクロール位置が失われるのを防ぐ(コート盤面の横/ページの縦)。
    const _boardEl = main.querySelector(".lv-board-inner");
    const _boardScroll = _boardEl ? _boardEl.scrollLeft : 0;
    const _winY = window.scrollY || window.pageYOffset || 0;
    clear(main);

    // 大会タイトル+メタ
    main.appendChild(h("div", { className: "lv-tournament-bar" },
      h("div", { className: "lv-tournament-name" }, s.tournament.name || ""),
      h("div", { className: "lv-tournament-meta" },
        `${fmtDate(s.tournament.date) || ""} ${s.tournament.venue ? " · " + s.tournament.venue : ""}`),
    ));

    // 統計
    const totalCompleted = Object.values(s.event_stats || {})
      .reduce((a, e) => a + (e.completed || 0), 0);

    // ── 全体進捗バー (最上部) ──
    const totalMatches = (s.total_matches != null) ? s.total_matches
      : Object.values(s.event_stats || {}).reduce((a, e) => a + (e.total || 0), 0);
    const lvPct = totalMatches > 0 ? Math.round((totalCompleted / totalMatches) * 100) : 0;
    main.appendChild(h("div", { className: "lv-progress" },
      h("div", { className: "lv-progress-head" },
        h("span", { className: "lv-progress-title" }, "大会の進捗"),
        h("span", { className: "lv-progress-figure" },
          totalCompleted + " / " + totalMatches + " 試合　",
          h("strong", {}, lvPct + "%"))),
      h("div", { className: "lv-progress-bar" },
        h("div", { className: "lv-progress-fill" + (lvPct >= 100 ? " done" : ""),
          style: { width: lvPct + "%" } },
          lvPct >= 12 ? h("span", { className: "lv-progress-pct" }, lvPct + "%") : null)),
      // 全試合終了は明示。それ以外は終了時刻の目安のみ表示 (平均/残試合は出さない) #282
      (totalMatches > 0 && lvPct >= 100)
        ? h("div", { className: "lv-progress-eta", style: { color: "var(--lv-ok)" } }, "🏁 全試合終了")
        : (s.progress && s.progress.eta_text)
          ? h("div", { className: "lv-progress-eta" }, "終了予定 " + s.progress.eta_text + " ごろ（目安）")
          : null,
    ));
    main.appendChild(h("div", { className: "lv-stats" },
      h("div", { className: "lv-stat highlight-red" },
        h("div", { className: "lv-stat-num red" }, String(s.on_table.length)),
        h("div", { className: "lv-stat-label" }, "進行中の試合")),
      h("div", { className: "lv-stat highlight-yellow" },
        h("div", { className: "lv-stat-num yellow" }, String(s.callable.length)),
        h("div", { className: "lv-stat-label" }, "残試合数")),
      h("div", { className: "lv-stat highlight-blue" },
        h("div", { className: "lv-stat-num blue" }, String(s.waiting || 0)),
        h("div", { className: "lv-stat-label" }, "待機中")),
      h("div", { className: "lv-stat highlight-green" },
        h("div", { className: "lv-stat-num green" }, String(totalCompleted)),
        h("div", { className: "lv-stat-label" }, "終了した試合")),
    ));

    // 検索
    const searchBox = h("div", { className: "lv-search" },
      h("input", {
        id: "lvSearchInput",
        placeholder: "選手名・所属チームで検索",
        value: LV.searchQuery,
        onInput: (e) => { LV.searchQuery = e.target.value; LV.render(); },
      }),
    );
    main.appendChild(searchBox);

    if (LV.searchQuery && LV.searchQuery.length >= 1) {
      const hits = LV.findPlayerMatches(s, LV.searchQuery);
      if (hits.length) {
        const hitsBox = h("div", {});
        hits.slice(0, 8).forEach(hit => {
          hitsBox.appendChild(h("div", { className: "lv-search-hit" },
            hit.where + " · " + hit.summary));
        });
        main.appendChild(hitsBox);
      }
    }

    // コート配置
    main.appendChild(LV.renderCourtBoard(s));

    // 試合タブ
    main.appendChild(LV.renderMatchTabs(s));

    // V2: 再描画後に検索入力のフォーカス/カーソル位置を復元 (入力が途切れない)
    if (_searchFocused) {
      const inp = document.getElementById("lvSearchInput");
      if (inp) {
        inp.focus();
        try { const p = (_caret == null ? inp.value.length : _caret); inp.setSelectionRange(p, p); } catch (e) {}
      }
    }
    // スクロール位置の復元(コート盤面の横スクロール・ページ縦位置)。再構築直後に rAF で適用。
    if (_boardScroll) {
      const nb = main.querySelector(".lv-board-inner");
      if (nb) requestAnimationFrame(() => { nb.scrollLeft = _boardScroll; });
    }
    if (_winY) requestAnimationFrame(() => { window.scrollTo(0, _winY); });
  },

  renderCourtBoard(s) {
    const { court_rows, court_cols, hq_position } = s.tournament;
    const wrap = h("div", { className: "lv-board" });
    wrap.appendChild(h("div", { className: "lv-section-title" }, "コート配置 (LIVE)"));

    // 色分け凡例
    const activeCount = s.tables.filter(t => t.match && !t.is_extra).length;
    const extraCount = s.tables.filter(t => t.match && t.is_extra).length;
    const emptyCount = s.tables.filter(t => !t.match).length;
    wrap.appendChild(h("div", { className: "lv-legend" },
      h("div", { className: "lv-legend-item" },
        h("span", { className: "lv-legend-swatch empty" }),
        h("span", {}, "使用可 (" + emptyCount + "コート)")),
      h("div", { className: "lv-legend-item" },
        h("span", { className: "lv-legend-swatch active" }),
        h("span", {}, "進行中 (" + activeCount + "コート)")),
      extraCount > 0 ? h("div", { className: "lv-legend-item" },
        h("span", { className: "lv-legend-swatch extra" }),
        h("span", {}, "団体追加コート (" + extraCount + "コート)")) : null,
    ));

    // 種目ごとの色 凡例 (進行中のコートに出ている種目のみ) #182
    const activeEvents = [...new Set(s.tables.filter(t => t.match && t.match.event)
      .map(t => t.match.event))];
    if (activeEvents.length) {
      const legend2 = h("div", { className: "lv-ev-legend" });
      activeEvents.forEach(ev => {
        const ec = TT.eventColor(ev);
        legend2.appendChild(h("div", { className: "lv-ev-item" },
          h("span", { className: "lv-ev-swatch", style: { background: ec.bg } }),
          h("span", {}, ev)));
      });
      wrap.appendChild(legend2);
    }

    // 横スクロール案内 (スマホでオーバーフロー時のみ JS で表示)
    const scrollHint = h("div", { className: "lv-scroll-hint" }, "← 横にスワイプで全てのコートを表示 →");
    wrap.appendChild(scrollHint);

    const grid = h("div", { className: "lv-board-inner" });
    grid.style.setProperty("--lv-cols", String(court_cols));
    grid.style.setProperty("--lv-maxw", `${court_cols * 130}px`);

    s.tables.forEach(t => {
      const cell = h("div", {
        className: "lv-court " + (t.match ? "active" : "empty")
          + (t.is_extra ? " extra" : ""),
        onClick: () => t.match && LV.showCourtDetail(t),
        title: t.match ? "クリックで詳細" : "空きコート",
      });
      // 進行中のコートは種目ごとに色分け (#182)
      if (t.match) {
        const ec = TT.eventColor(t.match.event);
        cell.style.background = ec.bg;
        cell.style.borderColor = ec.border;
        cell.style.color = ec.fg;
      }
      // 上部ストリップ: コート番号 + 種目 (重なり解消)
      const eventLabel = t.match
        ? ((t.match.event || "") + (t.match.round ? " " + t.match.round : ""))
        : "空きコート";
      cell.appendChild(h("div", { className: "lv-court-header" },
        h("span", { className: "tno" }, "コート" + t.table_no),
        h("span", { className: "ev" }, eventLabel),
      ));
      if (t.match) {
        const cc1 = parseInt(t.match.call_count_p1) || 0;
        const cc2 = parseInt(t.match.call_count_p2) || 0;
        // 選手1 + 番号 + 所属 + 再コールバッジ (#266: 氏名を個人DBへリンク・ダブルスは両名)
        cell.appendChild(h("div", { className: "lv-court-p" },
          ...LV.playerNameNodes(t.match, 1, t.match.player1_bracket_number)));
        if (t.match.player1_team) {
          cell.appendChild(h("div", { className: "lv-court-team" }, t.match.player1_team));
        }
        if (cc1 >= 1) {
          cell.appendChild(LV.callBadgeCourtEl(cc1));
        }
        cell.appendChild(h("div", { className: "lv-court-vs" },
          t.is_extra ? "団体追加" : "VS"));
        cell.appendChild(h("div", { className: "lv-court-p" },
          ...LV.playerNameNodes(t.match, 2, t.match.player2_bracket_number)));
        if (t.match.player2_team) {
          cell.appendChild(h("div", { className: "lv-court-team" }, t.match.player2_team));
        }
        if (cc2 >= 1) {
          cell.appendChild(LV.callBadgeCourtEl(cc2));
        }
      }
      // 下部ストリップ: 審判名 (進行中のみ表示)
      const refText = t.match
        ? (t.match.referee_name ? "審判: " + t.match.referee_name : "")
        : "";
      cell.appendChild(h("div", { className: "lv-court-footer" }, refText));
      grid.appendChild(cell);
    });
    wrap.appendChild(grid);
    if (hq_position === "bottom") {
      wrap.appendChild(h("div", { className: "lv-hq",
        style: { maxWidth: `${court_cols * 130}px`, margin: "14px auto 0" } },
        "本部"));
    }
    // 描画後にオーバーフロー判定して案内を表示 (スマホでコートが画面に収まらない時)
    requestAnimationFrame(() => {
      if (wrap.scrollWidth > wrap.clientWidth + 4) scrollHint.style.display = "flex";
    });
    return wrap;
  },

  renderMatchTabs(s) {
    const wrap = h("div", {});
    const tabsBar = h("div", { className: "lv-tabs" },
      h("button", { className: "lv-tab" + (LV.activeTab === "live" ? " active" : ""),
        onClick: () => { LV.activeTab = "live"; LV.render(); } },
        "進行中",
        h("span", { className: "lv-tab-count" }, String(s.on_table.length))),
      h("button", { className: "lv-tab" + (LV.activeTab === "next" ? " active" : ""),
        onClick: () => { LV.activeTab = "next"; LV.render(); } },
        "残試合数",
        h("span", { className: "lv-tab-count" }, String(s.callable.length))),
      h("button", { className: "lv-tab" + (LV.activeTab === "done" ? " active" : ""),
        onClick: () => { LV.activeTab = "done"; LV.render(); } },
        "終了した試合",
        h("span", { className: "lv-tab-count" }, String(s.recent_finished.length))),
    );
    wrap.appendChild(tabsBar);

    const content = h("div", {});
    if (LV.activeTab === "live") {
      if (!s.on_table.length) {
        content.appendChild(h("div", { className: "lv-empty",
          style: { padding: "30px 16px", fontSize: "13px" } },
          "現在進行中の試合はありません。"));
      } else {
        s.on_table.forEach(m => content.appendChild(LV.renderOngoing(m)));
      }
    } else if (LV.activeTab === "next") {
      if (!s.callable.length) {
        content.appendChild(h("div", { className: "lv-empty",
          style: { padding: "30px 16px", fontSize: "13px" } },
          "残試合はありません。"));
      } else {
        s.callable.slice(0, 20).forEach(m => {
          const p1Num = m.player1_bracket_number;
          const p2Num = m.player2_bracket_number;
          content.appendChild(h("div", { className: "lv-next" },
            h("div", { className: "lv-next-tag" },
              `${(m.event || "").slice(0, 10)}`, h("br", {}),
              `${(m.round || "").slice(0, 10)}`),
            h("div", { className: "lv-next-content" },
              p1Num && p1Num > 0
                ? h("span", { className: "lv-pnum" }, "#" + p1Num) : null,
              h("span", {}, m.player1_name || "?"),
              h("span", { className: "vs-sep" }, "VS"),
              p2Num && p2Num > 0
                ? h("span", { className: "lv-pnum" }, "#" + p2Num) : null,
              h("span", {}, m.player2_name || "?")),
          ));
        });
      }
    } else if (LV.activeTab === "done") {
      if (!s.recent_finished.length) {
        content.appendChild(h("div", { className: "lv-empty",
          style: { padding: "30px 16px", fontSize: "13px" } },
          "終了した試合はまだありません。"));
      } else {
        s.recent_finished.forEach(m => content.appendChild(LV.renderResult(m)));
      }
    }
    wrap.appendChild(content);
    return wrap;
  },

  // コートセル用 選手名 (番号付き)

  // 進行中ロー用 選手名 (番号付き) - 左右用

  // ── 選手DB(閲覧)へのリンク (#266) ──
  // 観戦ビューは /viewer/live/ なので、選手個人ページ(/viewer/ 側)へ遷移する。
  playerHref(id) { return "/viewer/#player/" + encodeURIComponent(id); },
  // 1サイドのメンバー (ダブルスは主+ペアの2名)。{id,name} の配列。
  sideMembers(m, side) {
    const pid = side === 1 ? m.player1_id : m.player2_id;
    const combined = side === 1 ? m.player1_name : m.player2_name;
    const main = side === 1 ? m.player1_main_name : m.player2_main_name;
    const ppid = side === 1 ? m.player1_partner_id : m.player2_partner_id;
    const pname = side === 1 ? m.player1_partner_name : m.player2_partner_name;
    const first = (main && String(main).trim())
      || String(combined || "").split(" / ")[0].trim() || combined || "選手";
    const list = [{ id: pid || null, name: first }];
    if (ppid || (pname && String(pname).trim())) {
      list.push({ id: ppid || null, name: (pname && String(pname).trim()) || "ペア" });
    }
    return list;
  },
  // 選手名ノード配列 (個人DBリンク付き・ダブルスは両名)。num は先頭にのみ付与。
  // 親要素クリック(詳細モーダル)と競合しないよう stopPropagation する。
  playerNameNodes(m, side, num) {
    const out = [];
    if (num && num > 0) out.push(h("span", { className: "lv-pnum" }, "#" + num));
    LV.sideMembers(m, side).forEach((mem, i) => {
      if (i > 0) out.push(h("span", { className: "lv-name-sep" }, "・"));
      out.push(mem.id
        ? h("a", { className: "lv-name-link", href: LV.playerHref(mem.id),
            title: "選手データベースを見る", onClick: (e) => e.stopPropagation() }, mem.name || "?")
        : document.createTextNode(mem.name || "?"));
    });
    return out;
  },

  // 再コール バッジ (選手別 cc)
  //   cc=1: 再コール1 (黄/注意), cc=2: 再コール2 (オレンジ/警告),
  //   cc=3+: 再コール3+ (赤/重大)
  callBadgeEl(count) {
    const cc = parseInt(count) || 0;
    if (cc <= 0) return null;
    const cls = cc >= 3 ? "critical" : (cc >= 2 ? "warning" : "");
    const label = "再コール " + cc;
    return h("span", { className: "lv-match-call-badge " + cls }, label);
  },
  // コートセル内用 (短い表記)
  callBadgeCourtEl(count) {
    const cc = parseInt(count) || 0;
    if (cc <= 0) return null;
    const cls = cc >= 3 ? "critical" : (cc >= 2 ? "warning" : "");
    return h("div", { className: "lv-call-badge " + cls,
      style: { alignSelf: "center" } }, "再コール " + cc);
  },

  renderOngoing(m) {
    const cc1 = parseInt(m.call_count_p1) || 0;
    const cc2 = parseInt(m.call_count_p2) || 0;
    return h("div", { className: "lv-match",
        onClick: () => LV.showMatchDetail(m) },
      h("div", { className: "lv-match-table" },
        "T" + m.table_no + (m.extra_tables ? "+" + m.extra_tables : "")),
      h("div", { className: "lv-match-players" },
        h("div", { className: "lv-match-side" },
          h("div", { className: "lv-match-name" }, ...LV.playerNameNodes(m, 1, m.player1_bracket_number)),
          h("div", { className: "lv-match-team" }, m.player1_team || ""),
          cc1 >= 1 ? LV.callBadgeEl(cc1) : null,
        ),
        h("div", { className: "lv-match-vs" }, "VS"),
        h("div", { className: "lv-match-side right" },
          h("div", { className: "lv-match-name" }, ...LV.playerNameNodes(m, 2, m.player2_bracket_number)),
          h("div", { className: "lv-match-team" }, m.player2_team || ""),
          cc2 >= 1 ? LV.callBadgeEl(cc2) : null,
        ),
      ),
      h("div", { className: "lv-match-meta" },
        h("div", {}, `${m.event || ""} ${m.round || ""}`),
        m.referee_name
          ? h("div", { className: "ref" }, "審判: " + m.referee_name)
          : null,
        m.called_at
          ? h("div", {}, new Date(m.called_at).toLocaleTimeString("ja-JP",
              { hour: "2-digit", minute: "2-digit" }))
          : null,
      ),
    );
  },

  // 終了試合の左右対比+勝敗強調表示
  renderResult(m) {
    // winner/loser を slot に変換
    const p1Won = m.winner_id && m.winner_id === m.player1_id ||
                  m.winner_name === m.player1_name;
    const leftSide = p1Won ? "winner" : "loser";
    const rightSide = p1Won ? "loser" : "winner";
    const leftSets = p1Won ? (m.winner_sets || 0) : (m.loser_sets || 0);
    const rightSets = p1Won ? (m.loser_sets || 0) : (m.winner_sets || 0);
    const p1Num = m.player1_bracket_number;
    const p2Num = m.player2_bracket_number;
    const nameEl = (name, num) => {
      const el = h("div", { className: "name" });
      if (num && num > 0) el.appendChild(h("span", { className: "lv-pnum" }, "#" + num));
      el.appendChild(document.createTextNode(name || "?"));
      return el;
    };
    return h("div", { className: "lv-result",
        onClick: () => LV.showMatchDetail(m) },
      h("div", { className: "lv-result-side " + leftSide },
        nameEl(m.player1_name, p1Num),
        h("div", { className: "team" }, m.player1_team || ""),
      ),
      h("div", { className: "lv-result-score" },
        h("div", { className: "lv-result-event" },
          `${m.event || ""}・${m.round || ""}`),
        h("div", { className: "lv-result-counts" },
          h("span", { className: p1Won ? "winner-pt" : "" }, String(leftSets)),
          h("span", { className: "sep" }, "-"),
          h("span", { className: !p1Won ? "winner-pt" : "" }, String(rightSets)),
        ),
      ),
      h("div", { className: "lv-result-side right " + rightSide },
        nameEl(m.player2_name, p2Num),
        h("div", { className: "team" }, m.player2_team || ""),
      ),
    );
  },

  // コートクリック / 試合クリックで詳細モーダル
  showCourtDetail(table) {
    if (!table.match) return;
    LV.showMatchDetail(table.match, "コート " + table.table_no);
  },

  showMatchDetail(m, headerExtra) {
    const overlay = document.getElementById("lvOverlay");
    overlay.innerHTML = "";
    const setsList = (m.sets || []).map((s, i) =>
      `第${i+1}セット: ${s[0]}-${s[1]}`).join(" · ");
    const closeFn = () => { overlay.innerHTML = ""; };

    const p1Num = m.player1_bracket_number;
    const p2Num = m.player2_bracket_number;
    // 氏名を個人DB(/viewer/)へリンク。ダブルスは両名 (#266)。
    const playerVal = (side, num, team) => {
      const el = h("div", { className: "lv-detail-val player" },
        ...LV.playerNameNodes(m, side, num));
      el.appendChild(h("div", { className: "team" }, team || ""));
      return el;
    };
    const cc1 = parseInt(m.call_count_p1) || 0;
    const cc2 = parseInt(m.call_count_p2) || 0;
    // 選手の playerVal にバッジを追加するため、内部で結合
    const playerValWithBadge = (side, num, team, ccPlayer) => {
      const el = playerVal(side, num, team);
      if (ccPlayer >= 1) {
        const bd = LV.callBadgeEl(ccPlayer);
        if (bd) el.appendChild(bd);
      }
      return el;
    };
    const card = h("div", { className: "lv-overlay-card" },
      h("div", { className: "lv-overlay-head" },
        h("div", { className: "lv-overlay-title" },
          (headerExtra ? headerExtra + " · " : "") +
          (m.event || "") + " " + (m.round || "")),
        h("button", { className: "lv-overlay-close",
          onClick: closeFn }, "×"),
      ),
      h("div", { className: "lv-detail-row" },
        h("div", { className: "lv-detail-label" }, "選手1"),
        playerValWithBadge(1, p1Num, m.player1_team, cc1),
      ),
      h("div", { className: "lv-detail-row" },
        h("div", { className: "lv-detail-label" }, "選手2"),
        playerValWithBadge(2, p2Num, m.player2_team, cc2),
      ),
      m.referee_name ? h("div", { className: "lv-detail-row" },
        h("div", { className: "lv-detail-label" }, "審判"),
        h("div", { className: "lv-detail-val ref" }, m.referee_name)) : null,
      m.table_no ? h("div", { className: "lv-detail-row" },
        h("div", { className: "lv-detail-label" }, "コート"),
        h("div", { className: "lv-detail-val" }, "コート " + m.table_no
          + (m.extra_tables ? " + " + m.extra_tables : ""))) : null,
      h("div", { className: "lv-detail-row" },
        h("div", { className: "lv-detail-label" }, "ステータス"),
        h("div", { className: "lv-detail-val" },
          { waiting: "待機", pending: "呼出可能", on_table: "進行中", completed: "終了" }[m.status] || m.status),
      ),
      (cc1 + cc2) >= 1 ? h("div", { className: "lv-detail-row" },
        h("div", { className: "lv-detail-label" }, "再コール"),
        h("div", { className: "lv-detail-val" },
          (cc1 >= 1 ? (m.player1_name + ": " + cc1 + "回") : "") +
          (cc1 >= 1 && cc2 >= 1 ? " / " : "") +
          (cc2 >= 1 ? (m.player2_name + ": " + cc2 + "回") : ""))) : null,
      m.winner_name ? h("div", { className: "lv-detail-row" },
        h("div", { className: "lv-detail-label" }, "勝者"),
        h("div", { className: "lv-detail-val", style: { color: "var(--lv-warn)", fontWeight: 700 } },
          m.winner_name + " (" + (m.winner_sets || 0) + "-" + (m.loser_sets || 0) + ")")) : null,
      setsList ? h("div", { className: "lv-detail-row" },
        h("div", { className: "lv-detail-label" }, "セット"),
        h("div", { className: "lv-detail-val", style: { fontFamily: "var(--font-mono)", fontSize: "12px" } },
          setsList)) : null,
      m.called_at ? h("div", { className: "lv-detail-row" },
        h("div", { className: "lv-detail-label" }, "呼出時刻"),
        h("div", { className: "lv-detail-val" },
          new Date(m.called_at).toLocaleString("ja-JP"))) : null,
    );

    overlay.appendChild(h("div", { className: "lv-overlay",
        onClick: (e) => { if (e.target.classList.contains("lv-overlay")) closeFn(); } },
      card));
  },

  findPlayerMatches(s, q) {
    const ql = q.toLowerCase();
    const hits = [];
    const match = (name) => (name || "").toLowerCase().includes(ql);
    s.on_table.forEach(m => {
      if (match(m.player1_name) || match(m.player2_name)
          || match(m.player1_team) || match(m.player2_team)) {
        hits.push({
          where: "進行中 (コート" + m.table_no + ")",
          summary: `${m.event || ""} ${m.round || ""} ${m.player1_name} vs ${m.player2_name}`,
        });
      }
    });
    s.callable.forEach(m => {
      if (match(m.player1_name) || match(m.player2_name)
          || match(m.player1_team) || match(m.player2_team)) {
        hits.push({
          where: "残試合数",
          summary: `${m.event || ""} ${m.round || ""} ${m.player1_name} vs ${m.player2_name}`,
        });
      }
    });
    s.recent_finished.slice(0, 30).forEach(m => {
      if (match(m.winner_name) || match(m.loser_name)
          || match(m.player1_team) || match(m.player2_team)) {
        hits.push({
          where: "終了",
          summary: `${m.event || ""} ${m.round || ""} ${m.winner_name} ${m.winner_sets}-${m.loser_sets} ${m.loser_name}`,
        });
      }
    });
    return hits;
  },

  toggleBigscreen() {
    document.body.classList.toggle("lv-big");
    const on = document.body.classList.contains("lv-big");
    document.getElementById("bsBtn").classList.toggle("active", on);
    localStorage.setItem("ktta_lv_big", on ? "1" : "0");
  },

  toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.();
    } else {
      document.exitFullscreen?.();
    }
  },

  // 大画面/全画面を終了して通常表示に戻す (#185)
  exitBigscreen() {
    document.body.classList.remove("lv-big");
    const bs = document.getElementById("bsBtn");
    if (bs) bs.classList.remove("active");
    localStorage.setItem("ktta_lv_big", "0");
    if (document.fullscreenElement) document.exitFullscreen?.();
  },

  showShareDialog() {
    const url = location.origin + location.pathname +
      (LV.tournamentId ? "?t=" + encodeURIComponent(LV.tournamentId) : "");
    const qrUrl = "/api/qr.svg?size=260&text=" + encodeURIComponent(url);
    const overlay = document.getElementById("lvOverlay");
    overlay.innerHTML = "";
    const closeFn = () => { overlay.innerHTML = ""; };
    overlay.appendChild(h("div", { className: "lv-overlay",
        onClick: (e) => { if (e.target.classList.contains("lv-overlay")) closeFn(); } },
      h("div", { className: "lv-qr" },
        h("h3", {}, "KTTA Platform 観戦ビュー"),
        h("div", { style: { fontSize: "12px", color: "#52525b", marginBottom: "10px" } },
          "下記URLまたはQRコードを参加者・保護者にお伝えください。"),
        h("img", { src: qrUrl, width: 260, height: 260,
          style: { display: "block", margin: "10px auto" }, alt: "QR" }),
        h("div", { className: "url-text" }, url),
        h("button", { className: "lv-btn",
          style: { background: "var(--lv-bg)", color: "#fff", marginTop: "8px" },
          onClick: () => {
            navigator.clipboard?.writeText(url).then(() => {
              const t = document.querySelector(".url-text");
              if (t) { t.textContent = "コピーしました!"; setTimeout(closeFn, 800); }
            });
          } }, "URLをコピー"),
        h("button", { className: "lv-btn",
          style: { background: "#9ca3af", color: "#fff", marginLeft: "8px" },
          onClick: closeFn }, "閉じる"),
      ),
    ));
  },
};

LV.init();
</script>
</body>
</html>
