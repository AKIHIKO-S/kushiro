<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>審判 結果入力 | KTTA</title>
<link rel="stylesheet" href="/shared/common.css">
<style>
  /* 審判ページ専用 (スマホ前提・大きめタッチ・自己完結) */
  :root { --ref-accent:#15803d; --ref-line:#e7e5e4; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #f5f5f4; color: #1c1917;
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    -webkit-text-size-adjust: 100%; padding-bottom: 40px;
  }
  .ref-head {
    position: sticky; top: 0; z-index: 5;
    background: #fff; border-bottom: 1px solid var(--ref-line);
    padding: 12px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .ref-title { font-size: 13px; color: #78716c; font-weight: 700; letter-spacing: .04em; }
  .ref-tname { font-size: 17px; font-weight: 800; margin-top: 2px; line-height: 1.3; }
  .ref-meta { font-size: 12px; color: #78716c; margin-top: 3px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .ref-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; vertical-align:middle;}
  .ref-dot.on { background:#16a34a; } .ref-dot.off { background:#dc2626; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 14px; }
  .ref-note {
    background: #fffbeb; border: 1px solid #fde68a; color: #92400e;
    border-radius: 10px; padding: 10px 12px; font-size: 12.5px; line-height: 1.6; margin-bottom: 14px;
  }
  .mcard {
    background: #fff; border: 1px solid var(--ref-line); border-radius: 14px;
    padding: 14px; margin-bottom: 14px; box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .mcard-top { display:flex; align-items:center; gap:8px; margin-bottom: 10px; flex-wrap: wrap; }
  .mtable { background: var(--ref-accent); color:#fff; font-weight:800; font-size:14px;
            border-radius: 8px; padding: 3px 10px; }
  .mtag { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; border-radius:7px;
          padding: 2px 8px; font-size: 12px; font-weight:700; }
  .mtime { margin-left:auto; font-size: 12px; color:#78716c; }
  .vs-row { display:flex; align-items:stretch; gap:10px; }
  .pbtn {
    flex:1; border: 2px solid #d6d3d1; background:#fafaf9; border-radius: 12px;
    padding: 14px 10px; text-align:center; cursor:pointer; transition: all .12s;
    min-height: 78px; display:flex; flex-direction:column; justify-content:center; gap:3px;
    -webkit-tap-highlight-color: transparent;
  }
  .pbtn:active { transform: scale(.98); }
  .pbtn.sel { border-color: var(--ref-accent); background:#f0fdf4; box-shadow: 0 0 0 3px rgba(21,128,61,.12); }
  .pbtn .pn { font-size: 17px; font-weight: 800; line-height:1.25; }
  .pbtn .pt { font-size: 12px; color:#78716c; margin-top:1px; }
  .pbtn .pwin { font-size: 12px; font-weight:800; color:var(--ref-accent); visibility:hidden; }
  .pbtn.sel .pwin { visibility: visible; }
  .vs-mid { display:flex; align-items:center; font-weight:800; color:#a8a29e; font-size:14px; }
  .confirm { margin-top: 12px; border-top: 1px dashed var(--ref-line); padding-top: 12px; }
  .confirm-q { font-size: 14px; font-weight:700; margin-bottom: 10px; }
  .confirm-q b { color: var(--ref-accent); }
  .score-opt { font-size: 13px; color:#57534e; margin-bottom: 8px; }
  .score-opt summary { cursor:pointer; font-weight:700; padding:6px 0; }
  .score-row { display:flex; align-items:center; gap:8px; margin-top:6px; }
  .score-row input { width: 64px; font-size: 20px; text-align:center; padding: 8px;
    border:1px solid #d6d3d1; border-radius:8px; }
  .score-row .lbl { font-size: 13px; font-weight:700; }
  .btn-row { display:flex; gap:10px; margin-top: 6px; }
  .b {
    flex:1; border:none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 800;
    cursor:pointer; -webkit-tap-highlight-color: transparent;
  }
  .b-ok { background: var(--ref-accent); color:#fff; }
  .b-ok:disabled { background:#a8a29e; }
  .b-cancel { background:#f5f5f4; color:#57534e; border:1px solid #d6d3d1; }
  .empty { text-align:center; color:#78716c; padding: 48px 16px; font-size: 14px; line-height:1.8; }
  .empty .big { font-size: 40px; margin-bottom: 8px; }
  .mcard.pending { border-color: #f59e0b; background: #fffbeb; }
  .pending-banner { font-size: 15px; font-weight: 800; color: #b45309; margin: 4px 0 8px; }
  .pending-win { font-size: 16px; margin-bottom: 12px; }
  .pending-win b { color: var(--ref-accent); }
  .done-badge { display:inline-flex; align-items:center; gap:6px; color: var(--ref-accent);
    font-weight:800; font-size:14px; }
  .err-screen { text-align:center; padding: 60px 24px; }
  .err-screen h1 { font-size: 20px; color:#b91c1c; }
  .err-screen p { color:#57534e; font-size: 14px; line-height:1.8; }
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background:#1c1917; color:#fff; padding: 12px 18px; border-radius: 10px; font-size: 14px;
    font-weight:700; box-shadow: 0 6px 20px rgba(0,0,0,.25); z-index: 50; max-width: 90%;
    opacity:0; transition: opacity .2s; pointer-events:none;
  }
  .toast.show { opacity: 1; }
  .toast.err { background:#b91c1c; } .toast.ok { background: var(--ref-accent); }
  .reload-bar { text-align:center; margin: 4px 0 14px; }
  .reload-bar button { background:#fff; border:1px solid #d6d3d1; border-radius: 20px;
    padding: 7px 16px; font-size: 13px; font-weight:700; color:#57534e; cursor:pointer; }
  /* KTTA Platform へ戻るリンク (ヘッダ右上) */
  .ref-home { position:absolute; top:10px; right:12px; font-size:11px; font-weight:800;
    color:#0f766e; text-decoration:none; background:#f0fdfa; border:1px solid #99f6e4;
    border-radius:8px; padding:5px 9px; white-space:nowrap; }
  .ref-home:active { transform: scale(.97); }
</style>
</head>
<body>
<div class="ref-head">
  <a class="ref-home" href="/viewer/" title="KTTA Platform へ戻る">← KTTA Platform</a>
  <div class="ref-title">審判 結果入力</div>
  <div class="ref-tname" id="tname">読み込み中…</div>
  <div class="ref-meta">
    <span><span class="ref-dot off" id="netdot"></span><span id="netlbl">接続確認中</span></span>
    <span id="updated"></span>
  </div>
</div>
<div class="wrap" id="root"></div>
<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";
  var params = new URLSearchParams(location.search);
  // 認証モード: 共有トークン(t) / コート別(tid+court+ct, 試験運用 #229)
  var TOKEN = params.get("t") || "";
  var TID = params.get("tid") || "", COURT = params.get("court") || "", CT = params.get("ct") || "";
  var PERCOURT = !!(TID && COURT && CT);
  var HAS_AUTH = !!(TOKEN || PERCOURT);
  function authQS() {
    return PERCOURT
      ? ("tid=" + encodeURIComponent(TID) + "&court=" + encodeURIComponent(COURT) + "&ct=" + encodeURIComponent(CT))
      : ("t=" + encodeURIComponent(TOKEN));
  }
  function authBody(b) {
    b = b || {};
    if (PERCOURT) { b.tid = TID; b.court = COURT; b.ct = CT; } else { b.t = TOKEN; }
    return b;
  }
  var root = document.getElementById("root");
  var toastEl = document.getElementById("toast");
  var pendingOpId = {};   // matchId -> op_id (リトライ時に同一IDで冪等送信)
  var selWinner = {};     // matchId -> 1|2 (確認中の選択)
  var redo = {};          // matchId -> true (承認待ちでも再報告するため入力に戻す)
  var lastMatches = [];
  // オフライン送信キュー (#231): 回線断でも報告を貯め、復旧時に自動送信 (op_idで冪等)
  var QKEY = "ktta_ref_queue_v1";
  function loadQ() { try { return JSON.parse(localStorage.getItem(QKEY) || "[]"); } catch (e) { return []; } }
  function saveQ(q) { try { localStorage.setItem(QKEY, JSON.stringify(q.slice(-50))); } catch (e) {} }
  function enqueue(mid, body) { var q = loadQ(); q.push({ mid: mid, body: body, ts: Date.now() }); saveQ(q); }

  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]; }); }
  function uuid() {
    try { if (crypto && crypto.randomUUID) return crypto.randomUUID(); } catch (e) {}
    return "op-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
  }
  var toastTimer;
  function toast(msg, kind) {
    toastEl.textContent = msg; toastEl.className = "toast show " + (kind || "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.className = "toast " + (kind || ""); }, 3200);
  }
  function setNet(online) {
    var d = document.getElementById("netdot"), l = document.getElementById("netlbl");
    if (!d) return;
    d.className = "ref-dot " + (online ? "on" : "off");
    l.textContent = online ? "オンライン" : "オフライン（送信できません）";
  }
  function fmtElapsed(startStr) {
    if (!startStr) return "";
    var t0 = Date.parse(String(startStr).replace(" ", "T"));
    if (isNaN(t0)) return "";
    var min = Math.floor((Date.now() - t0) / 60000);
    if (min < 0) return "";
    return min < 60 ? (min + "分経過") : (Math.floor(min / 60) + "時間" + (min % 60) + "分経過");
  }

  function showError(msg) {
    root.innerHTML = '<div class="err-screen"><h1>リンクを開けませんでした</h1><p>' + esc(msg) + '</p>'
      + '<p style="margin-top:18px;font-size:13px">本部席にお問い合わせください。</p></div>';
  }

  function render(state) {
    var t = state.tournament || {};
    document.getElementById("tname").textContent = (t.name || "大会") + (PERCOURT ? "　【コート" + COURT + " 専用】" : "");
    var upd = document.getElementById("updated");
    var now = new Date();
    upd.textContent = "更新 " + ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2);

    var matches = state.on_table || [];
    lastMatches = matches;
    if (!matches.length) {
      root.innerHTML = '<div class="ref-note">担当の試合がコートに入ると、ここに表示されます。'
        + '結果が出たら<b>勝った選手を選んで報告</b>してください（セット数の入力は任意です）。</div>'
        + '<div class="reload-bar"><button id="rl">↻ 最新に更新</button></div>'
        + '<div class="empty"><div class="big">🏓</div>いまコートに入っている試合はありません。<br>試合が始まったら自動で表示されます。</div>';
      bindReload();
      return;
    }
    var html = '<div class="ref-note">結果が出たら<b>勝った選手</b>を選んで報告してください。'
      + 'セット数の入力は任意（ベスト8までなどは勝者のみでOK）。報告は本部にも自動で反映されます。</div>'
      + '<div class="reload-bar"><button id="rl">↻ 最新に更新</button></div>';
    matches.forEach(function (m) { html += cardHtml(m); });
    root.innerHTML = html;
    bindReload();
    matches.forEach(function (m) { bindCard(m); });
  }

  function bindReload() {
    var b = document.getElementById("rl");
    if (b) b.onclick = function () { load(); };
  }

  function cardHtml(m) {
    var elapsed = fmtElapsed(m.started_at || m.called_at);
    var head = '<div class="mcard-top">'
      + (m.table_no ? '<span class="mtable">コート' + esc(m.table_no) + '</span>' : '')
      + '<span class="mtag">' + esc(m.event || "") + ' ' + esc(m.round || "") + '</span>'
      + (elapsed ? '<span class="mtime">' + esc(elapsed) + '</span>' : '')
      + '</div>';
    // 報告済み(本部承認待ち) → 勝敗ボタンを出さず承認待ち表示 (#223)
    if (m.awaiting_approval && !redo[m.id]) {
      var rw = (m.reported && m.reported.winner_name) || "";
      return '<div class="mcard pending" id="card-' + esc(m.id) + '">' + head
        + '<div class="pending-banner">⏳ 報告済み・本部の承認待ち</div>'
        + '<div class="pending-win"><b>' + esc(rw) + '</b> の勝ちで報告しました</div>'
        + '<button class="b b-cancel" data-redo="' + esc(m.id) + '">報告をやり直す</button>'
        + '</div>';
    }
    return '<div class="mcard" id="card-' + esc(m.id) + '">' + head
      + '<div class="vs-row">'
      +   pbtnHtml(m, 1)
      +   '<div class="vs-mid">VS</div>'
      +   pbtnHtml(m, 2)
      + '</div>'
      + '<div class="confirm" id="confirm-' + esc(m.id) + '" style="display:none"></div>'
      + '</div>';
  }
  function pbtnHtml(m, slot) {
    var nm = slot === 1 ? m.player1_name : m.player2_name;
    var tm = slot === 1 ? m.player1_team : m.player2_team;
    return '<div class="pbtn" data-mid="' + esc(m.id) + '" data-slot="' + slot + '">'
      + '<div class="pn">' + esc(nm || "（未定）") + '</div>'
      + (tm ? '<div class="pt">' + esc(tm) + '</div>' : '')
      + '<div class="pwin">✓ 勝ち</div>'
      + '</div>';
  }

  function bindCard(m) {
    var card = document.getElementById("card-" + m.id);
    if (!card) return;
    var redoBtn = card.querySelector("[data-redo]");
    if (redoBtn) {
      redoBtn.onclick = function () {
        redo[m.id] = true;          // 承認待ちでも再報告できるよう入力に戻す
        delete pendingOpId[m.id];   // 新しい op_id で送信 (上書き報告)
        var nc = document.createElement("div");
        nc.innerHTML = cardHtml(m);
        card.replaceWith(nc.firstChild);
        bindCard(m);
      };
      return;
    }
    card.querySelectorAll(".pbtn").forEach(function (btn) {
      btn.onclick = function () {
        var slot = parseInt(btn.getAttribute("data-slot"));
        selWinner[m.id] = slot;
        card.querySelectorAll(".pbtn").forEach(function (b) {
          b.classList.toggle("sel", parseInt(b.getAttribute("data-slot")) === slot);
        });
        showConfirm(m, slot);
      };
    });
  }

  function showConfirm(m, slot) {
    var winnerName = slot === 1 ? m.player1_name : m.player2_name;
    var box = document.getElementById("confirm-" + m.id);
    if (!box) return;
    box.style.display = "block";
    box.innerHTML = ''
      + '<div class="confirm-q"><b>' + esc(winnerName || "選手") + '</b> の勝ちで報告しますか？</div>'
      + '<details class="score-opt"><summary>セットスコアも記録する（任意）</summary>'
      +   '<div class="score-row">'
      +     '<span class="lbl">' + esc(winnerName || "勝者") + '</span>'
      +     '<input type="number" min="0" max="9" inputmode="numeric" id="ws-' + esc(m.id) + '" placeholder="-">'
      +     '<span class="lbl">-</span>'
      +     '<input type="number" min="0" max="9" inputmode="numeric" id="ls-' + esc(m.id) + '" placeholder="-">'
      +     '<span class="lbl">' + esc((slot === 1 ? m.player2_name : m.player1_name) || "敗者") + '</span>'
      +   '</div>'
      +   '<div style="font-size:12px;color:#78716c;margin-top:6px">空欄なら「勝者のみ」で記録します。</div>'
      + '</details>'
      + '<div class="btn-row">'
      +   '<button class="b b-cancel" id="cancel-' + esc(m.id) + '">やめる</button>'
      +   '<button class="b b-ok" id="send-' + esc(m.id) + '">この結果で報告</button>'
      + '</div>';
    document.getElementById("cancel-" + m.id).onclick = function () {
      box.style.display = "none";
      var card = document.getElementById("card-" + m.id);
      if (card) card.querySelectorAll(".pbtn").forEach(function (b) { b.classList.remove("sel"); });
      selWinner[m.id] = 0;
    };
    document.getElementById("send-" + m.id).onclick = function () { submit(m, slot); };
  }

  // 結果送信 (認証は body に含める: 共有=t / コート別=tid+court+ct)
  function sendFinish(mid, body) {
    return fetch("/api/ref/matches/" + encodeURIComponent(mid) + "/finish", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(authBody(Object.assign({}, body))),
    }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, status: r.status, j: j }; }); });
  }
  // 貯めた報告を順次送信 (回線復旧時/ポーリング毎)。op_id 冪等なので二重適用なし。
  var flushing = false;
  function flushQueue() {
    if (flushing || !navigator.onLine) return;
    var q = loadQ(); if (!q.length) return;
    flushing = true;
    var item = q[0];
    sendFinish(item.mid, item.body).then(function () {
      var qq = loadQ(); qq.shift(); saveQ(qq);   // 応答が返れば除去 (成否問わず=冪等)
      flushing = false;
      if (loadQ().length) flushQueue();
      else { toast("保存していた報告を送信しました。", "ok"); load(); }
    }).catch(function () { flushing = false; /* まだ回線断: 次の機会に */ });
  }

  function submit(m, slot) {
    var wsEl = document.getElementById("ws-" + m.id);
    var lsEl = document.getElementById("ls-" + m.id);
    var ws = wsEl && wsEl.value !== "" ? parseInt(wsEl.value) : null;
    var ls = lsEl && lsEl.value !== "" ? parseInt(lsEl.value) : null;
    var body = { winner_slot: slot, sets: [] };
    if (ws != null && ls != null) {
      if (ws === ls) { toast("セット数が同じです。勝者が多くなるように入力してください。", "err"); return; }
      if (ws < ls) { toast("勝者のセット数が少なくなっています。確認してください。", "err"); return; }
      body.winner_sets = ws; body.loser_sets = ls;
    } else {
      body.winner_sets = 0; body.loser_sets = 0;  // 勝者のみ
    }
    if (!pendingOpId[m.id]) pendingOpId[m.id] = uuid();
    body.op_id = pendingOpId[m.id];

    var sendBtn = document.getElementById("send-" + m.id);
    if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = "送信中…"; }

    // オフラインなら即キュー (回線復旧で自動送信)
    if (!navigator.onLine) {
      enqueue(m.id, body); delete pendingOpId[m.id]; redo[m.id] = false;
      toast("オフライン: 報告を保存しました。回線復旧後に自動送信します。", "warn");
      load(); return;
    }
    sendFinish(m.id, body).then(function (res) {
      if (!res.ok) {
        if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = "この結果で報告"; }
        toast((res.j && res.j.error) || "送信に失敗しました（" + res.status + "）", "err");
        if (res.status === 409 || res.status === 404) load();
        return;
      }
      delete pendingOpId[m.id];
      redo[m.id] = false;
      toast("報告しました（本部の承認待ち）: " + (res.j.winner_name || "") + " の勝ち", "ok");
      load();
    }).catch(function () {
      // 通信失敗 → キューに積んで後で自動送信
      enqueue(m.id, body); delete pendingOpId[m.id]; redo[m.id] = false;
      toast("通信に失敗。報告を保存し、回線復旧後に自動送信します。", "warn");
      load();
    });
  }

  var loading = false;
  function load() {
    if (!HAS_AUTH) { showError("リンクにトークンがありません。本部から配布されたリンクを使ってください。"); return; }
    flushQueue();  // 取得のついでに貯めた報告を送信
    if (loading) return;
    loading = true;
    fetch("/api/ref/state?" + authQS()).then(function (r) {
      setNet(true);
      if (r.status === 403) { return r.json().then(function (j) { showError((j && j.error) || "リンクが無効です。"); throw "stop"; }); }
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }).then(function (state) {
      render(state);
    }).catch(function (e) {
      if (e === "stop") return;
      setNet(navigator.onLine);
      if (!root.innerHTML || root.querySelector(".empty") == null && !root.querySelector(".mcard")) {
        // 初回失敗のみエラー表示。既に描画済みなら据え置き。
        if (!lastMatches.length && !root.querySelector(".mcard")) {
          root.innerHTML = '<div class="empty"><div class="big">⚠️</div>読み込みに失敗しました。<br>'
            + '<button class="b b-cancel" style="margin-top:12px;max-width:200px" onclick="location.reload()">再読み込み</button></div>';
        }
      }
    }).then(function () { loading = false; });
  }

  window.addEventListener("online", function () { setNet(true); load(); });
  window.addEventListener("offline", function () { setNet(false); });
  setNet(navigator.onLine);
  load();
  setInterval(load, 12000);  // 自動更新 (コートの入れ替わりを反映)
})();
</script>
</body>
</html>
