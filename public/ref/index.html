<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>審判 結果入力 | KTTA</title>
<link rel="stylesheet" href="/shared/common.css">
<style>
  /* 審判ページ専用 (スマホ前提・大きめタッチ・自己完結) */
  :root { --ref-accent:#15803d; --ref-line:#e7e5e4; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #f5f5f4; color: #1c1917;
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    -webkit-text-size-adjust: 100%; padding-bottom: 40px;
  }
  .ref-head {
    position: sticky; top: 0; z-index: 5;
    background: #fff; border-bottom: 1px solid var(--ref-line);
    padding: 12px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .ref-title { font-size: 13px; color: #78716c; font-weight: 700; letter-spacing: .04em; }
  .ref-tname { font-size: 17px; font-weight: 800; margin-top: 2px; line-height: 1.3; }
  .ref-meta { font-size: 12px; color: #78716c; margin-top: 3px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .ref-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; vertical-align:middle;}
  .ref-dot.on { background:#16a34a; } .ref-dot.off { background:#dc2626; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 14px; }
  .ref-note {
    background: #fffbeb; border: 1px solid #fde68a; color: #92400e;
    border-radius: 10px; padding: 10px 12px; font-size: 12.5px; line-height: 1.6; margin-bottom: 14px;
  }
  .mcard {
    background: #fff; border: 1px solid var(--ref-line); border-radius: 14px;
    padding: 14px; margin-bottom: 14px; box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .mcard-top { display:flex; align-items:center; gap:8px; margin-bottom: 10px; flex-wrap: wrap; }
  .mtable { background: var(--ref-accent); color:#fff; font-weight:800; font-size:14px;
            border-radius: 8px; padding: 3px 10px; }
  .mtag { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; border-radius:7px;
          padding: 2px 8px; font-size: 12px; font-weight:700; }
  .mtime { margin-left:auto; font-size: 12px; color:#78716c; }
  .vs-row { display:flex; align-items:stretch; gap:10px; }
  .pbtn {
    flex:1; min-width:0; border: 2px solid #d6d3d1; background:#fafaf9; border-radius: 12px;
    padding: 14px 10px; text-align:center; cursor:pointer; transition: all .12s;
    min-height: 78px; display:flex; flex-direction:column; justify-content:center; gap:3px;
    -webkit-tap-highlight-color: transparent;
  }
  .pbtn:active { transform: scale(.98); }
  .pbtn.sel { border-color: var(--ref-accent); background:#f0fdf4; box-shadow: 0 0 0 3px rgba(21,128,61,.12); }
  .pbtn .pn { font-size: 17px; font-weight: 800; line-height:1.25; }
  .pbtn .pt { font-size: 12px; color:#78716c; margin-top:1px; }
  .pbtn .pwin { font-size: 12px; font-weight:800; color:var(--ref-accent); visibility:hidden; }
  .pbtn.sel .pwin { visibility: visible; }
  .vs-mid { display:flex; align-items:center; font-weight:800; color:#a8a29e; font-size:14px; }
  .confirm { margin-top: 12px; border-top: 1px dashed var(--ref-line); padding-top: 12px; }
  .confirm-q { font-size: 14px; font-weight:700; margin-bottom: 10px; }
  .confirm-q b { color: var(--ref-accent); }
  .score-opt { font-size: 13px; color:#57534e; margin-bottom: 8px; }
  .score-opt summary { cursor:pointer; font-weight:700; padding:6px 0; }
  .score-row { display:flex; align-items:center; gap:8px; margin-top:6px; }
  .score-row input { width: 64px; font-size: 20px; text-align:center; padding: 8px;
    border:1px solid #d6d3d1; border-radius:8px; }
  .score-row select { min-width: 96px; font-size: 22px; font-weight: 800; text-align: center;
    text-align-last: center; padding: 12px 10px; border:1px solid #d6d3d1; border-radius:8px;
    background:#fff; color:#1c1917; -webkit-appearance: menulist; appearance: menulist; }
  .score-row .lbl { font-size: 13px; font-weight:700; }
  .score-row .lbl small { font-size: 10px; color:#78716c; font-weight:700; display:block; }
  /* 左=勝者(緑)/右=敗者(灰) の色分け (#262: 反対入力を防ぐ) */
  .score-row select.gw { border-color: var(--ref-accent); box-shadow: inset 4px 0 0 var(--ref-accent); }
  .score-row select.gl { border-color: #a8a29e; box-shadow: inset 4px 0 0 #a8a29e; }
  .gcol-legend { display:flex; gap:8px; flex-wrap:wrap; margin: 2px 0 10px; }
  .gcol-badge { font-size: 12.5px; font-weight: 800; border-radius: 8px; padding: 5px 10px; flex:1; text-align:center; }
  .gcol-badge.win { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
  .gcol-badge.lose { background:#f5f5f4; color:#57534e; border:1px solid #d6d3d1; }
  /* 選手番号バッジ (審判が組合せ表と突き合わせて確認できるように #241) */
  .pbn { display:inline-block; background:#1c1917; color:#fff; font-size:15px; font-weight:800;
    font-family:var(--font-mono); border-radius:6px; padding:2px 8px; margin-right:5px; vertical-align:middle; }
  /* セットカウント速報 (任意・観戦画面の「2-1 第4セット」用)。+タップで該当側+1・即送信。 */
  .live-row { display:flex; align-items:center; gap:6px; margin: 2px 0 10px;
    background:#fafaf9; border:1px dashed #d6d3d1; border-radius:10px; padding:8px 10px; }
  .live-lbl { font-size: 11px; font-weight: 800; color:#78716c; line-height:1.3; flex:0 0 auto; }
  .live-grp { display:flex; align-items:center; gap:4px; flex:1; justify-content:center; }
  .lbtn { width:44px; height:44px; border:none; border-radius:10px; font-size:22px; font-weight:800;
    background:#e7e5e4; color:#1c1917; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .lbtn.plus { background:#dcfce7; color:#166534; }
  .lbtn:active { transform: scale(.95); }
  .lnum { min-width:34px; text-align:center; font-size:26px; font-weight:800;
    font-variant-numeric: tabular-nums; color:#1c1917; }
  .lsep { font-size:20px; font-weight:800; color:#a8a29e; }
  .btn-row { display:flex; gap:10px; margin-top: 6px; }
  .b {
    flex:1; border:none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 800;
    cursor:pointer; -webkit-tap-highlight-color: transparent;
  }
  .b-ok { background: var(--ref-accent); color:#fff; }
  .b-ok:disabled { background:#a8a29e; }
  .b-cancel { background:#f5f5f4; color:#57534e; border:1px solid #d6d3d1; }
  .empty { text-align:center; color:#78716c; padding: 48px 16px; font-size: 14px; line-height:1.8; }
  .mcard.pending { border-color: #f59e0b; background: #fffbeb; }
  .pending-banner { font-size: 15px; font-weight: 800; color: #b45309; margin: 4px 0 8px; }
  .pending-win { font-size: 16px; margin-bottom: 12px; }
  .pending-win b { color: var(--ref-accent); }
  .done-badge { display:inline-flex; align-items:center; gap:6px; color: var(--ref-accent);
    font-weight:800; font-size:14px; }
  .err-screen { text-align:center; padding: 60px 24px; }
  .err-screen h1 { font-size: 20px; color:#b91c1c; }
  .err-screen p { color:#57534e; font-size: 14px; line-height:1.8; }
  /* 会場パスコード入力ゲート (#261) */
  .pass-gate { text-align:center; padding: 40px 20px 24px; max-width: 360px; margin: 0 auto; }
  .pass-gate h2 { font-size: 20px; font-weight: 800; margin: 0 0 8px; }
  .pass-gate p { color:#57534e; font-size: 13.5px; line-height: 1.8; margin: 0 0 18px; }
  .pass-input {
    width: 100%; text-align:center; font-size: 30px; font-weight: 800; letter-spacing: .25em;
    padding: 14px 10px; border: 2px solid #d6d3d1; border-radius: 12px; margin-bottom: 14px;
    background:#fff; color:#1c1917;
  }
  .pass-input:focus { outline:none; border-color: var(--ref-accent); box-shadow: 0 0 0 3px rgba(21,128,61,.12); }
  .pass-gate .b { width: 100%; }
  .pass-hint { color:#78716c; font-size: 12px; margin-top: 14px; line-height:1.7; }
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background:#1c1917; color:#fff; padding: 12px 18px; border-radius: 10px; font-size: 14px;
    font-weight:700; box-shadow: 0 6px 20px rgba(0,0,0,.25); z-index: 50; max-width: 90%;
    opacity:0; transition: opacity .2s; pointer-events:none;
  }
  .toast.show { opacity: 1; }
  .toast.err { background:#b91c1c; } .toast.ok { background: var(--ref-accent); }
  .reload-bar { text-align:center; margin: 4px 0 14px; }
  .reload-bar button { background:#fff; border:1px solid #d6d3d1; border-radius: 20px;
    padding: 7px 16px; font-size: 13px; font-weight:700; color:#57534e; cursor:pointer; }
  /* KTTA Platform へ戻るリンク (ヘッダ右上) */
  .ref-home { position:absolute; top:10px; right:12px; font-size:11px; font-weight:800;
    color:#0f766e; text-decoration:none; background:#f0fdfa; border:1px solid #99f6e4;
    border-radius:8px; padding:5px 9px; white-space:nowrap; }
  .ref-home:active { transform: scale(.97); }
</style>
</head>
<body>
<div class="ref-head">
  <a class="ref-home" href="/viewer/" title="KTTA Platform へ戻る">← KTTA Platform</a>
  <div class="ref-title">審判 結果入力</div>
  <div class="ref-tname" id="tname">読み込み中…</div>
  <div class="ref-meta">
    <span><span class="ref-dot off" id="netdot"></span><span id="netlbl">接続確認中</span></span>
    <span id="updated"></span>
  </div>
</div>
<div class="wrap" id="root"></div>
<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";
  var params = new URLSearchParams(location.search);
  // 認証モード: 共有トークン(t) / コート別(tid+court+ct, 試験運用 #229)
  var TOKEN = params.get("t") || "";
  var TID = params.get("tid") || "", COURT = params.get("court") || "", CT = params.get("ct") || "";
  var PERCOURT = !!(TID && COURT && CT);
  var HAS_AUTH = !!(TOKEN || PERCOURT);
  function authQS() {
    return PERCOURT
      ? ("tid=" + encodeURIComponent(TID) + "&court=" + encodeURIComponent(COURT) + "&ct=" + encodeURIComponent(CT))
      : ("t=" + encodeURIComponent(TOKEN));
  }
  function authBody(b) {
    b = b || {};
    if (PERCOURT) { b.tid = TID; b.court = COURT; b.ct = CT; } else { b.t = TOKEN; }
    return b;
  }
  var root = document.getElementById("root");
  var toastEl = document.getElementById("toast");
  var pendingOpId = {};   // matchId -> op_id (リトライ時に同一IDで冪等送信)
  var selWinner = {};     // matchId -> 1|2 (確認中の選択)
  var redo = {};          // matchId -> true (承認待ちでも再報告するため入力に戻す)
  var lastMatches = [];
  var editingMid = 0;     // 入力中(確認パネルを開いている)試合id。自動更新の再描画から保護 (#240)
  var latestState = null; // 直近に取得した状態 (編集終了後の追いつき描画に使用)
  // 会場パスコード (#261): 要求ONの大会で、報告前に一度だけ入力。端末に記憶し以後省略。
  var PASSKEY = "ktta_ref_pass_" + (TOKEN || (TID + "_" + COURT));
  var passcode = "";
  try { passcode = localStorage.getItem(PASSKEY) || ""; } catch (e) {}
  // オフライン送信キュー (#231): 回線断でも報告を貯め、復旧時に自動送信 (op_idで冪等)
  var QKEY = "ktta_ref_queue_v1";
  function loadQ() { try { return JSON.parse(localStorage.getItem(QKEY) || "[]"); } catch (e) { return []; } }
  function saveQ(q) { try { localStorage.setItem(QKEY, JSON.stringify(q.slice(-50))); } catch (e) {} }
  function enqueue(mid, body) { var q = loadQ(); q.push({ mid: mid, body: body, ts: Date.now() }); saveQ(q); }
  // セット速報のオフラインキュー: 報告キューと分離した軽量版。matchIdごと最新1件だけ保持
  // (last-write-wins・絶対値スナップショット送信なので中間値の再送は不要=自己修復的)。
  var LQKEY = "ktta_ref_liveq_v1";
  function loadLiveQ() { try { return JSON.parse(localStorage.getItem(LQKEY) || "{}"); } catch (e) { return {}; } }
  function saveLiveQ(q) { try { localStorage.setItem(LQKEY, JSON.stringify(q)); } catch (e) {} }
  var liveLocal = {};   // matchId -> {s1,s2} 表示中のローカル値(サーバ値 live_sets を初期値に)

  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]; }); }
  function uuid() {
    try { if (crypto && crypto.randomUUID) return crypto.randomUUID(); } catch (e) {}
    return "op-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
  }
  // セット数ドロップダウンの選択肢 (0〜9)。空欄=未入力(勝者のみ) (#239)
  function setSelOpts() {
    var o = '<option value="">-</option>';
    for (var i = 0; i <= 5; i++) o += '<option value="' + i + '">' + i + '</option>';
    return o;
  }
  // ゲーム別点数の選択肢 0〜15 (#262: デュース 12-10 等も入力可)
  function ptSelOpts() {
    var o = '<option value="">-</option>';
    for (var i = 0; i <= 15; i++) o += '<option value="' + i + '">' + i + '</option>';
    return o;
  }
  // 記入途中の下書き保存 (時間経過/再読込でも消えない #256)
  var DKEY = "ktta_ref_draft_v1_";
  function loadDraft(mid) { try { return JSON.parse(localStorage.getItem(DKEY + mid) || "null"); } catch (e) { return null; } }
  function saveDraft(mid, d) { try { localStorage.setItem(DKEY + mid, JSON.stringify(d)); } catch (e) {} }
  function clearDraft(mid) { try { localStorage.removeItem(DKEY + mid); } catch (e) {} }
  function readConfirm(mid, slot) {
    var ws = document.getElementById("ws-" + mid), ls = document.getElementById("ls-" + mid);
    var d = { slot: slot, ws: ws ? ws.value : "", ls: ls ? ls.value : "", games: [] };
    for (var i = 1; i <= 5; i++) {
      var gw = document.getElementById("g" + i + "w-" + mid), gl = document.getElementById("g" + i + "l-" + mid);
      d.games.push([gw ? gw.value : "", gl ? gl.value : ""]);
    }
    return d;
  }
  var toastTimer;
  function toast(msg, kind) {
    toastEl.textContent = msg; toastEl.className = "toast show " + (kind || "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.className = "toast " + (kind || ""); }, 3200);
  }
  function setNet(online) {
    var d = document.getElementById("netdot"), l = document.getElementById("netlbl");
    if (!d) return;
    d.className = "ref-dot " + (online ? "on" : "off");
    l.textContent = online ? "オンライン" : "オフライン（送信できません）";
  }
  function fmtElapsed(startStr) {
    if (!startStr) return "";
    var t0 = Date.parse(String(startStr).replace(" ", "T"));
    if (isNaN(t0)) return "";
    var min = Math.floor((Date.now() - t0) / 60000);
    if (min < 0) return "";
    return min < 60 ? (min + "分経過") : (Math.floor(min / 60) + "時間" + (min % 60) + "分経過");
  }

  function showError(msg) {
    root.innerHTML = '<div class="err-screen"><h1>リンクを開けませんでした</h1><p>' + esc(msg) + '</p>'
      + '<p style="margin-top:18px;font-size:13px">本部席にお問い合わせください。</p></div>';
  }

  // 会場パスコード入力ゲート (#261): 要求ONで未入力なら、報告前にパスコードを要求。
  function renderPasscodeGate(state) {
    var t = (state && state.tournament) || {};
    var nameEl = document.getElementById("tname");
    if (nameEl) nameEl.textContent = (t.name || "大会") + (PERCOURT ? "　【コート" + COURT + " 専用】" : "");
    root.innerHTML = '<div class="pass-gate">'
      + '<h2>会場パスコードを入力</h2>'
      + '<p>本部から会場で伝えられた数字を入力してください。<br>'
      + '同じ端末では、次回から自動で省略されます。</p>'
      + '<input id="passInput" class="pass-input" inputmode="numeric" autocomplete="off" '
      +   'maxlength="12" placeholder="パスコード">'
      + '<button id="passBtn" class="b b-ok">入力する</button>'
      + '<div class="pass-hint">分からないときは本部席にお問い合わせください。</div>'
      + '</div>';
    var inp = document.getElementById("passInput");
    var btn = document.getElementById("passBtn");
    function tryUnlock() {
      var code = (inp.value || "").trim();
      if (!code) { toast("パスコードを入力してください。", "err"); return; }
      btn.disabled = true; btn.textContent = "確認中…";
      fetch("/api/ref/verify-passcode", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(authBody({ passcode: code }))
      }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
        .then(function (res) {
          btn.disabled = false; btn.textContent = "入力する";
          if (res.ok && res.j && res.j.ok) {
            passcode = code;
            try { localStorage.setItem(PASSKEY, code); } catch (e) {}
            toast("確認しました。", "ok");
            load();
          } else {
            toast("パスコードが正しくありません。本部にご確認ください。", "err");
            inp.select();
          }
        }).catch(function () {
          btn.disabled = false; btn.textContent = "入力する";
          toast("通信に失敗しました。少し待って再試行してください。", "err");
        });
    }
    btn.onclick = tryUnlock;
    inp.onkeydown = function (e) { if (e.key === "Enter") tryUnlock(); };
    inp.focus();
  }

  function render(state) {
    latestState = state;
    // 会場パスコード (#261): 要求ONで未入力なら、試合一覧の前にパスコード入力を要求
    if (state.passcode_required && !passcode) { renderPasscodeGate(state); return; }
    var t = state.tournament || {};
    document.getElementById("tname").textContent = (t.name || "大会") + (PERCOURT ? "　【コート" + COURT + " 専用】" : "");
    var upd = document.getElementById("updated");
    var now = new Date();
    upd.textContent = "更新 " + ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2);

    var matches = state.on_table || [];
    lastMatches = matches;
    latestState = state;
    // 入力中(勝者選択→確認パネルを開いている)はリストを描き替えない。
    // 自動更新の再描画でスコア入力欄が強制的に閉じてしまう不具合を防止 (#240)。
    if (editingMid && document.getElementById("card-" + editingMid)) return;
    if (!matches.length) {
      root.innerHTML = '<div class="ref-note">担当の試合がコートに入ると、ここに表示されます。'
        + '結果が出たら<b>勝った選手を選んで報告</b>してください（セット数の入力は任意です）。</div>'
        + '<div class="reload-bar"><button id="rl">↻ 最新に更新</button></div>'
        + '<div class="empty">いまコートに入っている試合はありません。<br>試合が始まったら自動で表示されます。</div>';
      bindReload();
      return;
    }
    var html = '<div class="ref-note">結果が出たら<b>勝った選手</b>を選んで報告してください。'
      + 'セット数の入力は任意（ベスト8までなどは勝者のみでOK）。報告は本部にも自動で反映されます。</div>'
      + '<div class="reload-bar"><button id="rl">↻ 最新に更新</button></div>';
    matches.forEach(function (m) { html += cardHtml(m); });
    root.innerHTML = html;
    bindReload();
    matches.forEach(function (m) { bindCard(m); });
    // 下書きが残っている試合は確認パネルを自動で開いて記入を復元 (#256: 時間経過/再読込でも消えない)
    if (!editingMid) {
      for (var di = 0; di < matches.length; di++) {
        var dm = matches[di];
        if (!dm.awaiting_approval && !redo[dm.id] && loadDraft(dm.id)) {
          var dd = loadDraft(dm.id);
          var dslot = dd && dd.slot === 2 ? 2 : 1;
          selWinner[dm.id] = dslot;
          var dcard = document.getElementById("card-" + dm.id);
          if (dcard) dcard.querySelectorAll(".pbtn").forEach(function (b) {
            b.classList.toggle("sel", parseInt(b.getAttribute("data-slot")) === dslot);
          });
          showConfirm(dm, dslot);
          break;  // 1件だけ自動復元
        }
      }
    }
  }

  function bindReload() {
    var b = document.getElementById("rl");
    if (b) b.onclick = function () { load(); };
  }

  function cardHtml(m) {
    var elapsed = fmtElapsed(m.started_at || m.called_at);
    var head = '<div class="mcard-top">'
      + (m.table_no ? '<span class="mtable">コート' + esc(m.table_no) + '</span>' : '')
      + '<span class="mtag">' + esc(m.event || "") + ' ' + esc(m.round || "") + '</span>'
      + (m.match_label ? '<span class="mtag">No.' + esc(m.match_label) + '</span>' : '')
      + (elapsed ? '<span class="mtime">' + esc(elapsed) + '</span>' : '')
      + '</div>';
    // 報告済み(本部承認待ち) → 勝敗ボタンを出さず承認待ち表示 (#223)
    if (m.awaiting_approval && !redo[m.id]) {
      var rw = (m.reported && m.reported.winner_name) || "";
      return '<div class="mcard pending" id="card-' + esc(m.id) + '">' + head
        + '<div class="pending-banner">報告済み・本部の承認待ち</div>'
        + '<div class="pending-win"><b>' + esc(rw) + '</b> の勝ちで報告しました</div>'
        + '<button class="b b-cancel" data-redo="' + esc(m.id) + '">報告をやり直す</button>'
        + '</div>';
    }
    return '<div class="mcard" id="card-' + esc(m.id) + '">' + head
      + '<div class="vs-row">'
      +   pbtnHtml(m, 1)
      +   '<div class="vs-mid">VS</div>'
      +   pbtnHtml(m, 2)
      + '</div>'
      + liveRowHtml(m)
      + '<div class="confirm" id="confirm-' + esc(m.id) + '" style="display:none"></div>'
      + '</div>';
  }
  // セットカウント速報行 (任意)。+タップ=該当側+1で即送信。観戦画面に「2-1 第4セット」が出る。
  function liveRowHtml(m) {
    var lv = liveLocal[m.id] || m.live_sets || { s1: 0, s2: 0 };
    liveLocal[m.id] = { s1: lv.s1 || 0, s2: lv.s2 || 0 };
    var short = function (nm) { var s = String(nm || "").split(/[\s　]/)[0]; return s.slice(0, 5) || "選手"; };
    return '<div class="live-row" id="live-' + esc(m.id) + '">'
      + '<span class="live-lbl">セット<br>速報</span>'
      + '<div class="live-grp">'
      +   '<button class="lbtn" data-lmid="' + esc(m.id) + '" data-lslot="1" data-ld="-1">−</button>'
      +   '<span class="lnum" id="ln1-' + esc(m.id) + '">' + (liveLocal[m.id].s1) + '</span>'
      +   '<button class="lbtn plus" data-lmid="' + esc(m.id) + '" data-lslot="1" data-ld="1">＋</button>'
      + '</div>'
      + '<span class="lsep">-</span>'
      + '<div class="live-grp">'
      +   '<button class="lbtn" data-lmid="' + esc(m.id) + '" data-lslot="2" data-ld="-1">−</button>'
      +   '<span class="lnum" id="ln2-' + esc(m.id) + '">' + (liveLocal[m.id].s2) + '</span>'
      +   '<button class="lbtn plus" data-lmid="' + esc(m.id) + '" data-lslot="2" data-ld="1">＋</button>'
      + '</div>'
      + '</div>';
  }
  function pbtnHtml(m, slot) {
    var nm = slot === 1 ? m.player1_name : m.player2_name;
    var tm = slot === 1 ? m.player1_team : m.player2_team;
    var bn = slot === 1 ? m.player1_bracket_number : m.player2_bracket_number;
    return '<div class="pbtn" data-mid="' + esc(m.id) + '" data-slot="' + slot + '">'
      + '<div class="pn">' + (bn ? '<span class="pbn">#' + esc(bn) + '</span>' : '') + esc(nm || "（未定）") + '</div>'
      + (tm ? '<div class="pt">' + esc(tm) + '</div>' : '')
      + '<div class="pwin">勝ち</div>'
      + '</div>';
  }

  function bindCard(m) {
    var card = document.getElementById("card-" + m.id);
    if (!card) return;
    var redoBtn = card.querySelector("[data-redo]");
    if (redoBtn) {
      redoBtn.onclick = function () {
        redo[m.id] = true;          // 承認待ちでも再報告できるよう入力に戻す
        delete pendingOpId[m.id];   // 新しい op_id で送信 (上書き報告)
        var nc = document.createElement("div");
        nc.innerHTML = cardHtml(m);
        card.replaceWith(nc.firstChild);
        bindCard(m);
      };
      return;
    }
    // セット速報 +/- : ローカル値を進めて絶対値スナップショットを即送信(0..9にクランプ)
    card.querySelectorAll(".lbtn").forEach(function (btn) {
      btn.onclick = function () {
        var mid = btn.getAttribute("data-lmid");
        var slot = btn.getAttribute("data-lslot");
        var d = parseInt(btn.getAttribute("data-ld"));
        var lv = liveLocal[mid] || { s1: 0, s2: 0 };
        var key = "s" + slot;
        lv[key] = Math.max(0, Math.min(9, (lv[key] || 0) + d));
        liveLocal[mid] = lv;
        var numEl = document.getElementById("ln" + slot + "-" + mid);
        if (numEl) numEl.textContent = lv[key];
        sendLiveScore(mid, { s1: lv.s1, s2: lv.s2 });
      };
    });
    card.querySelectorAll(".pbtn").forEach(function (btn) {
      btn.onclick = function () {
        var slot = parseInt(btn.getAttribute("data-slot"));
        var prev = selWinner[m.id];
        if (prev && prev !== slot) {
          // 勝者を入れ替えたら下書きの勝者/敗者(左右)列も入れ替える。これをしないと
          // showConfirm が新しい勝者の列へ旧勝者の点数を復元し、誤った点数で報告される。
          var d = loadDraft(m.id);
          if (d) {
            var tw = d.ws; d.ws = d.ls; d.ls = tw;
            if (d.games) d.games = d.games.map(function (g) { return g ? [g[1], g[0]] : g; });
            d.slot = slot;
            saveDraft(m.id, d);
          }
        }
        selWinner[m.id] = slot;
        card.querySelectorAll(".pbtn").forEach(function (b) {
          b.classList.toggle("sel", parseInt(b.getAttribute("data-slot")) === slot);
        });
        showConfirm(m, slot);
      };
    });
  }

  function showConfirm(m, slot) {
    var winnerName = slot === 1 ? m.player1_name : m.player2_name;
    var loserName = (slot === 1 ? m.player2_name : m.player1_name);
    var box = document.getElementById("confirm-" + m.id);
    if (!box) return;
    editingMid = m.id;   // 入力開始: 自動更新の再描画から保護 (#240)
    box.style.display = "block";
    var d = loadDraft(m.id) || {};
    var hasGames = d.games && d.games.some(function (g) { return g && (g[0] !== "" || g[1] !== ""); });
    var gameRows = "";
    for (var gi = 1; gi <= 5; gi++) {
      gameRows += '<div class="score-row"><span class="lbl">G' + gi + '</span>'
        + '<select class="gsel gw" id="g' + gi + 'w-' + esc(m.id) + '">' + ptSelOpts() + '</select>'
        + '<span class="lbl">-</span>'
        + '<select class="gsel gl" id="g' + gi + 'l-' + esc(m.id) + '">' + ptSelOpts() + '</select></div>';
    }
    // 左右どちらが誰の点数か明示する凡例 (#262: 反対入力を防ぐ)
    var colLegend = '<div class="gcol-legend">'
      + '<span class="gcol-badge win">左＝' + esc(winnerName || "勝者") + '（勝者）</span>'
      + '<span class="gcol-badge lose">右＝' + esc(loserName || "敗者") + '（敗者）</span>'
      + '</div>';
    box.innerHTML = ''
      + '<div class="confirm-q"><b>' + esc(winnerName || "選手") + '</b> の勝ちで報告しますか？</div>'
      + '<details class="score-opt"' + ((d.ws || d.ls) ? ' open' : '') + '><summary>セット数だけ記録（任意）</summary>'
      +   '<div class="score-row">'
      +     '<span class="lbl">' + esc(winnerName || "勝者") + '<small>（勝）</small></span>'
      +     '<select class="gsel gw" id="ws-' + esc(m.id) + '">' + setSelOpts() + '</select>'
      +     '<span class="lbl">-</span>'
      +     '<select class="gsel gl" id="ls-' + esc(m.id) + '">' + setSelOpts() + '</select>'
      +     '<span class="lbl">' + esc(loserName || "敗者") + '<small>（負）</small></span>'
      +   '</div>'
      + '</details>'
      + '<details class="score-opt"' + (hasGames ? ' open' : '') + '><summary>ゲームごとの点数（任意・11点先取/3ゲーム先取で勝ち）</summary>'
      +   colLegend
      +   gameRows
      +   '<div style="font-size:12px;color:#78716c;margin-top:6px">点数を入れると自動でセット数を計算します。<b>勝った選手＝左の列</b>です（左右を間違えないよう注意）。記入は自動保存されます。</div>'
      + '</details>'
      + '<div class="btn-row">'
      +   '<button class="b b-cancel" id="cancel-' + esc(m.id) + '">やめる</button>'
      +   '<button class="b b-ok" id="send-' + esc(m.id) + '">この結果で報告</button>'
      + '</div>';
    // 下書きを復元
    var setv = function (id, v) { var el = document.getElementById(id); if (el && v != null && v !== "") el.value = v; };
    setv("ws-" + m.id, d.ws); setv("ls-" + m.id, d.ls);
    if (d.games) for (var k = 0; k < d.games.length && k < 5; k++) {
      setv("g" + (k + 1) + "w-" + m.id, d.games[k][0]); setv("g" + (k + 1) + "l-" + m.id, d.games[k][1]);
    }
    // 入力のたびに下書き保存
    box.addEventListener("change", function () { saveDraft(m.id, readConfirm(m.id, slot)); });
    document.getElementById("cancel-" + m.id).onclick = function () {
      box.style.display = "none";
      var card = document.getElementById("card-" + m.id);
      if (card) card.querySelectorAll(".pbtn").forEach(function (b) { b.classList.remove("sel"); });
      selWinner[m.id] = 0;
      editingMid = 0;                       // 入力終了 → 自動更新の保護解除 (#240)
      clearDraft(m.id);
      if (latestState) render(latestState); // 保留していた最新状態に追いつく
    };
    document.getElementById("send-" + m.id).onclick = function () { submit(m, slot); };
  }

  // 結果送信 (認証は body に含める: 共有=t / コート別=tid+court+ct, 会場パスコード=passcode #261)
  function sendFinish(mid, body) {
    var payload = authBody(Object.assign({}, body));
    if (passcode) payload.passcode = passcode;   // #261 会場パスコードを同送
    return fetch("/api/ref/matches/" + encodeURIComponent(mid) + "/finish", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, status: r.status, j: j }; }); });
  }
  // セット速報の送信。失敗(回線断)は liveQ に matchIdごと最新1件で退避し、復旧時に送る。
  // 表示専用の暫定値なので報告(finish)ほどの信頼性経路は持たせない(4xxは黙って破棄)。
  function sendLiveScore(mid, sc) {
    var payload = authBody({ s1: sc.s1, s2: sc.s2, op_id: uuid() });
    if (passcode) payload.passcode = passcode;
    fetch("/api/ref/matches/" + encodeURIComponent(mid) + "/live-score", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    }).then(function (r) {
      if (r.ok) {
        var q = loadLiveQ(); if (q[mid]) { delete q[mid]; saveLiveQ(q); }
        return;
      }
      if (r.status >= 500) { var q2 = loadLiveQ(); q2[mid] = { s1: sc.s1, s2: sc.s2 }; saveLiveQ(q2); }
      // 4xx(コートに無い等)は破棄: 状態が変わった後の速報は意味を持たない
    }).catch(function () {
      var q = loadLiveQ(); q[mid] = { s1: sc.s1, s2: sc.s2 }; saveLiveQ(q);   // 回線断: 最新値だけ退避
    });
  }
  function flushLiveQ() {
    if (!navigator.onLine) return;
    var q = loadLiveQ();
    Object.keys(q).forEach(function (mid) {
      var sc = q[mid];
      delete q[mid]; saveLiveQ(q);       // 先に取り除く(送信失敗なら sendLiveScore が再退避)
      sendLiveScore(mid, sc);
    });
  }
  // 貯めた報告を順次送信 (回線復旧時/ポーリング毎)。op_id 冪等なので二重適用なし。
  var flushing = false;
  function flushQueue() {
    flushLiveQ();   // 速報キューを先に掃く(軽量・matchIdごと最新1件)
    if (flushing || !navigator.onLine) return;
    var q = loadQ(); if (!q.length) return;
    flushing = true;
    var item = q[0];
    sendFinish(item.mid, item.body).then(function (res) {
      // 会場パスコード未確定で弾かれた場合 (#261): 破棄せず保持し、再入力後に再送
      if (res && res.status === 403 && res.j && res.j.passcode_error) {
        flushing = false;
        passcode = ""; try { localStorage.removeItem(PASSKEY); } catch (e) {}
        load();   // → パスコード入力ゲートを表示
        return;
      }
      if (res && res.status >= 500) {   // サーバ一時障害: 破棄せず保持し、次の機会に再送(報告を失わない)
        flushing = false;
        return;
      }
      // 2xx(適用/既適用) または 4xx恒久エラー(409=台に無い等、再送しても通らない) → 除去
      var qq = loadQ(); qq.shift(); saveQ(qq);
      flushing = false;
      if (loadQ().length) flushQueue();
      else { toast("保存していた報告を送信しました。", "ok"); load(); }
    }).catch(function () { flushing = false; /* まだ回線断: 次の機会に */ });
  }

  function submit(m, slot) {
    var wsEl = document.getElementById("ws-" + m.id);
    var lsEl = document.getElementById("ls-" + m.id);
    var ws = wsEl && wsEl.value !== "" ? parseInt(wsEl.value) : null;
    var ls = lsEl && lsEl.value !== "" ? parseInt(lsEl.value) : null;
    // ゲーム別点数 (入力があれば優先)。左=勝者(slot)の点数・右=敗者の点数。sets_jsonはplayer1視点で保存。
    var games = [];
    for (var gi = 1; gi <= 5; gi++) {
      var gwEl = document.getElementById("g" + gi + "w-" + m.id), glEl = document.getElementById("g" + gi + "l-" + m.id);
      var av = gwEl ? gwEl.value : "", bv = glEl ? glEl.value : "";
      var a = av !== "" ? parseInt(av) : null;
      var b = bv !== "" ? parseInt(bv) : null;
      if (a == null && b == null) continue;            // 空行はスキップ
      if (a == null || b == null) {                    // 片方だけ=記入漏れ (#262)
        toast("G" + gi + " の点数が片方だけです。両方とも入力してください。", "err"); return;
      }
      games.push({ g: gi, a: a, b: b });
    }
    var winnerName = slot === 1 ? m.player1_name : m.player2_name;
    var loserName  = slot === 1 ? m.player2_name : m.player1_name;
    var body = { winner_slot: slot, sets: [] };
    if (games.length) {
      var wc = 0, lc = 0, sets = [];
      for (var gx = 0; gx < games.length; gx++) {
        var ga = games[gx].a, gb = games[gx].b, gn = games[gx].g;
        if (ga === gb) { toast("G" + gn + " が同点（" + ga + "-" + gb + "）です。勝った方が多くなるように入力してください。", "err"); return; }
        var hi = ga > gb ? ga : gb, lo = ga > gb ? gb : ga;
        if (hi < 11 || hi - lo < 2) {   // 1ゲーム=11点先取(2点差以上)。デュースは 12-10, 13-11 等
          toast("G" + gn + "（" + ga + "-" + gb + "）は正しいゲーム点数ではありません。11点先取・2点差以上で入力してください（例 11-9、12-10）。", "err"); return;
        }
        if (ga > gb) wc++; else lc++;
        sets.push(slot === 1 ? [ga, gb] : [gb, ga]);   // 勝者→player1視点に変換
      }
      if (wc <= lc) {   // 反対入力チェック (#262): 選んだ勝者より相手のゲーム数が多い/同じ
        toast("点数では「" + (loserName || "相手") + "」の勝ちになっています。左の列＝「" + (winnerName || "勝者")
          + "」（勝者）の点数です。『勝った選手が11点を3ゲーム先取』になるよう、左右を間違えず入力してください。", "err"); return;
      }
      body.winner_sets = wc; body.loser_sets = lc; body.sets = sets;
    } else if (ws != null && ls != null) {
      if (ws === ls) { toast("セット数が同じ（" + ws + "-" + ls + "）です。勝った選手が多くなるように入力してください。", "err"); return; }
      if (ws < ls) { toast("「" + (winnerName || "勝者") + "」（勝者）のセット数が少なくなっています。左＝勝者の数です。左右が逆になっていないか確認してください。", "err"); return; }
      body.winner_sets = ws; body.loser_sets = ls;
    } else {
      body.winner_sets = 0; body.loser_sets = 0;  // 勝者のみ
    }
    if (!pendingOpId[m.id]) pendingOpId[m.id] = uuid();
    body.op_id = pendingOpId[m.id];
    editingMid = 0;   // 送信開始 → 以降の自動更新/再描画を許可 (#240)

    var sendBtn = document.getElementById("send-" + m.id);
    if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = "送信中…"; }

    // オフラインなら即キュー (回線復旧で自動送信)
    if (!navigator.onLine) {
      enqueue(m.id, body); delete pendingOpId[m.id]; redo[m.id] = false; clearDraft(m.id);
      toast("オフライン: 報告を保存しました。回線復旧後に自動送信します。", "warn");
      load(); return;
    }
    sendFinish(m.id, body).then(function (res) {
      if (!res.ok) {
        if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = "この結果で報告"; }
        // 会場パスコードが違う/変更された (#261): 記憶を消して再入力ゲートへ
        if (res.status === 403 && res.j && res.j.passcode_error) {
          passcode = ""; try { localStorage.removeItem(PASSKEY); } catch (e) {}
          toast("会場パスコードが正しくありません。再入力してください。", "err");
          load();
          return;
        }
        toast((res.j && res.j.error) || "送信に失敗しました（" + res.status + "）", "err");
        if (res.status === 409 || res.status === 404) load();
        return;
      }
      delete pendingOpId[m.id];
      redo[m.id] = false; clearDraft(m.id);
      toast("報告しました（本部の承認待ち）: " + (res.j.winner_name || "") + " の勝ち", "ok");
      load();
    }).catch(function () {
      // 通信失敗 → キューに積んで後で自動送信
      enqueue(m.id, body); delete pendingOpId[m.id]; redo[m.id] = false; clearDraft(m.id);
      toast("通信に失敗。報告を保存し、回線復旧後に自動送信します。", "warn");
      load();
    });
  }

  var loading = false;
  function load() {
    if (!HAS_AUTH) { showError("リンクにトークンがありません。本部から配布されたリンクを使ってください。"); return; }
    flushQueue();  // 取得のついでに貯めた報告を送信
    if (loading) return;
    loading = true;
    fetch("/api/ref/state?" + authQS()).then(function (r) {
      setNet(true);
      if (r.status === 403) { return r.json().then(function (j) { showError((j && j.error) || "リンクが無効です。"); throw "stop"; }); }
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }).then(function (state) {
      render(state);
    }).catch(function (e) {
      if (e === "stop") return;
      setNet(navigator.onLine);
      if (!root.innerHTML || root.querySelector(".empty") == null && !root.querySelector(".mcard")) {
        // 初回失敗のみエラー表示。既に描画済みなら据え置き。
        if (!lastMatches.length && !root.querySelector(".mcard")) {
          root.innerHTML = '<div class="empty">読み込みに失敗しました。<br>'
            + '<button class="b b-cancel" style="margin-top:12px;max-width:200px" onclick="location.reload()">再読み込み</button></div>';
        }
      }
    }).then(function () { loading = false; });
  }

  window.addEventListener("online", function () { setNet(true); load(); });
  window.addEventListener("offline", function () { setNet(false); });
  setNet(navigator.onLine);
  load();
  setInterval(load, 12000);  // 自動更新 (コートの入れ替わりを反映)
})();
</script>
</body>
</html>
