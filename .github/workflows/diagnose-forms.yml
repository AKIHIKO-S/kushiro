# 診断専用ワークフロー: 外部申込フォーム(/api/forms/submit)の中継状況を読み取り専用で確認する。
# 手動実行(workflow_dispatch)のみ。デプロイ・再起動・書き込みは一切行わない。
# github.event.* 由来のユーザー入力は一切使用しない(secrets のみ参照)。
# 調査後は削除して構わない(使い捨ての診断ツール)。

name: Diagnose External Forms Relay

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: SSH and inspect (read-only)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER || 'ubuntu' }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script_stop: false
          script: |
            echo "=== GAS_EXTERNAL_URL 設定有無(値は非表示) ==="
            if sudo grep -q "^GAS_EXTERNAL_URL=" /etc/ktta.env 2>/dev/null; then
              VAL=$(sudo grep "^GAS_EXTERNAL_URL=" /etc/ktta.env | cut -d= -f2-)
              if [ -n "$VAL" ]; then
                echo "設定あり(空でない) / ホスト: $(echo "$VAL" | sed -E 's#(https://[^/]+)/.*#\1#')"
              else
                echo "キーはあるが値が空"
              fi
            else
              echo "未設定(キー自体が無い)"
            fi

            echo ""
            echo "=== nginx アクセスログの場所(全ログファイル) ==="
            sudo ls -la /var/log/nginx/ 2>&1

            for LOG in /var/log/nginx/access.log /var/log/nginx/ktta.access.log /var/log/nginx/access.log.1 /var/log/nginx/ktta.access.log.1; do
              echo ""
              echo "=== [$LOG] /api/forms/submit へのアクセス件数 ==="
              sudo grep -c "forms/submit" "$LOG" 2>/dev/null || echo "0件 または $LOG が読めず"

              echo "=== [$LOG] /api/forms/submit 直近ヒット(最大30件) ==="
              sudo grep "forms/submit" "$LOG" 2>/dev/null | tail -30

              echo "=== [$LOG] /forms/largeball-* ページ自体へのGETアクセス件数 ==="
              sudo grep -cE "GET /forms/largeball-(national|alljapan)2026" "$LOG" 2>/dev/null || echo "0件"

              echo "=== [$LOG] /forms/largeball-* 直近ヒット(最大30件) ==="
              sudo grep -E "GET /forms/largeball-(national|alljapan)2026" "$LOG" 2>/dev/null | tail -30
            done

            echo ""
            echo "=== ローテート済み(.gz)ログ内の forms/submit・largeball 実ヒット行(全部) ==="
            sudo bash -c 'for f in /var/log/nginx/*.log.*.gz; do
              n=$(zgrep -c forms/submit "$f" 2>/dev/null)
              if [ "$n" != "0" ] && [ -n "$n" ]; then
                echo "--- $f (forms/submit: $n件) ---"
                zgrep "forms/submit" "$f" 2>/dev/null
              fi
              m=$(zgrep -cE "GET /forms/largeball-(national|alljapan)2026" "$f" 2>/dev/null)
              if [ "$m" != "0" ] && [ -n "$m" ]; then
                echo "--- $f (largeball GET: $m件) ---"
                zgrep -E "GET /forms/largeball-(national|alljapan)2026" "$f" 2>/dev/null
              fi
            done' 2>/dev/null || echo "ローテートログなし"

            echo ""
            echo "=== ktta.error.log 内容(全文, 192バイトのみなので全出力) ==="
            sudo cat /var/log/nginx/ktta.error.log 2>/dev/null || echo "読めず/存在せず"

            echo ""
            echo "=== journalctl(ktta.service) 側の forms/submit・GAS関連・largeball 言及 ==="
            sudo journalctl -u ktta --since "90 days ago" 2>/dev/null | grep -iE "forms/submit|GAS通信|largeball" | tail -30 || echo "該当なし"

            echo ""
            echo "=== systemctl status ktta (現在の稼働状態) ==="
            sudo systemctl status ktta --no-pager -l 2>&1 | head -30

            echo ""
            echo "=== ktta.service 直近30分の起動・エラーログ全文 ==="
            sudo journalctl -u ktta --since "30 minutes ago" --no-pager 2>&1 | tail -100

            echo ""
            echo "=== nginx設定ファイル一覧 ==="
            sudo ls -la /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>&1

            echo ""
            echo "=== nginx設定(sites-enabled配下 全文, リダイレクト/rewrite関連を特に確認) ==="
            for f in /etc/nginx/sites-enabled/*; do
              [ -e "$f" ] || continue
              echo "--- $f ---"
              sudo cat "$f"
            done

            echo ""
            echo "=== server.js内のリダイレクト/rewrite関連ミドルウェア(参考・読み取りのみ) ==="
            grep -nE "redirect|301|302|trust proxy|www\.|https?://" /opt/ktta/server.js 2>/dev/null | grep -iE "redirect|301|302" | head -20

            echo ""
            echo "=== 診断完了 ==="
