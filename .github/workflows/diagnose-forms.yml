# 診断専用ワークフロー: 外部申込フォーム(/api/forms/submit)の中継状況を読み取り専用で確認する。
# 手動実行(workflow_dispatch)のみ。デプロイ・再起動・書き込みは一切行わない。
# github.event.* 由来のユーザー入力は一切使用しない(secrets のみ参照)。
# 調査後は削除して構わない(使い捨ての診断ツール)。

name: Diagnose External Forms Relay

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: SSH and inspect (read-only)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER || 'ubuntu' }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script_stop: false
          script: |
            echo "=== GAS_EXTERNAL_URL 設定有無(値は非表示) ==="
            if sudo grep -q "^GAS_EXTERNAL_URL=" /etc/ktta.env 2>/dev/null; then
              VAL=$(sudo grep "^GAS_EXTERNAL_URL=" /etc/ktta.env | cut -d= -f2-)
              if [ -n "$VAL" ]; then
                echo "設定あり(空でない) / ホスト: $(echo "$VAL" | sed -E 's#(https://[^/]+)/.*#\1#')"
              else
                echo "キーはあるが値が空"
              fi
            else
              echo "未設定(キー自体が無い)"
            fi

            echo ""
            echo "=== nginx アクセスログの場所(全ログファイル) ==="
            sudo ls -la /var/log/nginx/ 2>&1

            for LOG in /var/log/nginx/access.log /var/log/nginx/ktta.access.log; do
              echo ""
              echo "=== [$LOG] /api/forms/submit へのアクセス件数 ==="
              sudo grep -c "forms/submit" "$LOG" 2>/dev/null || echo "0件 または $LOG が読めず"

              echo "=== [$LOG] /api/forms/submit 直近ヒット(最大30件) ==="
              sudo grep "forms/submit" "$LOG" 2>/dev/null | tail -30

              echo "=== [$LOG] /forms/largeball-* ページ自体へのGETアクセス件数 ==="
              sudo grep -cE "GET /forms/largeball-(national|alljapan)2026" "$LOG" 2>/dev/null || echo "0件"
            done

            echo ""
            echo "=== ローテート済みログ内の forms/submit 件数(全種) ==="
            sudo bash -c 'for f in /var/log/nginx/*.log.*.gz; do [ -e "$f" ] && echo "$f: $(zgrep -c forms/submit "$f" 2>/dev/null)"; done' 2>/dev/null || echo "ローテートログなし"

            echo ""
            echo "=== ktta.error.log 内容(全文, 192バイトのみなので全出力) ==="
            sudo cat /var/log/nginx/ktta.error.log 2>/dev/null || echo "読めず/存在せず"

            echo ""
            echo "=== journalctl(ktta.service) 側の forms/submit・GAS関連・largeball 言及 ==="
            sudo journalctl -u ktta --since "90 days ago" 2>/dev/null | grep -iE "forms/submit|GAS通信|largeball" | tail -30 || echo "該当なし"

            echo ""
            echo "=== 診断完了 ==="
