# GitHub Actions: Oracle Cloud 自動デプロイ
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# main ブランチへの push で自動的に Oracle Cloud にデプロイ
#
# 事前設定 (GitHub Secrets):
#   ORACLE_HOST     : Oracle Cloud インスタンスの Public IP
#   ORACLE_SSH_KEY  : SSH 秘密鍵 (-----BEGIN OPENSSH PRIVATE KEY----- から含む全文)
#   ORACLE_USER     : ユーザー名 (デフォルト: ubuntu)
#
# 使い方:
#   git push  → 自動でこの workflow が走る
#   1分以内に本番反映
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:   # 手動実行も可能

concurrency:
  group: oracle-deploy
  cancel-in-progress: true

env:
  # Node.js 20 廃止対応 (2026/6/2 以降) — 強制的に Node 24 を使用
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 守り: 回帰テスト(npm test)が通らなければデプロイしない (テストゲート)
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: 依存インストール
        run: npm install --no-audit --no-fund
      - name: 回帰テスト
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # checkout は実際には不要 (deploy は SSH で実行)。スキップして高速化。
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER || 'ubuntu' }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            echo "=== KTTA Platform デプロイ開始 ==="

            # 最新コード取得 (ktta ユーザーとして実行)
            sudo -u ktta git -C /opt/ktta fetch --depth 1 origin main
            sudo -u ktta git -C /opt/ktta reset --hard origin/main

            # 念のためバックアップ (失敗しても継続)
            sudo -u ktta bash /opt/ktta/deploy/backup.sh || echo "backup skipped"

            # 依存更新
            sudo -u ktta bash -c "cd /opt/ktta && npm install --omit=dev"

            # サービス再起動
            sudo /bin/systemctl restart ktta

            # ヘルスチェック (5秒待機 → 確認)
            sleep 5
            curl -fs http://localhost:3000/api/health > /tmp/health.json
            cat /tmp/health.json
            echo ""

            echo "=== デプロイ完了 ==="

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Oracle Cloud デプロイ失敗"
          echo "ロールバック: SSH接続して 'cd /opt/ktta && sudo git reset --hard HEAD~1 && sudo systemctl restart ktta'"
