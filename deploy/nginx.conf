# KTTA Platform - Nginx リバースプロキシ設定
# /etc/nginx/sites-available/ktta にコピー
# サーバー名を実ドメインに置換後、HTTPS化:
#   sudo ln -s /etc/nginx/sites-available/ktta /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d kttatakkyu.example.com
#   sudo systemctl reload nginx
#
# [100人規模の同時接続] メインの /etc/nginx/nginx.conf (events ブロック) で
#   worker_connections 2048;  (既定512〜768だと SSE 多数 + 通常要求で枯渇しうる)
# を設定推奨。SSE は1人=1常時接続のため、視聴者数+APIワーカー分の余裕が要る。
#
# [リクエスト集約 マイクロキャッシュ] 下の「進行データ」location を有効化するには、メインの
# nginx.conf の http{} ブロックに次の1行を追加すること (無いと nginx -t が失敗する):
#   proxy_cache_path /var/cache/nginx/ktta levels=1:2 keys_zone=ktta_cache:10m max_size=64m inactive=30s use_temp_path=off;
# これで /live・/ops-version・/match-list への100人同時ポーリングを「2秒に1回」へ集約でき、
# かつ Node 再起動/不調中も直近値を配信して視聴側の停止を防げる (= 軽量化 + 耐性)。

server {
    listen 80;
    server_name kttatakkyu.example.com;  # ← 実ドメインに変更

    # ボディサイズ拡大 (Excel取込で必要)
    client_max_body_size 50M;

    # アクセス・エラーログ
    access_log /var/log/nginx/ktta.access.log;
    error_log  /var/log/nginx/ktta.error.log;

    # SSE (進行リアルタイム通知 /api/.../ops-stream): バッファ無効 + 長時間接続を維持。
    # 100人規模の同時視聴でも各接続を切らずに保つ (アプリは5秒毎に ping を送出)。
    # この location を / より前(正規表現)に置くことで、SSE だけ長timeout・無バッファを保証。
    location ~ /ops-stream$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;   # 上書き(追記でない): クライアント偽装のXFFを破棄し実IPのみ渡す (#7)。Cloudflare配下なら $http_cf_connecting_ip に。
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;          # SSE は即時フラッシュ必須 (バッファすると遅延/詰まり)
        proxy_cache off;
        proxy_read_timeout 3600s;     # 長時間アイドルでも切断しない (既定の保険)
    }

    # ── 進行データ マイクロキャッシュ (公開・読取専用 /live・/ops-version・/match-list) ──
    # 100人が同時にポーリングしても原サーバ(Node)到達を「2秒に1回」へ集約=リクエスト軽量化。
    # proxy_cache_use_stale により Node 再起動/不調中も直近値を配信し視聴側の停止を防ぐ=耐性。
    # 【前提】http{} に proxy_cache_path ... keys_zone=ktta_cache:... を追加済みであること(ファイル冒頭参照)。
    # ※ ops-stream(SSE) は上位の専用 location が先にマッチするためキャッシュ対象外(正しく除外される)。
    location ~ ^/api/public/tournaments/[^/]+/(live|ops-version|match-list)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;   # 上書き(追記でない): クライアント偽装のXFFを破棄し実IPのみ渡す (#7)。Cloudflare配下なら $http_cf_connecting_ip に。
        proxy_cache ktta_cache;
        proxy_cache_valid 200 2s;                 # アプリの Cache-Control: max-age=2 と整合
        proxy_cache_lock on;                       # 同一URLの同時ミスを1本化 (thundering herd 防止)
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;          # 期限切れは裏で更新しつつ即座に直近値を返す
        add_header X-Cache-Status $upstream_cache_status always;  # HIT/MISS をレスポンスヘッダで確認可能
    }

    # リバースプロキシ
    # 注: 上の ops-stream 専用 location が SSE を処理。その他は以下で集約。
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;   # 上書き(追記でない): クライアント偽装のXFFを破棄し実IPのみ渡す (#7)。Cloudflare配下なら $http_cf_connecting_ip に。
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # 静的ファイル: Cache-Control 緩める
    location ~* \.(css|js|svg|png|jpg|ico)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # 申込フォーム埋込用エンドポイントは CORS 緩和
    location ~ ^/api/tournaments/.+/entry-form\.html$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header X-Frame-Options "ALLOWALL" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
}

# HTTPS 設定は certbot が自動追加します (実行後にこのファイル末尾に追記される)
