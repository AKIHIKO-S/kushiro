# KTTA Platform - Nginx リバースプロキシ設定
# /etc/nginx/sites-available/ktta にコピー
# サーバー名を実ドメインに置換後、HTTPS化:
#   sudo ln -s /etc/nginx/sites-available/ktta /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d kttatakkyu.example.com
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name kttatakkyu.example.com;  # ← 実ドメインに変更

    # ボディサイズ拡大 (Excel取込で必要)
    client_max_body_size 50M;

    # アクセス・エラーログ
    access_log /var/log/nginx/ktta.access.log;
    error_log  /var/log/nginx/ktta.error.log;

    # リバースプロキシ
    # 注: 進行リアルタイム通知(SSE: /api/public/tournaments/:id/ops-stream)は、
    #     アプリが応答ヘッダ X-Accel-Buffering:no を付与するため、この location のままで
    #     バッファされずにストリーミングされます (個別の location 設定は不要)。
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # 静的ファイル: Cache-Control 緩める
    location ~* \.(css|js|svg|png|jpg|ico)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # 申込フォーム埋込用エンドポイントは CORS 緩和
    location ~ ^/api/tournaments/.+/(entry-form\.html|entry-form-snippet)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header X-Frame-Options "ALLOWALL" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
}

# HTTPS 設定は certbot が自動追加します (実行後にこのファイル末尾に追記される)
